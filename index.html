<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Real Estate Exam Practice for Ulyana Hanov</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#faf8f5;--surface:#fff;--surface2:#f5f1ec;--border:#e5ddd3;
  --text:#2c2418;--text2:#6b5d4f;--text3:#9a8b7a;
  --accent:#c45d3e;--accent-light:#fdf0ec;--accent-dark:#a34830;
  --correct:#2d7a4f;--correct-bg:#edf7f1;--correct-border:#b8dfc8;
  --wrong:#c43e3e;--wrong-bg:#fdf0f0;--wrong-border:#f0bfbf;
  --hint:#b8860b;--hint-bg:#fef9ee;--hint-border:#ecdba5;
  --shadow:0 1px 3px rgba(44,36,24,.08);
  --shadow2:0 4px 12px rgba(44,36,24,.1);
  --radius:10px;
  --font-display:'DM Serif Display',Georgia,serif;
  --font-body:'DM Sans',-apple-system,sans-serif;
}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);color:var(--text);background:var(--bg);line-height:1.6;min-height:100vh}
.header{
  background:linear-gradient(135deg,#2c2418 0%,#4a3928 100%);
  color:#faf8f5;padding:2.5rem 2rem 2rem;text-align:center;
  position:sticky;top:0;z-index:100;
  box-shadow:0 2px 20px rgba(44,36,24,.25);
}
.header h1{font-family:var(--font-display);font-size:1.75rem;font-weight:400;letter-spacing:.02em;margin-bottom:.25rem}
.header .subtitle{color:#c4b8a8;font-size:.85rem;font-weight:400}
.stats-bar{display:flex;gap:1.5rem;justify-content:center;margin-top:1rem;flex-wrap:wrap}
.stat{font-size:.8rem;color:#c4b8a8}
.stat strong{color:#faf8f5;font-weight:600}
.app{display:flex;min-height:calc(100vh - 120px)}
.sidebar{
  width:280px;min-width:280px;background:var(--surface);
  border-right:1px solid var(--border);padding:1.25rem;
  overflow-y:auto;height:calc(100vh - 120px);position:sticky;top:120px;
}
.main{flex:1;padding:2rem;max-width:860px;margin:0 auto}
.sidebar h2{font-family:var(--font-display);font-size:1.05rem;font-weight:400;margin-bottom:1rem;color:var(--text)}
.cat-btn{
  display:flex;align-items:center;justify-content:space-between;
  width:100%;padding:.6rem .75rem;margin-bottom:.35rem;
  background:transparent;border:1.5px solid transparent;border-radius:7px;
  cursor:pointer;font-family:var(--font-body);font-size:.82rem;
  color:var(--text2);text-align:left;transition:all .15s;
}
.cat-btn:hover{background:var(--surface2);color:var(--text)}
.cat-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-light);font-weight:600}
.cat-btn .count{
  font-size:.72rem;background:var(--surface2);padding:2px 7px;
  border-radius:10px;color:var(--text3);font-weight:500;
}
.cat-btn.active .count{background:var(--accent);color:#fff}
.cat-progress{width:100%;height:3px;background:var(--surface2);border-radius:2px;margin-top:3px;overflow:hidden}
.cat-progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
.search-box{
  width:100%;padding:.55rem .75rem;border:1.5px solid var(--border);
  border-radius:7px;font-family:var(--font-body);font-size:.82rem;
  background:var(--surface);margin-bottom:1rem;outline:none;transition:border-color .15s;
}
.search-box:focus{border-color:var(--accent)}
.q-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:3px;margin-top:1rem}
.q-dot{
  width:100%;aspect-ratio:1;border-radius:4px;border:none;
  font-size:.6rem;cursor:pointer;font-family:var(--font-body);
  background:var(--surface2);color:var(--text3);
  transition:all .12s;display:flex;align-items:center;justify-content:center;
}
.q-dot:hover{background:var(--border);color:var(--text)}
.q-dot.answered-correct{background:var(--correct);color:#fff}
.q-dot.answered-wrong{background:var(--wrong);color:#fff}
.q-dot.current{outline:2px solid var(--accent);outline-offset:1px}
.question-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:2rem;margin-bottom:1.5rem;box-shadow:var(--shadow);
}
.q-header{display:flex;align-items:center;gap:.75rem;margin-bottom:1.25rem;flex-wrap:wrap}
.q-num{font-family:var(--font-display);font-size:1.1rem;color:var(--accent);white-space:nowrap}
.q-cat{
  font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;
  color:var(--text3);background:var(--surface2);padding:3px 10px;border-radius:20px;
}
.q-text{font-size:1.05rem;line-height:1.7;margin-bottom:1.5rem;color:var(--text)}
.choices{display:flex;flex-direction:column;gap:.5rem;margin-bottom:1.25rem}
.choice-btn{
  display:flex;align-items:flex-start;gap:.75rem;
  width:100%;padding:.85rem 1rem;border:1.5px solid var(--border);
  border-radius:8px;background:var(--surface);cursor:pointer;
  font-family:var(--font-body);font-size:.92rem;text-align:left;
  line-height:1.5;transition:all .15s;color:var(--text);
}
.choice-btn:hover:not(.disabled){border-color:var(--accent);background:var(--accent-light)}
.choice-letter{
  flex-shrink:0;width:26px;height:26px;border-radius:50%;
  background:var(--surface2);display:flex;align-items:center;
  justify-content:center;font-weight:600;font-size:.78rem;color:var(--text2);margin-top:1px;
}
.choice-btn.selected-correct{border-color:var(--correct-border);background:var(--correct-bg)}
.choice-btn.selected-correct .choice-letter{background:var(--correct);color:#fff}
.choice-btn.selected-wrong{border-color:var(--wrong-border);background:var(--wrong-bg)}
.choice-btn.selected-wrong .choice-letter{background:var(--wrong);color:#fff}
.choice-btn.reveal-correct{border-color:var(--correct-border);background:var(--correct-bg)}
.choice-btn.reveal-correct .choice-letter{background:var(--correct);color:#fff}
.choice-btn.disabled{cursor:default;opacity:.85}
.choice-btn.disabled:hover{border-color:var(--border);background:var(--surface)}
.choice-btn.selected-correct:hover,.choice-btn.selected-wrong:hover,.choice-btn.reveal-correct:hover{border-color:inherit;background:inherit}
.hint-btn{
  display:inline-flex;align-items:center;gap:.4rem;
  padding:.45rem .9rem;border:1.5px solid var(--hint-border);
  border-radius:6px;background:var(--hint-bg);color:var(--hint);
  font-family:var(--font-body);font-size:.8rem;font-weight:600;
  cursor:pointer;transition:all .15s;margin-bottom:1rem;
}
.hint-btn:hover{background:#fdf3dd}
.hint-box{
  padding:.85rem 1rem;border-left:3px solid var(--hint);
  background:var(--hint-bg);border-radius:0 6px 6px 0;
  font-size:.88rem;color:#7a6a2a;margin-bottom:1rem;animation:fadeIn .2s;
}
.explanation-box{
  padding:1rem 1.1rem;border-left:3px solid var(--correct);
  background:var(--correct-bg);border-radius:0 6px 6px 0;
  font-size:.88rem;color:#1e5a35;line-height:1.65;animation:fadeIn .25s;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.nav-row{display:flex;gap:.75rem;margin-top:1.5rem;justify-content:space-between}
.nav-btn{
  padding:.6rem 1.4rem;border:1.5px solid var(--border);border-radius:7px;
  background:var(--surface);cursor:pointer;font-family:var(--font-body);
  font-size:.85rem;font-weight:600;color:var(--text2);transition:all .15s;
}
.nav-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
.nav-btn:disabled{opacity:.4;cursor:default}
.nav-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.nav-btn.primary:hover:not(:disabled){background:var(--accent-dark)}
.empty-state{text-align:center;padding:4rem 2rem;color:var(--text3)}
.empty-state h3{font-family:var(--font-display);font-size:1.3rem;color:var(--text2);margin-bottom:.5rem}
.menu-toggle{
  display:none;position:fixed;bottom:1.25rem;right:1.25rem;z-index:200;
  width:52px;height:52px;border-radius:50%;background:var(--accent);
  color:#fff;border:none;font-size:1.3rem;cursor:pointer;box-shadow:var(--shadow2);
}
@media(max-width:768px){
  .sidebar{
    position:fixed;left:-300px;top:0;height:100vh;z-index:150;
    transition:left .25s;padding-top:1rem;box-shadow:var(--shadow2);
  }
  .sidebar.open{left:0}
  .menu-toggle{display:flex;align-items:center;justify-content:center}
  .main{padding:1.25rem}
  .header h1{font-size:1.35rem}
  .app{display:block}
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:140}
  .overlay.show{display:block}
}
.sidebar::-webkit-scrollbar{width:5px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>
<div class="header">
  <h1>Real Estate Exam Practice</h1>
  <div class="subtitle">California DRE Salesperson Exam &middot; Prepared for Ulyana Hanov</div>
  <div class="stats-bar">
    <div class="stat"><strong id="s-answered">0</strong> / 1000 answered</div>
    <div class="stat"><strong id="s-correct">0</strong> correct</div>
    <div class="stat"><strong id="s-pct">0%</strong> accuracy</div>

</div>
<div class="app">
  <div class="overlay" id="overlay"></div>
  <aside class="sidebar" id="sidebar">
    <h2>Categories</h2>
    <input type="text" class="search-box" id="searchBox" placeholder="Search questions...">

</div>

<script id="qdata" type="application/json">[{"id": 1, "category": "Property Ownership", "q": "Which of the following is considered real property?", "choices": ["A mobile home on a rented lot", "Growing timber attached to land", "A car parked in a garage", "Furniture inside a house"], "answer": 1, "hint": "Think about what is permanently attached to or part of the land.", "explanation": "Growing timber is considered real property because it is attached to the land. Items like mobile homes on rented lots, cars, and furniture are personal property (chattels). Real property includes land and anything permanently affixed to it."}, {"id": 2, "category": "Property Ownership", "q": "Fee simple absolute ownership means the owner has:", "choices": ["A life estate only", "The greatest possible interest in real property", "A leasehold interest", "A defeasible fee"], "answer": 1, "hint": "This is the highest form of ownership recognized by law.", "explanation": "Fee simple absolute is the greatest estate (interest) one can have in real property. It is of unlimited duration, freely transferable, and inheritable. It gives the owner full rights of use, enjoyment, and disposal, subject only to governmental restrictions."}, {"id": 3, "category": "Property Ownership", "q": "The bundle of rights in real property includes all of the following EXCEPT:", "choices": ["Right to use", "Right to exclude others", "Right to violate zoning laws", "Right to transfer"], "answer": 2, "hint": "Property rights are subject to certain governmental limitations.", "explanation": "The bundle of rights includes the rights to use, possess, enjoy, exclude others, and transfer (sell, gift, or will) property. However, no owner has the right to violate governmental regulations such as zoning laws. Ownership is always subject to police power, taxation, eminent domain, and escheat."}, {"id": 4, "category": "Property Ownership", "q": "Joint tenancy requires all of the following unities EXCEPT:", "choices": ["Unity of time", "Unity of title", "Unity of possession", "Unity of marriage"], "answer": 3, "hint": "Remember the four unities: TTIP.", "explanation": "Joint tenancy requires four unities (TTIP): Time (acquired at the same time), Title (same deed/document), Interest (equal shares), and Possession (equal right to possess the whole). Marriage is NOT a required unity—joint tenancy can exist between any co-owners, not just spouses."}, {"id": 5, "category": "Property Ownership", "q": "The right of survivorship is a feature of:", "choices": ["Tenancy in common", "Joint tenancy", "Tenancy at sufferance", "Estate for years"], "answer": 1, "hint": "When one owner dies, their share automatically passes to the surviving owner(s).", "explanation": "Joint tenancy includes the right of survivorship, meaning when one joint tenant dies, their interest automatically passes to the surviving joint tenant(s) without probate. Tenancy in common does NOT include survivorship—each tenant's share passes through their estate."}, {"id": 6, "category": "Property Ownership", "q": "Community property in California is property acquired:", "choices": ["Before marriage by either spouse", "By gift during marriage", "During marriage using marital earnings", "By inheritance during marriage"], "answer": 2, "hint": "Think about what is earned or acquired through joint marital effort.", "explanation": "In California, community property is property acquired during marriage through the labor or skill of either spouse. Property acquired before marriage, or by gift or inheritance during marriage, is separate property. Community property is owned equally (50/50) by both spouses."}, {"id": 7, "category": "Property Ownership", "q": "An appurtenant easement:", "choices": ["Benefits a specific parcel of land", "Benefits a specific person", "Expires when the property is sold", "Cannot be transferred"], "answer": 0, "hint": "This type of easement 'runs with the land' and involves two parcels.", "explanation": "An appurtenant easement benefits a specific parcel of land (the dominant tenement) and burdens an adjacent parcel (the servient tenement). It runs with the land, meaning it transfers automatically when either parcel is sold. An easement in gross, by contrast, benefits a specific person or entity."}, {"id": 8, "category": "Property Ownership", "q": "Which type of estate is created when a property owner says, 'I grant this property to you for as long as you live'?", "choices": ["Fee simple absolute", "Fee simple defeasible", "Life estate", "Estate for years"], "answer": 2, "hint": "The duration of ownership is tied to someone's lifetime.", "explanation": "A life estate is created when ownership is limited to the lifetime of a specified person (the life tenant). Upon that person's death, the property either reverts to the original grantor (reversion) or passes to a designated third party (remainder). The life tenant cannot will the property."}, {"id": 9, "category": "Property Ownership", "q": "A tenant in common differs from a joint tenant in that a tenant in common:", "choices": ["Must have equal shares", "Has right of survivorship", "Can will their interest to heirs", "Must acquire title at the same time"], "answer": 2, "hint": "Consider what happens when one co-owner passes away.", "explanation": "Unlike joint tenants, tenants in common can will their interest to heirs because there is no right of survivorship. They can also own unequal shares and acquire their interests at different times through different documents. The only required unity is possession—all co-owners have equal right to possess the whole property."}, {"id": 10, "category": "Property Ownership", "q": "Escheat refers to the government's power to:", "choices": ["Take property for public use with compensation", "Regulate property use through zoning", "Take property of a deceased person who dies without heirs", "Levy property taxes"], "answer": 2, "hint": "This applies when someone dies intestate with no known heirs.", "explanation": "Escheat is the government's power to take title to property when the owner dies intestate (without a will) and has no known heirs. This prevents property from being ownerless. Eminent domain is taking property for public use (with compensation), police power covers zoning, and taxation is the power to levy taxes."}, {"id": 11, "category": "Property Ownership", "q": "Eminent domain requires:", "choices": ["The property owner's consent", "Just compensation to the property owner", "A unanimous vote by the city council", "That the property be abandoned"], "answer": 1, "hint": "The Fifth Amendment to the U.S. Constitution addresses this.", "explanation": "Eminent domain allows the government to take private property for public use, but the Fifth Amendment requires that the owner receive just compensation (fair market value). The owner's consent is NOT required—the process is called condemnation. The property does not need to be abandoned."}, {"id": 12, "category": "Property Ownership", "q": "A prescriptive easement is acquired through:", "choices": ["A written agreement between neighbors", "Open and notorious use for the statutory period", "A court order after a boundary dispute", "Payment of fair market value"], "answer": 1, "hint": "Similar to adverse possession, but for use rather than ownership.", "explanation": "A prescriptive easement is acquired through continuous, open, notorious, hostile, and adverse use of another's property for the statutory period (5 years in California). No written agreement or payment is required. Unlike adverse possession, prescriptive easement gives a right to use, not ownership."}, {"id": 13, "category": "Property Ownership", "q": "In California, adverse possession requires all of the following EXCEPT:", "choices": ["Open and notorious possession", "Payment of property taxes for 5 years", "Permission from the true owner", "Continuous possession for 5 years"], "answer": 2, "hint": "Adverse possession must be hostile—meaning without the owner's permission.", "explanation": "Adverse possession in California requires: open and notorious possession, hostile (without permission), continuous for 5 consecutive years, under claim of right or color of title, AND payment of all property taxes for those 5 years. Permission from the owner would defeat the claim since the use must be hostile."}, {"id": 14, "category": "Property Ownership", "q": "A deed restriction that prohibits sale to members of a particular race is:", "choices": ["Enforceable if all neighbors agree", "Void and unenforceable", "Valid but only for 20 years", "Enforceable under state law"], "answer": 1, "hint": "Federal fair housing laws address discriminatory restrictions.", "explanation": "Racially restrictive covenants are void and unenforceable under the Fair Housing Act (1968) and the U.S. Supreme Court's decision in Shelley v. Kraemer (1948). Any deed restriction that discriminates based on race, color, religion, national origin, sex, familial status, or disability is illegal and unenforceable."}, {"id": 15, "category": "Property Ownership", "q": "Which of the following is an example of an encumbrance on real property?", "choices": ["A mortgage lien", "Fee simple ownership", "A tenancy in common", "An estate at will"], "answer": 0, "hint": "An encumbrance is anything that affects title or use of property.", "explanation": "A mortgage lien is an encumbrance—it is a claim against the property that affects the title. Other encumbrances include easements, deed restrictions, judgments, and tax liens. Fee simple ownership, tenancy in common, and estate at will are forms of ownership or tenancy, not encumbrances."}, {"id": 16, "category": "Property Ownership", "q": "A homestead exemption in California protects:", "choices": ["All equity in a home from any creditor", "A portion of home equity from forced sale by creditors", "The home from property tax increases", "The owner from eminent domain"], "answer": 1, "hint": "This protection limits how much creditors can force you to pay from your home equity.", "explanation": "California's homestead exemption protects a portion of the equity in a homeowner's primary residence from forced sale to satisfy most debts. As of recent California law, the exemption is the greater of $300,000 or the countywide median sale price (up to $600,000). It does NOT protect all equity or prevent all creditor claims."}, {"id": 17, "category": "Property Ownership", "q": "Trade fixtures are considered:", "choices": ["Real property belonging to the landlord", "Personal property of the commercial tenant", "Part of the building structure", "Government property"], "answer": 1, "hint": "A business tenant installs these for conducting their trade or business.", "explanation": "Trade fixtures are items installed by a commercial tenant for use in their business (e.g., display cases, shelving, machinery). They remain the tenant's personal property and can be removed before or at the end of the lease, provided the tenant repairs any damage caused by removal. Residential fixtures become the landlord's property."}, {"id": 18, "category": "Property Ownership", "q": "The legal description method that uses degrees, minutes, and seconds is called:", "choices": ["Lot and block", "Metes and bounds", "Government survey", "Assessor's parcel number"], "answer": 1, "hint": "This method describes property boundaries by directions and distances from a point of beginning.", "explanation": "Metes and bounds uses compass directions (degrees, minutes, seconds) and distances to describe property boundaries, starting from a point of beginning (POB) and returning to it. Lot and block references a recorded subdivision map. The government (rectangular) survey uses principal meridians, baselines, townships, and sections."}, {"id": 19, "category": "Property Ownership", "q": "In the government survey system, a section of land contains:", "choices": ["36 acres", "160 acres", "640 acres", "5,280 acres"], "answer": 2, "hint": "A township has 36 sections, and a township is 6 miles × 6 miles.", "explanation": "A section in the government (rectangular) survey system is one square mile, which equals 640 acres. A township is 6 miles × 6 miles and contains 36 sections. A quarter section is 160 acres. These measurements are fundamental to understanding legal descriptions of rural land."}, {"id": 20, "category": "Property Ownership", "q": "Littoral rights pertain to property that borders:", "choices": ["A flowing stream or river", "A lake, ocean, or sea", "A government-owned road", "An underground aquifer"], "answer": 1, "hint": "Distinguish between moving water and standing/large bodies of water.", "explanation": "Littoral rights relate to property bordering stationary bodies of water such as lakes, oceans, and seas. Riparian rights relate to property bordering flowing water such as rivers and streams. Littoral owners generally own to the mean high-water mark. Both are real property rights that transfer with the land."}, {"id": 21, "category": "Property Ownership", "q": "An easement by necessity is typically created when:", "choices": ["A property owner grants permission to a neighbor", "A landlocked parcel needs access to a public road", "The government condemns property", "A tenant improves the property"], "answer": 1, "hint": "Think about a parcel of land that has no other way to access a road.", "explanation": "An easement by necessity arises when a parcel is landlocked and has no access to a public road. The law implies this easement out of necessity, typically when a larger parcel is subdivided and one resulting parcel has no road access. It is essential for the landlocked parcel to be usable."}, {"id": 22, "category": "Property Ownership", "q": "A lien that affects all property owned by the debtor is called a:", "choices": ["Specific lien", "General lien", "Voluntary lien", "Mechanic's lien"], "answer": 1, "hint": "Consider the scope—does it affect one property or all properties?", "explanation": "A general lien attaches to all property owned by the debtor, both real and personal (e.g., judgment liens, IRS tax liens). A specific lien attaches to only one identified property (e.g., mortgage, property tax lien, mechanic's lien). This distinction is important for understanding creditor priorities."}, {"id": 23, "category": "Property Ownership", "q": "Which government power allows regulation of land use through zoning?", "choices": ["Eminent domain", "Police power", "Taxation", "Escheat"], "answer": 1, "hint": "This is the broadest governmental power over private property.", "explanation": "Police power is the government's authority to enact laws and regulations for the health, safety, morals, and general welfare of the public, including zoning laws, building codes, and environmental regulations. Unlike eminent domain, police power does NOT require compensation to property owners."}, {"id": 24, "category": "Property Ownership", "q": "A condominium owner holds title to:", "choices": ["Only the interior airspace of their unit", "The land beneath their unit", "The entire building", "Only the common areas"], "answer": 0, "hint": "Condo ownership separates individual unit space from shared areas.", "explanation": "A condominium owner holds fee simple title to the airspace within their individual unit plus an undivided interest in the common areas (hallways, grounds, pools, etc.). The unit boundaries are typically defined from the interior surfaces of walls, floors, and ceilings. The land is part of the common area."}, {"id": 25, "category": "Property Ownership", "q": "In a cooperative (co-op), the owner holds:", "choices": ["Fee simple title to their unit", "A leasehold interest and shares of stock in the corporation", "A life estate in their unit", "An easement to use common areas only"], "answer": 1, "hint": "Co-op ownership involves a corporation that owns the building.", "explanation": "In a cooperative, a corporation owns the entire building. Individual 'owners' purchase shares of stock in the corporation and receive a proprietary lease giving them the right to occupy a specific unit. This is fundamentally different from a condo, where each owner holds fee simple title to their unit."}, {"id": 26, "category": "Contracts", "q": "A valid real estate contract requires all of the following EXCEPT:", "choices": ["Competent parties", "Lawful objective", "Notarization", "Consideration"], "answer": 2, "hint": "Think about the essential elements of any valid contract.", "explanation": "A valid real estate contract requires: competent parties, mutual consent (offer and acceptance), lawful objective, sufficient consideration, and compliance with the Statute of Frauds (in writing and signed). Notarization is NOT required for contract validity—it is required for recording documents."}, {"id": 27, "category": "Contracts", "q": "The Statute of Frauds requires that real estate contracts be:", "choices": ["Notarized and recorded", "In writing and signed by the party to be charged", "Approved by an attorney", "Filed with the county recorder"], "answer": 1, "hint": "This statute prevents fraud by requiring certain contracts be documented.", "explanation": "The Statute of Frauds requires that contracts for the sale of real property (and leases over one year) be in writing and signed by the party to be charged (the party against whom enforcement is sought). Oral real estate contracts are generally unenforceable. Notarization and recording are separate requirements."}, {"id": 28, "category": "Contracts", "q": "Liquidated damages in a California residential purchase agreement are typically:", "choices": ["5% of the purchase price", "3% of the purchase price or the deposit, whichever is less", "10% of the purchase price", "The full deposit amount regardless of size"], "answer": 1, "hint": "California law caps liquidated damages in residential contracts at a specific percentage.", "explanation": "In California residential real estate (1-4 units intended as buyer's residence), liquidated damages are limited to 3% of the purchase price or the actual deposit amount, whichever is less. Both buyer and seller must initial the liquidated damages clause for it to be effective. This protects buyers from excessive forfeitures."}, {"id": 29, "category": "Contracts", "q": "An offer to purchase real estate can be terminated by all of the following EXCEPT:", "choices": ["Revocation by the offeror before acceptance", "Death of the offeror", "A counteroffer by the offeree", "Inquiry by the offeree about different terms"], "answer": 3, "hint": "Not all responses to an offer terminate it—some are just questions.", "explanation": "An offer can be terminated by: revocation before acceptance, rejection, counteroffer, death or incapacity of either party, expiration, or destruction of the subject property. However, a mere inquiry about terms does NOT terminate the offer—only a counteroffer (which proposes different terms) does."}, {"id": 30, "category": "Contracts", "q": "When a buyer makes an offer and the seller changes the price, this creates a:", "choices": ["Binding contract", "Counteroffer", "Void agreement", "Unilateral contract"], "answer": 1, "hint": "Any change to the original offer terms creates something new.", "explanation": "When a seller changes any term of the buyer's offer (including price), it constitutes a counteroffer, which is a rejection of the original offer and a new offer. The original offer is terminated, and the buyer can now accept, reject, or counter the seller's counteroffer. There is no contract until acceptance of identical terms."}, {"id": 31, "category": "Contracts", "q": "A voidable contract is one that:", "choices": ["Has no legal effect from the beginning", "Can be rescinded by one party due to some defect", "Is always enforceable", "Requires court approval to be valid"], "answer": 1, "hint": "One party has the option to enforce or disaffirm the contract.", "explanation": "A voidable contract is valid and enforceable UNLESS the party with the right to disaffirm chooses to void it. Common reasons include: minority (under 18), duress, undue influence, fraud, or misrepresentation. The innocent party can choose to enforce or void the contract. A void contract, by contrast, has no legal effect from the start."}, {"id": 32, "category": "Contracts", "q": "Specific performance is a legal remedy that:", "choices": ["Awards monetary damages for breach", "Forces the breaching party to complete the contract", "Cancels the contract and returns deposits", "Imposes a fine on the breaching party"], "answer": 1, "hint": "This remedy is unique to real estate because every parcel is considered unique.", "explanation": "Specific performance is a court order compelling the breaching party to fulfill their contractual obligations. It is particularly applicable in real estate because each property is considered unique—monetary damages may not adequately compensate for the loss of a specific property. Either buyer or seller can seek this remedy."}, {"id": 33, "category": "Contracts", "q": "A bilateral contract involves:", "choices": ["A promise by one party only", "An exchange of promises by both parties", "A contract with only one condition", "A contract that cannot be assigned"], "answer": 1, "hint": "Both parties make promises to each other.", "explanation": "A bilateral contract involves mutual promises—both parties promise to perform. A standard real estate purchase agreement is bilateral: the buyer promises to pay the price, and the seller promises to deliver title. A unilateral contract involves a promise by one party in exchange for performance by the other (e.g., an option contract)."}, {"id": 34, "category": "Contracts", "q": "An option contract gives the optionee the right to:", "choices": ["Automatically purchase the property", "Purchase the property within a specified time at an agreed price", "Lease the property indefinitely", "Force the seller to reduce the price"], "answer": 1, "hint": "The buyer pays for the right, but is not obligated, to purchase.", "explanation": "An option contract gives the optionee (potential buyer) the right, but not the obligation, to purchase property at a set price within a specified time period. The optionor (seller) is bound to sell if the option is exercised, but the optionee can choose not to buy. Option consideration is typically non-refundable."}, {"id": 35, "category": "Contracts", "q": "Under the parol evidence rule:", "choices": ["Oral agreements always override written contracts", "Prior oral agreements cannot contradict the written contract", "All contracts must include a parol clause", "Witnesses can testify about verbal promises"], "answer": 1, "hint": "This rule protects the integrity of final written agreements.", "explanation": "The parol evidence rule states that once parties have reduced their agreement to a final written contract, prior or contemporaneous oral agreements that contradict the written terms cannot be used to alter the contract. This protects the integrity of written agreements. Exceptions exist for fraud, mistake, or ambiguity."}, {"id": 36, "category": "Contracts", "q": "Time is of the essence in a contract means:", "choices": ["The contract must be completed as quickly as possible", "Failure to perform by the specified date is a material breach", "The contract automatically extends if deadlines are missed", "Only the buyer must meet deadlines"], "answer": 1, "hint": "Deadlines in the contract are strictly enforceable.", "explanation": "When a contract states 'time is of the essence,' all dates and deadlines are strictly binding. Failure to perform by the specified date constitutes a material breach, giving the non-breaching party the right to terminate the contract and seek remedies. Without this clause, reasonable delays may be tolerated."}, {"id": 37, "category": "Contracts", "q": "An assignment of a contract transfers the:", "choices": ["Obligations only", "Rights only", "Both rights and obligations", "Neither rights nor obligations"], "answer": 1, "hint": "The assignor transfers their interest but remains secondarily liable.", "explanation": "An assignment transfers the assignor's contractual rights to the assignee. However, the original obligations typically remain with the assignor unless the other party agrees to a novation (complete substitution). In real estate, contract assignment allows a buyer to transfer their purchase rights to another party."}, {"id": 38, "category": "Contracts", "q": "A novation differs from an assignment in that a novation:", "choices": ["Only transfers rights", "Substitutes a new party and releases the original party from liability", "Requires court approval", "Is only available to sellers"], "answer": 1, "hint": "This completely replaces one party with another in the contract.", "explanation": "A novation substitutes a new party for an original party, completely releasing the original party from all obligations. All parties must agree. Unlike an assignment (where the assignor remains secondarily liable), a novation creates an entirely new contractual relationship with the substitute party."}, {"id": 39, "category": "Contracts", "q": "Mutual consent in a contract requires:", "choices": ["A meeting of the minds between the parties", "Both parties to be represented by attorneys", "A written appraisal of the property", "Government approval"], "answer": 0, "hint": "Both parties must genuinely agree to the same terms.", "explanation": "Mutual consent (meeting of the minds) means both parties agree to the same terms and conditions. It is demonstrated through a valid offer and unconditional acceptance. Without mutual consent—such as when there's fraud, mistake, or duress—the contract may be voidable."}, {"id": 40, "category": "Contracts", "q": "In California, the standard contingency removal period for a residential purchase is typically:", "choices": ["7 days", "17 days", "30 days", "45 days"], "answer": 1, "hint": "The California Residential Purchase Agreement (RPA) has a standard default period.", "explanation": "The standard California Residential Purchase Agreement (CAR RPA) provides a default 17-day contingency period for investigation (inspection), loan, and appraisal contingencies. Buyers can negotiate different timeframes. Failure to remove contingencies within the specified period can give the seller the right to issue a Notice to Buyer to Perform."}, {"id": 41, "category": "Agency", "q": "In California, a real estate agent's fiduciary duties include all of the following EXCEPT:", "choices": ["Care", "Obedience", "Guaranteeing a profit on the sale", "Loyalty"], "answer": 2, "hint": "Remember the acronym COLDAC for fiduciary duties.", "explanation": "An agent's fiduciary duties are represented by COLDAC: Care, Obedience, Loyalty, Disclosure, Accounting, and Confidentiality. An agent is NEVER required to guarantee profits or outcomes. Agents must act in the client's best interest but cannot promise specific financial results."}, {"id": 42, "category": "Agency", "q": "Dual agency occurs when:", "choices": ["Two different brokers represent buyer and seller", "One agent represents both buyer and seller in the same transaction", "A broker represents two buyers bidding on the same property", "An agent works for two different brokerages"], "answer": 1, "hint": "One agent or brokerage represents both sides of the deal.", "explanation": "Dual agency occurs when a single agent (or brokerage) represents both the buyer and seller in the same transaction. In California, dual agency is legal but requires written disclosure and informed consent from BOTH parties. The dual agent must be neutral and cannot advocate for either party's negotiating position."}, {"id": 43, "category": "Agency", "q": "In California, agency disclosure must be made:", "choices": ["Only at closing", "As soon as practicable, before the purchase agreement is executed", "After the home inspection", "Only if the buyer requests it"], "answer": 1, "hint": "California law requires early disclosure of agency relationships.", "explanation": "California Civil Code Section 2079.16 requires that agents provide the Disclosure Regarding Real Estate Agency Relationships form as soon as practicable prior to execution of the purchase agreement. Seller's agents must disclose at listing or before the offer is presented; buyer's agents must disclose before the offer is written."}, {"id": 44, "category": "Agency", "q": "A listing agent owes what level of duty to a prospective buyer?", "choices": ["No duty at all", "Full fiduciary duties identical to their client", "Honest and fair dealing", "A duty to negotiate the lowest price"], "answer": 2, "hint": "Even though the buyer is not the listing agent's client, certain duties still apply.", "explanation": "A listing agent owes full fiduciary duties to their client (the seller), but still owes a duty of honest and fair dealing to all parties, including prospective buyers. This includes not making misrepresentations, disclosing known material facts about the property, and conducting the transaction ethically."}, {"id": 45, "category": "Agency", "q": "An agency relationship in real estate can be created by all of the following EXCEPT:", "choices": ["Express agreement (written contract)", "Ratification", "Estoppel", "Recording a deed"], "answer": 3, "hint": "Agency can be created intentionally or implied by conduct.", "explanation": "Agency relationships can be created by: express agreement (listing agreement, buyer representation agreement), ratification (after-the-fact approval), estoppel (one party's conduct leads another to believe agency exists), or implication (actions imply agency). Recording a deed is a property transfer action, not a method of creating agency."}, {"id": 46, "category": "Agency", "q": "A real estate agent must disclose to the buyer that a property:", "choices": ["Was the site of a natural death more than 3 years ago", "Had a death by murder within the last 3 years", "Was owned by someone with a specific disease", "Is located near a registered sex offender"], "answer": 1, "hint": "California has specific rules about death disclosures with a 3-year window.", "explanation": "California Civil Code Section 1710.2 requires disclosure of deaths on the property within the last 3 years, UNLESS the death was from AIDS or HIV (which is never required to be disclosed). Deaths by murder or suicide within 3 years must be disclosed if asked. After 3 years, there is no obligation. Natural deaths need not be disclosed."}, {"id": 47, "category": "Agency", "q": "The duty of confidentiality in an agency relationship means:", "choices": ["The agent cannot share any information about the property", "The agent must protect the client's private information and negotiating position", "The agent cannot talk to the other party's agent", "The agent must hide material defects from the buyer"], "answer": 1, "hint": "This duty protects the client's strategic interests.", "explanation": "Confidentiality requires the agent to protect the client's private information, such as their motivation to sell/buy, financial situation, or willingness to accept different terms. However, this duty does NOT override the obligation to disclose material defects or make honest representations. An agent cannot conceal defects."}, {"id": 48, "category": "Agency", "q": "In California, a listing agreement between a seller and broker must be:", "choices": ["Oral or written", "In writing with a definite termination date", "Approved by the California DRE", "Filed with the county recorder"], "answer": 1, "hint": "California law requires certain elements in listing agreements.", "explanation": "California law requires that listing agreements be in writing, signed by the seller, include a definite termination date, include the broker's license number, and contain specific disclosures. An oral listing agreement is not enforceable for collecting a commission. The agreement does not need to be filed or approved by the DRE."}, {"id": 49, "category": "Agency", "q": "An agent who exceeds the authority granted by their principal has acted:", "choices": ["Within implied authority", "As a sub-agent", "Ultra vires", "Under apparent authority"], "answer": 2, "hint": "This Latin term means 'beyond the powers.'", "explanation": "Ultra vires means 'beyond the powers' and describes an agent who acts outside the scope of authority granted by the principal. The principal is generally not bound by ultra vires acts unless they ratify them. Agents should always stay within the scope of their actual authority (express or implied)."}, {"id": 50, "category": "Agency", "q": "A net listing is one in which:", "choices": ["The broker receives all proceeds above a minimum price set by the seller", "The seller pays a flat fee regardless of sale price", "Multiple brokers share the commission", "The listing expires after 30 days"], "answer": 0, "hint": "The broker's compensation is the difference between the sale price and the seller's minimum.", "explanation": "In a net listing, the seller sets a minimum acceptable price, and the broker keeps everything above that amount as commission. While legal in California, net listings are discouraged and carry significant risk of fraud claims because the broker is incentivized to get a higher price that mainly benefits themselves. Full disclosure is essential."}, {"id": 51, "category": "Financing", "q": "In California, the most common security instrument for real estate loans is a:", "choices": ["Mortgage", "Deed of trust", "Land contract", "Promissory note"], "answer": 1, "hint": "California uses a three-party instrument involving a trustor, trustee, and beneficiary.", "explanation": "California primarily uses a deed of trust (trust deed) as the security instrument. It involves three parties: the trustor (borrower), the trustee (neutral third party, usually a title company), and the beneficiary (lender). The deed of trust allows non-judicial foreclosure, which is faster and less expensive than judicial foreclosure under a mortgage."}, {"id": 52, "category": "Financing", "q": "The promissory note is the borrower's:", "choices": ["Pledge of property as collateral", "Personal promise to repay the loan", "Agreement to maintain the property", "Transfer of title to the lender"], "answer": 1, "hint": "This document establishes the debt itself, separate from the security.", "explanation": "The promissory note is the borrower's personal promise to repay the loan according to specified terms (amount, interest rate, payment schedule). It creates the debt. The deed of trust (or mortgage) is a separate document that pledges the property as collateral for the note. The note is the primary evidence of the debt."}, {"id": 53, "category": "Financing", "q": "An adjustable-rate mortgage (ARM) typically has:", "choices": ["A fixed interest rate for the entire loan term", "An interest rate that changes based on a financial index", "No interest charges", "A rate that only goes down, never up"], "answer": 1, "hint": "The rate adjusts periodically based on market conditions.", "explanation": "An ARM has an interest rate that adjusts periodically based on a financial index (such as the SOFR or Treasury rate) plus a margin. ARMs typically start with a lower initial rate than fixed-rate loans but carry the risk of rate increases. They usually have caps limiting how much the rate can change per adjustment and over the loan's lifetime."}, {"id": 54, "category": "Financing", "q": "The loan-to-value ratio (LTV) is calculated by:", "choices": ["Dividing the loan amount by the appraised value or purchase price", "Dividing the down payment by the purchase price", "Multiplying the interest rate by the loan term", "Adding the loan amount to the closing costs"], "answer": 0, "hint": "This ratio measures how much of the property's value is being financed.", "explanation": "LTV = Loan Amount ÷ Lower of Appraised Value or Purchase Price. For example, a $400,000 loan on a $500,000 property = 80% LTV. Higher LTV means more risk for the lender, often requiring private mortgage insurance (PMI). Conventional loans typically require 80% LTV or less to avoid PMI."}, {"id": 55, "category": "Financing", "q": "Private mortgage insurance (PMI) is required when:", "choices": ["The borrower has excellent credit", "The LTV exceeds 80% on a conventional loan", "The property is in a flood zone", "The loan is an FHA loan"], "answer": 1, "hint": "This insurance protects the lender, not the borrower.", "explanation": "PMI is typically required when the LTV exceeds 80% on conventional loans (down payment less than 20%). PMI protects the LENDER (not the borrower) against default. It can be cancelled when the LTV reaches 78% through payments, or 80% by borrower request. FHA loans have their own mortgage insurance premium (MIP), not PMI."}, {"id": 56, "category": "Financing", "q": "An FHA loan is:", "choices": ["Funded directly by the Federal Housing Administration", "Insured by the FHA and funded by approved lenders", "Available only to veterans", "Only for investment properties"], "answer": 1, "hint": "The FHA insures the loan but doesn't provide the funds.", "explanation": "FHA loans are made by FHA-approved lenders and INSURED (not funded) by the Federal Housing Administration. The insurance protects the lender against borrower default. FHA loans feature lower down payments (as low as 3.5%), more flexible credit requirements, and are available to any qualifying borrower, not just veterans."}, {"id": 57, "category": "Financing", "q": "VA loans are available to:", "choices": ["Any first-time homebuyer", "Only active-duty military", "Eligible veterans, active-duty military, and surviving spouses", "Only retired military officers"], "answer": 2, "hint": "The VA benefit extends beyond just active-duty personnel.", "explanation": "VA loans (guaranteed by the Department of Veterans Affairs) are available to eligible veterans, active-duty service members, National Guard/Reserve members with qualifying service, and eligible surviving spouses. VA loans offer no down payment, no PMI, and competitive rates. Eligibility is verified through a Certificate of Eligibility (COE)."}, {"id": 58, "category": "Financing", "q": "RESPA (Real Estate Settlement Procedures Act) requires:", "choices": ["A maximum interest rate on all loans", "Disclosure of all settlement costs to the borrower", "That all loans be fixed-rate", "That the seller pay all closing costs"], "answer": 1, "hint": "This federal law promotes transparency in the closing process.", "explanation": "RESPA requires lenders to provide borrowers with disclosures about settlement (closing) costs, prohibits kickbacks and referral fees, limits escrow account deposits, and requires a Closing Disclosure at least 3 business days before closing. RESPA applies to most federally related mortgage loans for residential properties."}, {"id": 59, "category": "Financing", "q": "The Truth in Lending Act (TILA) requires lenders to disclose:", "choices": ["The property's appraised value", "The annual percentage rate (APR)", "The seller's net proceeds", "The buyer's credit score"], "answer": 1, "hint": "This law ensures borrowers can compare the true cost of credit.", "explanation": "TILA (Regulation Z) requires lenders to disclose the APR, total finance charges, amount financed, total of payments, and payment schedule. The APR includes interest plus other loan costs, providing a standardized way to compare loan costs across lenders. TILA also provides a 3-day right of rescission for refinances."}, {"id": 60, "category": "Financing", "q": "In a non-judicial foreclosure in California, the process begins with recording a:", "choices": ["Lis pendens", "Notice of Default", "Quit claim deed", "Writ of execution"], "answer": 1, "hint": "The trustee initiates the process when the borrower falls behind on payments.", "explanation": "Non-judicial foreclosure under a deed of trust begins when the trustee records a Notice of Default (NOD) at the county recorder's office. The borrower has 3 months to cure the default (reinstatement period). If not cured, a Notice of Trustee's Sale is recorded and published, and the sale occurs at least 21 days later."}, {"id": 61, "category": "Financing", "q": "The right of redemption in California allows the borrower to:", "choices": ["Reclaim the property after a non-judicial foreclosure sale", "Cure the default and stop foreclosure before the sale", "Reduce the loan balance by 50%", "Extend the loan term indefinitely"], "answer": 1, "hint": "California distinguishes between reinstatement and redemption rights.", "explanation": "In California, the borrower has a reinstatement period (3 months after NOD) to cure the default by paying all delinquent amounts, fees, and costs. There is generally NO statutory right of redemption after a non-judicial trustee's sale (unlike some states). Judicial foreclosure does provide a redemption period after the sale."}, {"id": 62, "category": "Financing", "q": "A blanket mortgage covers:", "choices": ["A single residential property", "Multiple parcels of real estate", "Only commercial properties", "Mobile homes exclusively"], "answer": 1, "hint": "This type of loan is often used by developers.", "explanation": "A blanket mortgage covers more than one parcel of real property under a single loan. It typically includes a partial release clause allowing individual parcels to be released from the lien as they are sold. This is commonly used by developers subdividing land—they can sell individual lots while keeping the remaining parcels under the blanket loan."}, {"id": 63, "category": "Financing", "q": "A subordination clause in a mortgage:", "choices": ["Prevents additional liens on the property", "Allows a later lien to take priority over the existing lien", "Requires the borrower to make extra payments", "Transfers the loan to a new borrower"], "answer": 1, "hint": "This clause changes the priority order of liens.", "explanation": "A subordination clause allows a later-recorded lien to take priority over an existing lien. For example, a seller who carries back a first mortgage might agree to subordinate to the buyer's new construction loan, making the construction loan first in priority. This is significant because priority determines the order of payment in foreclosure."}, {"id": 64, "category": "Financing", "q": "An alienation clause (due-on-sale clause) requires the borrower to:", "choices": ["Make a balloon payment at the end of the loan", "Pay off the entire loan when the property is sold or transferred", "Maintain hazard insurance", "Pay property taxes through an impound account"], "answer": 1, "hint": "This clause prevents the borrower from transferring the property without lender approval.", "explanation": "An alienation (due-on-sale) clause allows the lender to demand full repayment of the loan if the property is sold or transferred without the lender's consent. This prevents buyers from assuming loans with favorable terms. The Garn-St. Germain Act (1982) allows enforcement of these clauses for most loans."}, {"id": 65, "category": "Financing", "q": "A purchase money mortgage is:", "choices": ["Any loan used to buy a home", "Seller financing where the seller carries back a note", "A government-backed loan", "A commercial loan for investment property"], "answer": 1, "hint": "The seller acts as the lender in this arrangement.", "explanation": "A purchase money mortgage (or deed of trust) is seller financing—the seller carries back a note secured by the property being sold. The seller essentially lends the buyer part of the purchase price. In California, purchase money loans on owner-occupied 1-4 unit properties are non-recourse, meaning the lender can only foreclose on the property, not pursue the borrower's other assets."}, {"id": 66, "category": "Valuation", "q": "The three approaches to appraising real property are:", "choices": ["Cost, income, and sales comparison", "Assessment, insurance, and market", "Replacement, reproduction, and liquidation", "Comparative, competitive, and analytical"], "answer": 0, "hint": "Each approach uses a different method to determine value.", "explanation": "The three approaches to value are: (1) Sales Comparison (Market) Approach—compares similar recently sold properties; (2) Cost Approach—estimates land value plus cost to reproduce/replace improvements minus depreciation; (3) Income Approach—capitalizes the property's income stream. Appraisers use one or more approaches depending on the property type."}, {"id": 67, "category": "Valuation", "q": "In the sales comparison approach, adjustments are always made to the:", "choices": ["Subject property", "Comparable properties", "Both properties equally", "The listing price"], "answer": 1, "hint": "You can't change the subject—you adjust the comparables to match it.", "explanation": "In the sales comparison approach, adjustments are ALWAYS made to the comparable (sold) properties, NOT to the subject property. If a comparable has a feature the subject lacks, you subtract value from the comparable. If the subject has a feature the comparable lacks, you add value to the comparable. Remember: 'CBS—Comparable Better Subtract.'"}, {"id": 68, "category": "Valuation", "q": "The principle of substitution states that:", "choices": ["A buyer will not pay more for a property than the cost of an equally desirable substitute", "Properties increase in value over time", "Land is always worth more than improvements", "Newer properties are always worth more"], "answer": 0, "hint": "This principle underlies all three approaches to value.", "explanation": "The principle of substitution states that a prudent buyer will pay no more for a property than the cost of acquiring an equally desirable substitute property. This principle is the foundation of the sales comparison approach and also underlies the cost approach (substitute by building new) and income approach (substitute investment returns)."}, {"id": 69, "category": "Valuation", "q": "Net operating income (NOI) is calculated by subtracting:", "choices": ["Mortgage payments from gross income", "Operating expenses from effective gross income", "Depreciation from gross income", "Capital gains taxes from net income"], "answer": 1, "hint": "NOI is before debt service—it's the income the property generates from operations.", "explanation": "NOI = Effective Gross Income - Operating Expenses. Operating expenses include taxes, insurance, maintenance, management, utilities, and reserves for replacement—but NOT debt service (mortgage payments), income taxes, or depreciation. NOI represents the property's income from operations before financing costs."}, {"id": 70, "category": "Valuation", "q": "The capitalization rate (cap rate) is calculated by:", "choices": ["Dividing NOI by the property value (or sale price)", "Multiplying NOI by the interest rate", "Dividing the sale price by the gross rent", "Subtracting expenses from the sale price"], "answer": 0, "hint": "Cap Rate = Income ÷ Value. This measures the rate of return.", "explanation": "Cap Rate = NOI ÷ Value (or Sale Price). For example, if NOI is $50,000 and the property sells for $500,000, the cap rate is 10%. To find value using the income approach: Value = NOI ÷ Cap Rate. A higher cap rate suggests higher risk/return; a lower cap rate suggests lower risk/return and typically higher property values."}, {"id": 71, "category": "Valuation", "q": "Economic obsolescence is caused by factors:", "choices": ["Within the property itself", "In the immediate neighborhood or market area", "Related to the age of the building", "Chosen by the property owner"], "answer": 1, "hint": "This type of depreciation comes from external factors beyond the owner's control.", "explanation": "Economic (external) obsolescence is depreciation caused by factors outside the property, such as proximity to nuisances, declining neighborhood conditions, adverse zoning changes, or economic downturns. It is generally incurable. Physical deterioration relates to the building condition; functional obsolescence relates to design flaws."}, {"id": 72, "category": "Valuation", "q": "The gross rent multiplier (GRM) for residential property is calculated by:", "choices": ["Dividing the sale price by the monthly gross rent", "Multiplying the NOI by 12", "Dividing the NOI by the cap rate", "Adding the rent to the sale price"], "answer": 0, "hint": "GRM is a simple ratio using sale price and rent.", "explanation": "GRM = Sale Price ÷ Monthly Gross Rent. For example, if a property sells for $300,000 and the monthly rent is $2,500, the GRM is 120. To estimate value: Value = Monthly Rent × GRM. The GRM is a quick, rough estimate tool—it doesn't account for expenses. The income approach using cap rates is more precise."}, {"id": 73, "category": "Valuation", "q": "The principle of highest and best use considers which of the following criteria?", "choices": ["Legally permissible, physically possible, financially feasible, and maximally productive", "The current use only", "The most expensive improvements", "What the government dictates"], "answer": 0, "hint": "Four criteria must all be met for a use to qualify as highest and best.", "explanation": "Highest and best use is the use that is (1) legally permissible (zoning, deed restrictions), (2) physically possible (size, shape, topography), (3) financially feasible (generates adequate return), and (4) maximally productive (generates the highest value). All four criteria must be met. This concept is fundamental to appraisal."}, {"id": 74, "category": "Valuation", "q": "Depreciation in appraisal refers to:", "choices": ["The tax deduction for rental property", "Any loss in value from any cause", "Only physical wear and tear", "The decline in land value"], "answer": 1, "hint": "Appraisal depreciation is broader than just physical deterioration.", "explanation": "In appraisal, depreciation is any loss in value from ANY cause, including: physical deterioration (wear and tear), functional obsolescence (outdated design or features), and economic/external obsolescence (adverse external factors). Note: land does NOT depreciate—only improvements. Appraisal depreciation is different from tax depreciation."}, {"id": 75, "category": "Valuation", "q": "The principle of conformity suggests that property values are maximized when:", "choices": ["Each property is unique and stands out", "Properties in an area are reasonably similar", "Properties are always the largest in the neighborhood", "There is maximum variety in a neighborhood"], "answer": 1, "hint": "Homogeneity in a neighborhood tends to protect values.", "explanation": "The principle of conformity states that property values are maximized when properties in an area are reasonably similar (homogeneous) in size, style, age, and quality. This is related to the concepts of regression (a superior property's value decreases in an inferior area) and progression (an inferior property's value increases in a superior area)."}, {"id": 76, "category": "Transfer of Property", "q": "A grant deed in California:", "choices": ["Contains no warranties whatsoever", "Implies that the grantor has not conveyed the property to anyone else", "Guarantees the title against all defects", "Is the same as a quitclaim deed"], "answer": 1, "hint": "This is the most commonly used deed in California.", "explanation": "A California grant deed contains two implied warranties: (1) the grantor has not previously conveyed the same property to someone else, and (2) the grantor has not encumbered the property except as disclosed. It does NOT guarantee against all defects. A warranty deed offers the most protection; a quitclaim deed offers none."}, {"id": 77, "category": "Transfer of Property", "q": "A quitclaim deed:", "choices": ["Guarantees clear title", "Transfers whatever interest the grantor may have, with no warranties", "Is required for all property transfers", "Cannot be recorded"], "answer": 1, "hint": "This deed offers the least protection to the grantee.", "explanation": "A quitclaim deed transfers whatever interest the grantor may have in the property—which could be full ownership, partial interest, or nothing at all. It contains NO warranties or guarantees about the quality of title. Quitclaim deeds are commonly used between family members, to clear clouds on title, or in divorce transfers."}, {"id": 78, "category": "Transfer of Property", "q": "To be valid, a deed must contain all of the following EXCEPT:", "choices": ["A competent grantor", "An identifiable grantee", "Recording at the county recorder's office", "Delivery and acceptance"], "answer": 2, "hint": "A deed can be valid even if it's not in the public record.", "explanation": "A valid deed requires: a competent grantor, an identifiable grantee, a legal description, granting clause (words of conveyance), the grantor's signature, and delivery and acceptance. Recording is NOT required for validity—it protects against subsequent purchasers by providing constructive notice, but the deed is valid between the parties without recording."}, {"id": 79, "category": "Transfer of Property", "q": "Title insurance protects the insured against:", "choices": ["Future defects in title", "Defects in title that existed BEFORE the policy date", "Physical damage to the property", "Environmental contamination"], "answer": 1, "hint": "Title insurance looks backward, not forward.", "explanation": "Title insurance protects against defects, liens, and encumbrances that existed BEFORE the policy date but were not known or disclosed. It does NOT protect against future defects or claims arising after the policy date. A standard policy protects against recorded defects; an extended (ALTA) policy also covers unrecorded claims like encroachments."}, {"id": 80, "category": "Transfer of Property", "q": "In California, property taxes become a lien on the property on:", "choices": ["The date the bill is mailed", "January 1 of each year", "The date of closing", "The date taxes are delinquent"], "answer": 1, "hint": "California's fiscal year for property taxes begins July 1.", "explanation": "In California, the property tax lien attaches on January 1 of each year (the lien date). Taxes are based on the assessed value as of that date. The fiscal tax year runs July 1 to June 30. First installment is due November 1 (delinquent December 10); second installment is due February 1 (delinquent April 10)."}, {"id": 81, "category": "Transfer of Property", "q": "Constructive notice means:", "choices": ["Personal delivery of legal documents", "Notice presumed by law through recording or possession", "A telephone call informing someone of a transaction", "Notice given by a real estate agent"], "answer": 1, "hint": "You're presumed to know what's in the public records.", "explanation": "Constructive notice is notice presumed by law—the public is considered to have notice of anything properly recorded in the public records or discoverable through reasonable inspection (such as someone in possession of the property). Actual notice is information directly known to a person. Recording provides constructive notice to the world."}, {"id": 82, "category": "Transfer of Property", "q": "Under California's Proposition 13 (1978), property is reassessed at market value when:", "choices": ["Every year", "Every 5 years", "Upon change of ownership or new construction", "Only when the owner requests it"], "answer": 2, "hint": "Prop 13 limits annual increases to 2%, with full reassessment at certain triggers.", "explanation": "Proposition 13 limits property tax to 1% of the assessed value (at the time of purchase), with annual increases capped at 2% per year. The property is reassessed to current market value upon a change of ownership or completion of new construction. This is a fundamental California real estate concept."}, {"id": 83, "category": "Transfer of Property", "q": "A lis pendens is:", "choices": ["A type of deed", "A recorded notice of a pending lawsuit affecting real property", "An eviction notice", "A foreclosure sale receipt"], "answer": 1, "hint": "This provides constructive notice that litigation may affect the property.", "explanation": "A lis pendens (Latin for 'lawsuit pending') is a recorded notice that a lawsuit has been filed that may affect title to or possession of real property. It serves as constructive notice to potential buyers and lenders that the property is involved in litigation. It can cloud the title, making it difficult to sell or refinance."}, {"id": 84, "category": "Transfer of Property", "q": "The documentary transfer tax in California is based on:", "choices": ["The appraised value of the property", "The selling price of the property (equity transferred)", "The assessed value for tax purposes", "A flat fee per transaction"], "answer": 1, "hint": "This tax is paid at the time of recording and based on the consideration.", "explanation": "The documentary transfer tax is imposed on the transfer of real property and is based on the selling price or consideration (excluding any existing liens assumed by the buyer). The county rate is $1.10 per $1,000 of value transferred. Some cities impose an additional city transfer tax. The tax is typically shown on the deed."}, {"id": 85, "category": "Transfer of Property", "q": "Probate is the legal process of:", "choices": ["Recording a deed", "Administering a deceased person's estate", "Foreclosing on a property", "Appraising property for tax purposes"], "answer": 1, "hint": "This court process validates a will and distributes the deceased's assets.", "explanation": "Probate is the court-supervised process of validating a deceased person's will (if one exists), identifying and appraising assets, paying debts and taxes, and distributing remaining property to heirs or beneficiaries. Property held in joint tenancy or a living trust generally avoids probate."}, {"id": 86, "category": "Practice of Real Estate", "q": "In California, a real estate license is issued by the:", "choices": ["California Association of Realtors", "Department of Real Estate (DRE)", "Federal Housing Administration", "County Board of Supervisors"], "answer": 1, "hint": "This state agency regulates real estate licensees.", "explanation": "The California Department of Real Estate (DRE) is the state agency responsible for issuing real estate licenses, enforcing real estate law, and regulating the conduct of licensees. The DRE is headed by the Real Estate Commissioner, who is appointed by the Governor. The California Association of Realtors (CAR) is a trade organization, not a licensing body."}, {"id": 87, "category": "Practice of Real Estate", "q": "A California real estate salesperson must work under the supervision of a:", "choices": ["Real estate attorney", "Licensed real estate broker", "Title company", "Mortgage lender"], "answer": 1, "hint": "Salespersons cannot operate independently.", "explanation": "California law requires that a salesperson work under the supervision of a licensed real estate broker. The broker is responsible for the salesperson's actions and must review and approve their transactions. A salesperson cannot independently negotiate, solicit, or collect commissions—all compensation must flow through their broker."}, {"id": 88, "category": "Practice of Real Estate", "q": "Trust fund handling requires a California broker to deposit client funds into a trust account within:", "choices": ["24 hours", "3 business days of receipt", "10 business days", "30 days"], "answer": 1, "hint": "California law has strict timelines for handling other people's money.", "explanation": "A California broker must deposit trust funds (earnest money, security deposits, etc.) into a trust account within 3 business days of receipt, or into escrow with the buyer's written instructions. Commingling (mixing trust funds with personal or business funds) is prohibited and is grounds for license revocation."}, {"id": 89, "category": "Practice of Real Estate", "q": "A person who performs real estate activities without a license is guilty of a:", "choices": ["Civil infraction", "Misdemeanor", "Felony", "No violation exists"], "answer": 1, "hint": "Practicing without a license is a criminal offense in California.", "explanation": "In California, performing real estate activities (negotiating, soliciting, or arranging transactions) without a license or while a license is suspended or revoked is a misdemeanor. Penalties can include fines up to $20,000 and/or up to 6 months in county jail. Repeated violations may result in increased penalties."}, {"id": 90, "category": "Practice of Real Estate", "q": "Commingling in real estate means:", "choices": ["Mixing trust funds with the broker's personal or business funds", "Depositing trust funds in an escrow account", "Investing trust funds in securities", "Keeping separate accounts for each client"], "answer": 0, "hint": "This is a serious violation of trust fund handling rules.", "explanation": "Commingling is the illegal mixing of client trust funds with the broker's personal or business funds. A broker must maintain a separate trust account for client funds. However, a broker may keep up to $200 of personal funds in the trust account to cover bank fees. Commingling is grounds for license discipline or revocation."}, {"id": 91, "category": "Land Use", "q": "Zoning ordinances are enacted under the government's:", "choices": ["Power of eminent domain", "Police power", "Power of taxation", "Power of escheat"], "answer": 1, "hint": "This power allows government to regulate for public health, safety, and welfare.", "explanation": "Zoning ordinances are enacted under the government's police power—the authority to regulate private property use for public health, safety, morals, and general welfare. No compensation is required (unlike eminent domain). Zoning controls land use (residential, commercial, industrial), density, setbacks, building height, and lot coverage."}, {"id": 92, "category": "Land Use", "q": "A variance is:", "choices": ["A change in the entire zoning of an area", "Permission to deviate from existing zoning requirements for a specific property", "A building permit", "A type of deed restriction"], "answer": 1, "hint": "This provides relief when strict zoning compliance would cause undue hardship.", "explanation": "A variance is permission granted by the local zoning board to deviate from existing zoning requirements for a specific property due to unique hardship. The owner must show that strict compliance would create an unnecessary hardship NOT shared by other properties in the area. A variance runs with the land, not the owner."}, {"id": 93, "category": "Land Use", "q": "A nonconforming use is:", "choices": ["A property use that was never legal", "A property use that was legal before a zoning change and is allowed to continue", "A violation of building codes", "A temporary use permit"], "answer": 1, "hint": "Sometimes called a 'grandfather' use.", "explanation": "A nonconforming use (grandfathered use) is a property use that was legally established before a zoning change and is now inconsistent with current zoning. The use is typically allowed to continue but cannot be expanded or, if discontinued for a certain period, may not be resumed. Substantial destruction may also end the right."}, {"id": 94, "category": "Land Use", "q": "CC&Rs (Covenants, Conditions, and Restrictions) are:", "choices": ["Government zoning regulations", "Private restrictions placed on property, often by developers", "Building code requirements", "Environmental protection rules"], "answer": 1, "hint": "These are private, not governmental, restrictions on land use.", "explanation": "CC&Rs are private restrictions placed on property, typically by a developer when a subdivision is created, or by a homeowners association (HOA). They run with the land and bind all future owners. CC&Rs may regulate property appearance, use, maintenance, pets, parking, and more. They are enforceable by the HOA or other property owners."}, {"id": 95, "category": "Land Use", "q": "Under CERCLA (Superfund), liability for environmental contamination can fall on:", "choices": ["Only the party that caused the contamination", "Only the current owner", "Current owners, past owners, transporters, and generators of hazardous substances", "Only the federal government"], "answer": 2, "hint": "Environmental liability under Superfund is broad and can affect many parties.", "explanation": "CERCLA (Comprehensive Environmental Response, Compensation, and Liability Act) imposes strict, joint, and several liability on: current property owners/operators, past owners/operators at the time of disposal, those who arranged for disposal, and transporters who selected the disposal site. Even innocent purchasers can be liable unless they qualify for the innocent landowner defense."}, {"id": 96, "category": "Land Use", "q": "Lead-based paint disclosure is required for residential properties built before:", "choices": ["1960", "1970", "1978", "1985"], "answer": 2, "hint": "Federal law banned lead-based paint for residential use in this year.", "explanation": "Federal law (Title X / Residential Lead-Based Paint Hazard Reduction Act of 1992) requires sellers and landlords of residential properties built before 1978 to disclose known lead-based paint hazards, provide a federal pamphlet, and give buyers a 10-day period to conduct a lead inspection. Lead-based paint was banned for residential use in 1978."}, {"id": 97, "category": "Land Use", "q": "The Americans with Disabilities Act (ADA) primarily applies to:", "choices": ["All residential properties", "Commercial properties and public accommodations", "Only government buildings", "Only new construction"], "answer": 1, "hint": "The ADA focuses on accessibility in places open to the public.", "explanation": "The ADA requires that commercial facilities and places of public accommodation (stores, restaurants, offices, hotels) be accessible to persons with disabilities. This includes removing barriers in existing buildings where readily achievable and ensuring new construction is fully accessible. Residential properties are primarily covered by the Fair Housing Act, not the ADA."}, {"id": 98, "category": "Land Use", "q": "Mello-Roos taxes in California are:", "choices": ["Standard property taxes based on assessed value", "Special taxes to fund public infrastructure in Community Facilities Districts", "Income taxes on real estate profits", "Transfer taxes paid at closing"], "answer": 1, "hint": "These appear on your property tax bill and fund community infrastructure.", "explanation": "Mello-Roos Community Facilities District (CFD) taxes are special taxes levied on properties in designated districts to fund public infrastructure (roads, sewers, schools, parks, fire/police services). They are in addition to regular property taxes and must be disclosed to buyers. Mello-Roos taxes are common in newer California subdivisions."}, {"id": 99, "category": "Land Use", "q": "The California Environmental Quality Act (CEQA) requires:", "choices": ["All property owners to have an environmental audit", "Environmental review of projects that may significantly impact the environment", "Weekly property inspections by the EPA", "Mandatory solar panels on all buildings"], "answer": 1, "hint": "CEQA is California's state-level environmental review process.", "explanation": "CEQA requires state and local agencies to evaluate the environmental impacts of proposed projects before approval. An Environmental Impact Report (EIR) is required when a project may have significant environmental effects. CEQA applies to both public and private projects that require governmental approval."}, {"id": 100, "category": "Land Use", "q": "A conditional use permit (CUP) allows:", "choices": ["A property owner to ignore all zoning restrictions", "A use that is not normally permitted in a zone but may be allowed with conditions", "Temporary construction without a building permit", "Conversion of residential property to industrial use"], "answer": 1, "hint": "Some uses are permitted in a zone only with special approval and conditions.", "explanation": "A conditional use permit (also called a special use permit) allows a use that is not automatically permitted in a zoning district but may be appropriate under specific conditions. For example, a church or school might require a CUP in a residential zone. The applicant must demonstrate the use won't harm the neighborhood, and conditions may be imposed."}, {"id": 101, "category": "Fair Housing", "q": "The Federal Fair Housing Act prohibits discrimination based on all of the following EXCEPT:", "choices": ["Race", "Familial status", "Sexual orientation (as of the original 1968 Act)", "National origin"], "answer": 2, "hint": "The original 1968 Act listed seven protected classes.", "explanation": "The Federal Fair Housing Act (1968, as amended) prohibits discrimination based on race, color, religion, national origin, sex, familial status, and disability (handicap). Sexual orientation was not included in the original Act, though recent interpretations and executive actions have extended some protections. California's Unruh Act and FEHA provide broader state-level protections."}, {"id": 102, "category": "Fair Housing", "q": "Steering in real estate is:", "choices": ["Showing buyers homes in all neighborhoods equally", "Directing buyers to or away from certain neighborhoods based on protected characteristics", "Helping a buyer choose between two properties", "A negotiation tactic used by sellers"], "answer": 1, "hint": "This practice limits a buyer's housing choices based on discriminatory criteria.",
