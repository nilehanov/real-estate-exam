petent and diligent.", "explanation": "The duty of care requires the agent to exercise reasonable skill, competence, and diligence in representing the client. This includes properly marketing the property, conducting required inspections, advising the client on material matters, and staying current on real estate laws and practices. Failure to meet this standard may constitute negligence."}, {"id": 322, "category": "Agency", "q": "A cooperating broker who works with the buyer is typically:", "choices": ["The seller's sub-agent", "Either the buyer's agent or a sub-agent of the seller, depending on the arrangement", "An independent contractor for the buyer", "An employee of the listing broker"], "answer": 1, "hint": "The relationship depends on the specific agency arrangement.", "explanation": "A cooperating broker (selling broker) who works with the buyer may be: (1) the buyer's agent (representing the buyer under a buyer representation agreement), (2) a sub-agent of the seller (representing the seller's interests even while working with the buyer), or (3) a transaction broker. Modern practice strongly favors buyer representation over sub-agency."}, {"id": 323, "category": "Agency", "q": "In California, the agency confirmation in the purchase agreement must disclose:", "choices": ["The commission amount", "Which party each agent represents in the transaction", "The agents' license numbers", "The agents' years of experience"], "answer": 1, "hint": "Both buyer and seller must understand who represents whom.", "explanation": "The agency confirmation (AC) section of the California purchase agreement requires each agent to confirm their agency relationship in the transaction: whether they represent the buyer, the seller, or both (dual agency). Both buyer and seller must acknowledge the disclosed agency relationships by signing the confirmation. This is in addition to the earlier agency disclosure form."}, {"id": 324, "category": "Agency", "q": "A listing broker may be held liable for the acts of:", "choices": ["Only themselves", "Their salespersons and associate licensees acting within the scope of their employment", "All licensees in the area", "Only other brokers"], "answer": 1, "hint": "The broker is responsible for supervising their agents.", "explanation": "Under the doctrine of respondeat superior, a broker is liable for the wrongful acts of their salespersons and associate licensees performed within the scope of employment. This includes negligence, misrepresentation, and violations of real estate law. The broker must supervise licensees and ensure compliance. This is why brokers carry errors and omissions (E&O) insurance."}, {"id": 325, "category": "Financing", "q": "A hard money loan is typically:", "choices": ["A government-backed loan with favorable terms", "A short-term, high-interest loan from private lenders based primarily on the property's value", "A loan from a commercial bank", "A low-interest loan for first-time buyers"], "answer": 1, "hint": "These loans focus on collateral value rather than borrower creditworthiness.", "explanation": "Hard money loans are short-term loans from private investors or companies, primarily based on the value of the property (collateral) rather than the borrower's creditworthiness. They feature higher interest rates (8-15%+), shorter terms (6 months to 3 years), and lower LTV ratios. They're used for quick purchases, rehabs, bridge financing, and situations where conventional loans aren't available."}, {"id": 326, "category": "Financing", "q": "The Dodd-Frank Act was enacted primarily to:", "choices": ["Deregulate the banking industry", "Reform financial regulation after the 2008 financial crisis and protect consumers", "Eliminate the FHA", "Increase interest rates"], "answer": 1, "hint": "This sweeping legislation responded to the 2008 financial crisis.", "explanation": "The Dodd-Frank Wall Street Reform and Consumer Protection Act (2010) was enacted after the 2008 financial crisis to increase financial regulation and consumer protection. Key provisions include: creation of the CFPB, Qualified Mortgage (QM) rules, ability-to-repay requirements, restrictions on predatory lending, and enhanced oversight of financial institutions."}, {"id": 327, "category": "Financing", "q": "A satisfaction of mortgage is:", "choices": ["A new mortgage replacing an old one", "A document recorded when the mortgage is fully paid, releasing the lien", "A monthly payment receipt", "A prepayment penalty"], "answer": 1, "hint": "This clears the mortgage lien from the property's title.", "explanation": "A satisfaction (release or discharge) of mortgage is a document recorded in public records when a mortgage loan is fully paid off. It releases the lien from the property's title. In California, where deeds of trust are used, the equivalent document is a deed of reconveyance. The lender must provide this document promptly after payoff."}, {"id": 328, "category": "Financing", "q": "In a tight money market:", "choices": ["Interest rates are low and loans are easy to obtain", "Interest rates are high and loans are difficult to obtain due to limited money supply", "The government provides free loans", "All banks close"], "answer": 1, "hint": "Money supply affects loan availability and interest rates.", "explanation": "A tight money market occurs when the money supply is restricted, causing interest rates to rise and making loans more difficult to obtain. The Federal Reserve can tighten the money supply by selling government securities, raising the federal funds rate, or increasing reserve requirements. A tight money market slows real estate activity due to reduced purchasing power."}, {"id": 329, "category": "Valuation", "q": "Effective gross income is:", "choices": ["Total possible income with no vacancies", "Gross scheduled income minus vacancy and collection losses, plus other income", "Net operating income", "The income after paying the mortgage"], "answer": 1, "hint": "Start with potential income, then subtract losses and add other income.", "explanation": "Effective Gross Income = Gross Scheduled Income (potential rental income at full occupancy) - Vacancy and Collection Losses + Other Income (parking, laundry, vending). This represents the income the property is actually expected to generate. Operating expenses are then subtracted from EGI to arrive at Net Operating Income (NOI)."}, {"id": 330, "category": "Valuation", "q": "The principle of change states that:", "choices": ["Property values remain constant", "Real estate is always subject to natural, social, economic, and political forces that cause constant change", "Only government actions affect property values", "Change occurs only in commercial properties"], "answer": 1, "hint": "Nothing in real estate stays the same forever.", "explanation": "The principle of change recognizes that real estate markets are constantly affected by natural, social, economic, and political forces. Neighborhoods go through life cycles: growth (development), stability (equilibrium), decline (deterioration), and revitalization (renaissance). Appraisers must consider current trends and anticipate future changes when estimating value."}, {"id": 331, "category": "Valuation", "q": "A highest and best use analysis as if vacant means:", "choices": ["The property should be demolished", "Analyzing what the optimal use of the LAND would be as if it were vacant and available for development", "The property has no current use", "The lot should remain empty"], "answer": 1, "hint": "This analysis considers the land independently from any existing improvements.", "explanation": "Highest and best use 'as if vacant' analyzes the optimal use of the land as though it were vacant and available for development. This may differ from the current use. If the highest and best use as if vacant differs from the current use, the improvements may represent an underimprovement or overimprovement, affecting value. This analysis helps determine land value in the cost approach."}, {"id": 332, "category": "Practice of Real Estate", "q": "A real estate licensee who fails to disclose a material fact to a buyer may be guilty of:", "choices": ["Smart negotiation", "Misrepresentation or fraud, subject to civil liability and license discipline", "Nothing—disclosure is optional", "A minor infraction only"], "answer": 1, "hint": "Disclosure of material facts is a legal and ethical obligation.", "explanation": "Failure to disclose material facts can constitute misrepresentation (negligent or intentional), fraud, or breach of fiduciary duty. The agent may face: civil liability (damages), criminal prosecution, license discipline (suspension/revocation), and claims on their errors and omissions insurance. In California, agents have a specific statutory duty to inspect and disclose."}, {"id": 333, "category": "Practice of Real Estate", "q": "An independent contractor agreement between a broker and salesperson:", "choices": ["Creates an employee relationship", "Defines the salesperson's status as an independent contractor for tax purposes", "Eliminates the broker's supervisory responsibility", "Prevents the salesperson from joining the MLS"], "answer": 1, "hint": "This agreement determines the working relationship for tax and business purposes.", "explanation": "An independent contractor agreement establishes the salesperson's status for tax purposes (responsible for own taxes, no withholding). However, for real estate law purposes, the broker STILL has supervisory responsibility over the salesperson's real estate activities regardless of the IC agreement. The IRS and DRE may look beyond the agreement to the actual working relationship."}, {"id": 334, "category": "Practice of Real Estate", "q": "E&O insurance (errors and omissions) protects:", "choices": ["The buyer from property defects", "Real estate licensees from claims of negligence, errors, or omissions in their professional services", "The seller from market downturns", "The lender from borrower default"], "answer": 1, "hint": "This is professional liability insurance for real estate professionals.", "explanation": "Errors and omissions (E&O) insurance is professional liability insurance that protects real estate licensees and their brokers from claims arising from negligence, errors, or omissions in their professional services. It typically covers defense costs and settlements. Many brokerages require their agents to carry E&O coverage."}, {"id": 335, "category": "Land Use", "q": "A moratorium on development is:", "choices": ["A permanent ban on all construction", "A temporary suspension of new development permits by a governmental authority", "A type of building permit", "A tax on new construction"], "answer": 1, "hint": "This is a temporary pause, not a permanent ban.", "explanation": "A development moratorium is a temporary suspension of new development permits imposed by a local government, typically to address infrastructure concerns, update the general plan, or respond to environmental issues. Moratoria can affect specific areas or types of development. They must be justified and time-limited—indefinite moratoria may face legal challenges."}, {"id": 336, "category": "Land Use", "q": "Transfer of Development Rights (TDR) allows:", "choices": ["Free building without permits", "Property owners to sell unused development rights to developers in other designated areas", "The government to build anywhere", "Developers to ignore zoning"], "answer": 1, "hint": "Development potential is transferred from one area to another.", "explanation": "TDR programs allow property owners in preservation zones (sending areas) to sell their unused development rights to developers in growth areas (receiving areas). The developer can then build at higher density than normally permitted. TDR programs help preserve open space, historic buildings, and agricultural land while allowing growth in appropriate areas."}, {"id": 337, "category": "Fair Housing", "q": "The Fair Housing Amendments Act of 1988 added which protected classes?", "choices": ["Race and color", "Familial status and disability (handicap)", "National origin and religion", "Sex and marital status"], "answer": 1, "hint": "The original 1968 Act was expanded in 1988.", "explanation": "The Fair Housing Amendments Act of 1988 added two protected classes to the original 1968 Act: familial status (families with children under 18, pregnant women, and those securing custody) and disability (handicap). The amendments also strengthened enforcement provisions and authorized HUD to impose civil penalties. The original 1968 Act covered race, color, religion, and national origin; sex was added in 1974."}, {"id": 338, "category": "Fair Housing", "q": "A real estate agent who refuses to show homes in certain neighborhoods based on a client's race is practicing:", "choices": ["Proper client service", "Steering, which is illegal under the Fair Housing Act", "Geographic farming", "Neighborhood specialization"], "answer": 1, "hint": "Directing clients based on protected characteristics is illegal.", "explanation": "Steering occurs when an agent directs buyers toward or away from certain areas based on protected characteristics. Even if the agent believes they are acting in the client's best interest (e.g., 'you'd be more comfortable in this neighborhood'), steering is illegal. Agents must show all available properties that meet the client's stated criteria regardless of the neighborhood's demographics."}, {"id": 339, "category": "Property Management", "q": "In California, a landlord must give how much notice before entering a tenant's dwelling for non-emergency repairs?", "choices": ["No notice required", "24 hours written notice", "48 hours written notice", "1 week written notice"], "answer": 1, "hint": "California law protects tenants' right to privacy.", "explanation": "California Civil Code Section 1954 requires landlords to provide at least 24 hours written notice before entering a tenant's dwelling for non-emergency purposes such as repairs, showing to prospective tenants/buyers, or inspections. Entry must be during normal business hours unless otherwise agreed. In emergencies (fire, flooding, etc.), no notice is required."}, {"id": 340, "category": "Property Management", "q": "A lease assignment differs from a sublease because in an assignment:", "choices": ["The original tenant retains some interest", "The original tenant transfers their ENTIRE remaining lease interest to a new party", "The landlord must agree to lower rent", "The lease term is extended"], "answer": 1, "hint": "The entire remaining lease term is transferred.", "explanation": "In an assignment, the original tenant (assignor) transfers their entire remaining lease interest to the assignee. The assignee deals directly with the landlord. In a sublease, the original tenant transfers only part of the remaining term, creating a new landlord-tenant relationship between themselves and the sublessee. In both cases, the original tenant may remain liable unless released by the landlord."}, {"id": 341, "category": "Escrow & Closing", "q": "In California, escrow instructions are typically:", "choices": ["Verbal agreements between the parties", "Written instructions signed by both buyer and seller, directing the escrow holder", "Prepared by the real estate agents only", "Filed with the county recorder"], "answer": 1, "hint": "Escrow instructions are the roadmap for closing the transaction.", "explanation": "Escrow instructions are written directions from the buyer and seller to the escrow holder, specifying the conditions that must be met before closing. They typically include: purchase price, deposit information, loan details, prorations, title insurance requirements, contingencies, document requirements, and how funds should be disbursed. In Southern California, separate buyer and seller instructions are common."}, {"id": 342, "category": "Escrow & Closing", "q": "A closing statement (settlement statement) shows:", "choices": ["Only the buyer's costs", "All financial details of the transaction for both buyer and seller, including debits and credits", "Only the agent's commission", "Only the loan terms"], "answer": 1, "hint": "This document is the financial summary of the entire transaction.", "explanation": "The closing statement (settlement statement / Closing Disclosure) itemizes all financial aspects of the transaction for both parties. It shows: purchase price, deposits, loan amounts, prorations (taxes, HOA, rent), closing costs (title insurance, escrow fees, commissions), credits, and the final amount due from the buyer and net proceeds to the seller."}, {"id": 343, "category": "California Specific", "q": "Costa-Hawkins Rental Housing Act limits:", "choices": ["Property tax increases", "Local rent control ordinances by exempting certain properties", "Commercial lease terms", "HOA fees"], "answer": 1, "hint": "This state law restricts what local governments can do with rent control.", "explanation": "The Costa-Hawkins Rental Housing Act (1995) limits local rent control ordinances in California by: exempting single-family homes and condos from local rent control, exempting housing built after the local ordinance date (or February 1, 1995, whichever is later), and guaranteeing vacancy decontrol (landlords can reset rent to market rate when a tenant moves out). AB 1482 provides statewide rent caps that apply to Costa-Hawkins exempt units."}, {"id": 344, "category": "California Specific", "q": "The California Housing Financial Discrimination Act (Holden Act) prohibits:", "choices": ["High interest rates on all loans", "Discrimination in housing lending based on race, sex, color, religion, marital status, national origin, or ancestry", "Late payment fees", "Variable interest rates"], "answer": 1, "hint": "California's state-level fair lending law.", "explanation": "The Holden Act (1977) prohibits financial discrimination in real estate lending. Financial institutions cannot deny loans or offer different terms based on protected characteristics or the racial/ethnic composition of a neighborhood (redlining). The Act is enforced by the California Department of Financial Protection and Innovation and provides protections similar to ECOA at the state level."}, {"id": 345, "category": "California Specific", "q": "In California, a seller's disclosure obligation includes the:", "choices": ["Megan's Law disclosure only", "Transfer Disclosure Statement, Natural Hazard Disclosure, Megan's Law notice, and lead-based paint disclosure (if pre-1978)", "Agent's commission disclosure only", "Buyer's financial qualification"], "answer": 1, "hint": "California has extensive disclosure requirements for sellers.", "explanation": "California sellers of residential property (1-4 units) must provide multiple disclosures including: Transfer Disclosure Statement (TDS), Natural Hazard Disclosure (NHD), Megan's Law notice, lead-based paint disclosure (pre-1978 homes), preliminary title report, HOA documents (if applicable), smoke/CO detector compliance, water heater bracing, and any local disclosure requirements."}, {"id": 346, "category": "Math & Calculations", "q": "If a property's assessed value is $400,000 and the tax rate is 1.25%, the annual tax is:", "choices": ["$4,000", "$5,000", "$5,500", "$6,000"], "answer": 1, "hint": "Annual Tax = Assessed Value × Tax Rate.", "explanation": "Annual Tax = $400,000 × 1.25% = $400,000 × 0.0125 = $5,000. In California, the base rate under Proposition 13 is 1%, but voter-approved bonds and special assessments can bring the effective rate to 1.1%-1.5% or more, depending on the location."}, {"id": 347, "category": "Math & Calculations", "q": "A borrower pays 2 discount points on a $350,000 loan. How much do the points cost?", "choices": ["$3,500", "$7,000", "$700", "$35,000"], "answer": 1, "hint": "Each point = 1% of the loan amount.", "explanation": "Cost of points = Loan Amount × Number of Points × 1% = $350,000 × 2 × 0.01 = $7,000. Each discount point equals 1% of the loan amount. Points are prepaid interest that buy down the interest rate. The more points paid, the lower the rate, resulting in lower monthly payments over the life of the loan."}, {"id": 348, "category": "Math & Calculations", "q": "Property sold for $450,000. The seller paid a 6% commission and $2,500 in closing costs. What were the seller's net proceeds?", "choices": ["$420,500", "$424,500", "$425,000", "$430,000"], "answer": 0, "hint": "Net = Sale Price - Commission - Closing Costs.", "explanation": "Commission = $450,000 × 6% = $27,000. Total deductions = $27,000 + $2,500 = $29,500. Net proceeds = $450,000 - $29,500 = $420,500. On the exam, always subtract ALL costs from the sale price to find net proceeds. Additional deductions might include loan payoff, prorated taxes, and transfer taxes."}, {"id": 349, "category": "Math & Calculations", "q": "A triangle-shaped lot has a base of 200 feet and a height of 100 feet. What is the area?", "choices": ["20,000 sq ft", "10,000 sq ft", "15,000 sq ft", "30,000 sq ft"], "answer": 1, "hint": "Area of a triangle = (Base × Height) ÷ 2.", "explanation": "Area = (Base × Height) ÷ 2 = (200 × 100) ÷ 2 = 20,000 ÷ 2 = 10,000 square feet. To convert to acres: 10,000 ÷ 43,560 = approximately 0.23 acres. Triangle area calculations are common on the real estate exam."}, {"id": 350, "category": "Math & Calculations", "q": "If a loan has an annual interest rate of 6% and the monthly payment is $1,500, with $1,200 going to interest, how much goes to principal?", "choices": ["$200", "$300", "$600", "$1,200"], "answer": 1, "hint": "Principal portion = Total payment - Interest portion.", "explanation": "Principal = Total Payment - Interest = $1,500 - $1,200 = $300. In the early years of a loan, most of the payment goes to interest. Over time, the interest portion decreases and the principal portion increases (amortization). This is because interest is calculated on the declining balance."}, {"id": 351, "category": "Financing", "q": "A CalHFA loan is designed to help:", "choices": ["Commercial investors", "First-time homebuyers in California with down payment assistance", "International buyers", "Luxury home purchasers"], "answer": 1, "hint": "This is a California state housing finance program.", "explanation": "CalHFA (California Housing Finance Agency) provides first-time homebuyers with low-interest loans and down payment assistance programs. CalHFA offers conventional, FHA, and VA loans with competitive rates, plus down payment assistance through subordinate loans. Income limits and home price limits apply. CalHFA loans are available through approved lenders."}, {"id": 352, "category": "Financing", "q": "Seller carry-back financing is when:", "choices": ["The seller gives money to the buyer at closing", "The seller acts as the lender and carries a note secured by the property", "The seller pays the buyer's closing costs", "The buyer assumes an existing government loan"], "answer": 1, "hint": "The seller provides the financing instead of (or in addition to) a bank.", "explanation": "Seller carry-back financing occurs when the seller extends credit to the buyer, carrying a promissory note secured by a deed of trust on the property. The seller receives payments over time rather than the full purchase price at closing. This is common when buyers have difficulty qualifying for conventional loans or when it helps facilitate the sale."}, {"id": 353, "category": "Financing", "q": "Predatory lending targets are often:", "choices": ["High-income borrowers with excellent credit", "Elderly, low-income, and minority borrowers who may be less financially sophisticated", "Commercial real estate investors", "Cash buyers"], "answer": 1, "hint": "Vulnerable populations are disproportionately affected.", "explanation": "Predatory lending disproportionately targets vulnerable populations including elderly, low-income, minority, and less financially sophisticated borrowers. These borrowers may be offered unfavorable terms, excessive fees, or unsuitable products. Consumer protection laws like TILA, HOEPA, and Dodd-Frank aim to combat predatory practices."}, {"id": 354, "category": "Property Ownership", "q": "The term 'fee' in real estate means:", "choices": ["A charge for services", "An estate of inheritance—ownership that can be passed to heirs", "A government tax", "A broker's commission"], "answer": 1, "hint": "Fee refers to the type of ownership interest.", "explanation": "In real estate, 'fee' (from the feudal term 'fief') refers to an inheritable estate in land. Fee simple absolute is the most complete form of ownership. Fee simple defeasible is ownership subject to a condition. The term distinguishes inheritable ownership estates from non-inheritable interests like life estates or leasehold interests."}, {"id": 355, "category": "Property Ownership", "q": "When determining if an item is a fixture, the test of intent considers:", "choices": ["How much the item cost", "Whether the person who attached the item intended it to be permanent", "The color of the item", "When the item was manufactured"], "answer": 1, "hint": "The most important test in fixture determination.", "explanation": "The test of intent is often considered the most important factor in determining if an item is a fixture. Courts look at the objective intent of the person who attached the item—did they intend it to be a permanent part of the property? Evidence of intent includes: the method of attachment, the nature of the article, the relationship of the parties, and written agreements."}, {"id": 356, "category": "Contracts", "q": "The covenant of quiet enjoyment in a lease means:", "choices": ["The tenant must be quiet at all times", "The landlord guarantees the tenant's right to possess and use the property without interference", "Noise ordinances apply", "The lease has a noise clause"], "answer": 1, "hint": "This covenant protects the tenant's right to possession.", "explanation": "The covenant of quiet enjoyment is an implied or express promise that the tenant will have undisturbed possession and use of the property during the lease term. If the landlord or someone with superior title interferes with the tenant's possession (e.g., through frequent unauthorized entries or failure to address serious issues), the covenant may be breached, potentially constituting constructive eviction."}, {"id": 357, "category": "Contracts", "q": "A meeting of the minds means:", "choices": ["Both parties attend a physical meeting", "Both parties understand and agree to the essential terms of the contract", "The contract is reviewed by a judge", "An arbitrator resolves all disputes"], "answer": 1, "hint": "This is the fundamental requirement for mutual consent.", "explanation": "A meeting of the minds (mutual assent) means both parties genuinely understand and agree to the same essential terms and conditions of the contract. It is demonstrated through a valid offer and unconditional acceptance. Without a meeting of the minds—such as when there is fraud, mutual mistake, or misunderstanding about essential terms—the contract may be void or voidable."}, {"id": 358, "category": "Agency", "q": "Vicarious liability means:", "choices": ["An agent is liable for their own actions only", "A principal (broker) can be held liable for the wrongful acts of their agent (salesperson)", "A buyer is liable for the seller's debts", "The government is liable for all real estate fraud"], "answer": 1, "hint": "The employer can be held responsible for the employee's actions.", "explanation": "Vicarious liability (respondeat superior) holds the broker responsible for wrongful acts committed by their salespersons within the scope of their real estate activities. Even if the broker was unaware of the wrongful act, they can be held liable. This is why brokers must properly train, supervise, and monitor their agents' activities."}, {"id": 359, "category": "Valuation", "q": "Curable depreciation is:", "choices": ["Depreciation that cannot be repaired", "Physical deterioration or functional obsolescence that is economically feasible to repair", "External obsolescence", "Land depreciation"], "answer": 1, "hint": "The cost of the repair is less than or equal to the value it adds.", "explanation": "Curable depreciation is deterioration or obsolescence where the cost of repair is less than or equal to the value that the repair would add to the property. Examples include: deferred maintenance (painting, carpet replacement), outdated kitchens or bathrooms (functional obsolescence), and broken fixtures. Incurable depreciation exists when the repair cost exceeds the value it would add."}, {"id": 360, "category": "Valuation", "q": "The principle of competition states that:", "choices": ["Competition drives prices down", "Excess profits attract competition, which may reduce profits", "There is no competition in real estate", "Only agents compete, not properties"], "answer": 1, "hint": "When an area becomes profitable, more development follows.", "explanation": "The principle of competition holds that when above-average profits are being earned, competition enters the market. For example, if rental properties in an area generate high returns, developers will build more rental properties, increasing supply and potentially reducing rents and returns. Understanding this principle helps predict market cycles and investment returns."}, {"id": 361, "category": "Transfer of Property", "q": "A deed in lieu of foreclosure is:", "choices": ["A standard property sale", "A transfer of property from the borrower to the lender to avoid formal foreclosure proceedings", "A government seizure of property", "A deed between family members"], "answer": 1, "hint": "The borrower voluntarily gives the property to the lender.", "explanation": "A deed in lieu of foreclosure is a voluntary transfer of property from the defaulting borrower to the lender in exchange for release from the mortgage obligation. It avoids the time and expense of formal foreclosure. However, the lender is not obligated to accept it, and in California, it may expose the borrower to deficiency liability (unlike non-judicial foreclosure of purchase money loans)."}, {"id": 362, "category": "Transfer of Property", "q": "When a property is sold at a tax sale in California:", "choices": ["The buyer receives a warranty deed", "The buyer receives a tax deed after the redemption period expires", "The original owner has no rights", "The sale is handled by a real estate agent"], "answer": 1, "hint": "Tax sales follow specific procedures with redemption rights.", "explanation": "When property taxes are delinquent for 5 years, the tax collector may sell the property at a public auction (tax sale). The successful bidder receives a tax deed after the redemption period. In California, the original owner has a right to redeem the property by paying all delinquent taxes, penalties, and costs before the tax deed is issued."}, {"id": 363, "category": "Practice of Real Estate", "q": "A broker who converts trust funds for personal use is guilty of:", "choices": ["A minor violation", "Conversion, which is a criminal offense and grounds for license revocation", "A bookkeeping error", "Nothing, if they repay the funds"], "answer": 1, "hint": "Using client funds for personal purposes is extremely serious.", "explanation": "Conversion is the unauthorized use of trust funds (money belonging to others) for personal benefit. It is both a criminal offense and grounds for immediate license revocation. Even temporary use of trust funds is prohibited. Brokers must maintain trust funds in a designated trust account, separate from personal or business funds, and must have proper accounting procedures."}, {"id": 364, "category": "Land Use", "q": "A density bonus in California allows developers to:", "choices": ["Build unlimited units", "Build more units than normally permitted in exchange for including affordable housing units", "Avoid all zoning restrictions", "Reduce parking requirements only"], "answer": 1, "hint": "This incentivizes the creation of affordable housing.", "explanation": "California's Density Bonus Law allows developers who include affordable housing units in their projects to build more total units than normally permitted by zoning. The bonus ranges from 5% to 50% depending on the percentage of affordable units included. Developers may also receive incentives like reduced parking requirements, setback reductions, or increased height allowances."}, {"id": 365, "category": "Fair Housing", "q": "Disparate impact discrimination occurs when:", "choices": ["Someone intentionally discriminates", "A neutral policy or practice disproportionately affects a protected group, even without discriminatory intent", "Both parties agree to discriminate", "Discrimination only affects one person"], "answer": 1, "hint": "Intent doesn't matter—the effect is what counts.", "explanation": "Disparate impact (adverse impact) discrimination occurs when a facially neutral policy or practice has a disproportionately negative effect on members of a protected class, even if there was no discriminatory intent. For example, a credit policy that doesn't mention race but statistically excludes a higher percentage of minority applicants may constitute disparate impact discrimination."}, {"id": 366, "category": "Property Management", "q": "A property management agreement typically includes:", "choices": ["Only the manager's commission rate", "The scope of authority, compensation, reporting requirements, term, and termination provisions", "A guarantee of occupancy rates", "Insurance coverage for all units"], "answer": 1, "hint": "This agreement defines the relationship between owner and manager.", "explanation": "A property management agreement should include: scope of the manager's authority and responsibilities, compensation structure (percentage of gross rents or flat fee), reporting requirements (financial statements, occupancy reports), term and termination provisions, insurance requirements, trust fund handling procedures, and the manager's authority for repairs, leasing, and expenditures."}, {"id": 367, "category": "California Specific", "q": "Proposition 60/90 (now superseded by Prop 19) allowed:", "choices": ["Anyone to transfer their tax base", "Homeowners 55+ to transfer their Proposition 13 tax base to a replacement home in the same or participating county", "Unlimited property transfers", "Commercial property tax exemptions"], "answer": 1, "hint": "These propositions have been largely replaced by Proposition 19.", "explanation": "Propositions 60 (1986) and 90 (1988) allowed homeowners age 55+ (or severely disabled) to transfer their Proposition 13 tax base to a replacement home of equal or lesser value within the same county (Prop 60) or a participating county (Prop 90). These have been superseded by Proposition 19 (2021), which allows the transfer to ANY county in California, up to 3 times."}, {"id": 368, "category": "Financing", "q": "The federal funds rate is:", "choices": ["The rate the government charges for student loans", "The interest rate banks charge each other for overnight lending of reserves", "The maximum rate on mortgage loans", "The rate on savings accounts"], "answer": 1, "hint": "This key rate influences all other interest rates in the economy.", "explanation": "The federal funds rate is the interest rate at which banks lend reserve balances to each other overnight to meet Federal Reserve requirements. The Federal Open Market Committee (FOMC) sets a target range for this rate. Changes in the federal funds rate ripple through the economy, affecting all borrowing costs including mortgage rates, auto loans, and credit cards."}, {"id": 369, "category": "Valuation", "q": "A comparable sale used in the sales comparison approach should be:", "choices": ["Any recent sale in the state", "A recent sale of a similar property in the same market area, sold at arm's length", "A foreclosure sale for the best deal", "A sale between family members"], "answer": 1, "hint": "Quality comparables are essential for accurate valuation.", "explanation": "Ideal comparable sales should be: recent (typically within 6 months to 1 year), similar to the subject in size, condition, features, and location, located in the same market area, sold at arm's length (not distressed or between related parties), and verified as to sale price and conditions. The more similar the comparable, the fewer adjustments needed and the more reliable the value estimate."}, {"id": 370, "category": "Transfer of Property", "q": "An abstract of title is:", "choices": ["A short summary of the deed", "A condensed history of all recorded documents affecting the title to a property", "A type of deed", "The assessed value of the property"], "answer": 1, "hint": "This document traces the chain of title through public records.", "explanation": "An abstract of title is a condensed, chronological summary of all recorded documents, proceedings, and facts that affect the title to a specific parcel of real property. It traces the chain of title from the original grant to the present owner and notes all liens, encumbrances, and other matters of record. It is prepared by a title company or abstractor and examined by an attorney for an opinion of title."}, {"id": 371, "category": "Contracts", "q": "A counteroffer terminates the original offer because:", "choices": ["State law requires it", "The counteroffer is a rejection of the original offer and a new offer on different terms", "The seller doesn't want to negotiate", "Counteroffers are illegal"], "answer": 1, "hint": "You can't go back to the original offer after making a counteroffer.", "explanation": "A counteroffer operates as both a rejection of the original offer and the creation of a new offer with different terms. Once a counteroffer is made, the original offer is terminated and cannot be accepted—even if the offeree later changes their mind. The original offeror can now accept, reject, or counter the counteroffer. This ping-pong of offers continues until acceptance or termination."}, {"id": 372, "category": "Financing", "q": "The Home Mortgage Disclosure Act (HMDA) requires:", "choices": ["Banks to disclose their profits", "Lenders to report data on mortgage applications and loans to detect discriminatory lending patterns", "Borrowers to disclose their income", "Appraisers to disclose their methodology"], "answer": 1, "hint": "HMDA promotes transparency in lending practices.", "explanation": "HMDA requires mortgage lenders to collect and publicly disclose data about mortgage applications and loans, including the race, gender, income, and geographic location of applicants. This data helps regulators and the public identify potential discriminatory lending patterns and enforce fair lending laws."}, {"id": 373, "category": "Financing", "q": "A participation mortgage allows the lender to:", "choices": ["Only collect interest", "Share in the property's income or appreciation in addition to collecting interest", "Participate in property management", "Live in the property"], "answer": 1, "hint": "The lender participates in the financial upside of the property.", "explanation": "A participation mortgage gives the lender a share of the property's income, appreciation, or both, in addition to regular interest payments. In exchange, the borrower typically receives a lower interest rate. This is more common in commercial real estate. The lender's participation gives them a stake in the property's financial performance."}, {"id": 374, "category": "Property Ownership", "q": "The Torrens system of title registration:", "choices": ["Is used in all states", "Provides a government certificate of title that guarantees ownership", "Relies entirely on title insurance", "Is the standard system in California"], "answer": 1, "hint": "This system provides the strongest government guarantee of title.", "explanation": "The Torrens system is a government-administered title registration system where the government examines title and issues a certificate of title that guarantees ownership. It is used in a few states and some California counties. Unlike the recording system (used in most of California), the Torrens system provides a government-backed guarantee of title validity."}, {"id": 375, "category": "Property Ownership", "q": "Allodial ownership means:", "choices": ["The government owns all land", "Private ownership free and clear of any rent or service to the government, subject only to governmental powers", "Feudal ownership", "Ownership through adverse possession"], "answer": 1, "hint": "This is the fundamental basis of private property in the U.S.", "explanation": "Allodial ownership is the concept that land is owned absolutely by individuals, free of any rent or obligation to a superior landlord (as opposed to feudal systems). In the United States, all private ownership is allodial, subject only to the four governmental powers: police power, eminent domain, taxation, and escheat."}, {"id": 376, "category": "Contracts", "q": "A real estate contract must have legal capacity, which means:", "choices": ["The parties must be attorneys", "The parties must be of legal age and sound mind", "The contract must be notarized", "At least one party must be a licensed agent"], "answer": 1, "hint": "Both parties must be competent to enter into a contract.", "explanation": "Legal capacity requires that all parties be: (1) of legal age (18 in California), (2) of sound mind (able to understand the nature and consequences of the transaction), and (3) not under the influence of drugs or alcohol to the extent that judgment is impaired. Contracts with minors are voidable; contracts with persons adjudicated mentally incompetent are void."}, {"id": 377, "category": "Contracts", "q": "Substantial performance of a contract means:", "choices": ["Perfect performance in every detail", "Performance that fulfills the essential purpose of the contract despite minor deviations", "Failure to perform entirely", "Performance of exactly half the contract"], "answer": 1, "hint": "Close enough may still satisfy the contract.", "explanation": "Substantial performance occurs when a party has performed the essential elements of the contract in good faith but has minor deviations from the exact specifications. Courts may find the contract substantially performed and require the other party to fulfill their obligations, minus damages for the minor deficiencies. This doctrine prevents forfeiture for trivial imperfections."}, {"id": 378, "category": "Agency", "q": "Ratification in agency occurs when:", "choices": ["An agent is fired", "A principal approves an agent's previously unauthorized act, retroactively creating authority", "A contract is signed", "A license is renewed"], "answer": 1, "hint": "After-the-fact approval of the agent's actions.", "explanation": "Ratification occurs when a principal approves or accepts an act that was previously performed by an agent without proper authority. Once ratified, the act is treated as if it were authorized from the beginning. For example, if a salesperson accepts an offer on behalf of a seller without prior authorization, the seller can ratify it by subsequently approving the acceptance."}, {"id": 379, "category": "Agency", "q": "An agent's fiduciary duty of loyalty requires:", "choices": ["Equal treatment of both parties", "Placing the client's interests above the agent's own interests and those of third parties", "Loyalty to the listing price only", "Maintaining the property"], "answer": 1, "hint": "The client's interests come first—always.", "explanation": "The duty of loyalty is the cornerstone of the fiduciary relationship. It requires the agent to place the client's interests above their own and above those of third parties. The agent must not act in self-interest at the client's expense, must not represent conflicting interests without disclosure and consent, and must avoid any conflict of interest."}, {"id": 380, "category": "Valuation", "q": "The sales comparison approach is most appropriate for:", "choices": ["Income-producing commercial properties", "Residential properties with adequate comparable sales data", "Special-purpose properties", "Agricultural land with no improvements"], "answer": 1, "hint": "This approach works best when similar properties have recently sold.", "explanation": "The sales comparison approach is most reliable for residential properties where sufficient comparable sales data exists. It directly reflects market behavior by comparing the subject to recently sold similar properties. Adjustments are made for differences. This approach is the primary method used for single-family homes and is given the most weight by most residential appraisers."}, {"id": 381, "category": "Valuation", "q": "Paired sales analysis is a technique used to:", "choices": ["Compare two properties for purchase", "Isolate the value contribution of a single feature by comparing sales that differ in only that feature", "Pair buyers with sellers", "Average two appraisals"], "answer": 1, "hint": "This technique isolates the value of one specific difference.", "explanation": "Paired sales analysis isolates the market value of a specific property feature by comparing sales of otherwise identical properties that differ in only that one feature. For example, to find the value of a swimming pool, compare a sale with a pool to a sale without one where all other factors are similar. The price difference approximates the pool's market value."}, {"id": 382, "category": "Transfer of Property", "q": "Adverse possession in California requires payment of property taxes because:", "choices": ["California wants additional tax revenue", "It demonstrates the claimant's good faith assertion of ownership rights and is required by California statute", "The government benefits from tax payments", "It replaces the purchase price"], "answer": 1, "hint": "California is one of the states requiring tax payment for adverse possession.", "explanation": "California Civil Code requires that an adverse possessor must pay all property taxes on the claimed land for the entire 5-year statutory period. This requirement (not found in all states) serves as evidence of the claimant's assertion of ownership rights and provides notice to the true owner through tax records. Failure to pay taxes defeats the adverse possession claim."}, {"id": 383, "category": "Transfer of Property", "q": "A grant deed must contain:", "choices": ["The grantee's signature", "A granting clause (words of conveyance) and the grantor's signature", "A legal description AND a street address", "The purchase price"], "answer": 1, "hint": "Certain elements are essential for a valid deed.", "explanation": "Essential elements of a California grant deed include: the grantor's name and signature, an identifiable grantee, a legal description of the property, a granting clause (words of conveyance such as 'hereby grant'), and delivery and acceptance. The grantee does NOT sign the deed. The purchase price is not required to appear on the deed."}, {"id": 384, "category": "Practice of Real Estate", "q": "California's Elder Abuse Law requires licensees to:", "choices": ["Offer discounts to elderly clients", "Report suspected elder financial abuse to appropriate authorities", "Refuse to work with elderly clients", "Require a family member's approval for all transactions"], "answer": 1, "hint": "Real estate professionals may encounter financial exploitation of elderly clients.", "explanation": "California law requires certain mandated reporters to report suspected elder abuse (physical, financial, or emotional) to Adult Protective Services. Real estate licensees, while not specifically mandated reporters under the elder abuse statute, have ethical obligations and may have legal obligations depending on circumstances when they observe or suspect financial exploitation of elderly clients in real estate transactions."}, {"id": 385, "category": "Practice of Real Estate", "q": "The DRE can discipline a licensee for:", "choices": ["Charging a fair commission", "Making intentional misrepresentations, commingling funds, or acting dishonestly", "Selling a property below market value", "Working part-time"], "answer": 1, "hint": "The DRE enforces standards of conduct for licensees.", "explanation": "Grounds for disciplinary action by the DRE include: misrepresentation, fraud, dishonest dealing, commingling trust funds, secret profits, negligence, violation of fair housing laws, failure to disclose material facts, conviction of certain crimes, and any conduct that would have been grounds for denial of a license. Penalties range from citation/fine to license suspension or revocation."}, {"id": 386, "category": "Land Use", "q": "A specific plan in California is:", "choices": ["A general guideline for the whole city", "A detailed plan for a defined area that implements the general plan with specific development standards", "An individual building plan", "A state-level planning document"], "answer": 1, "hint": "This plan bridges the gap between the general plan and individual projects.", "explanation": "A specific plan is a detailed planning document that implements the general plan for a particular area. It includes: permitted land uses, development standards (setbacks, height, density, FAR), infrastructure requirements, environmental mitigations, and financing mechanisms. Specific plans are common for large mixed-use developments, new communities, and redevelopment areas."}, {"id": 387, "category": "Land Use", "q": "FEMA flood zone designations affect:", "choices": ["Only commercial properties", "Insurance requirements, building standards, and property values for properties in designated flood hazard areas", "Zoning classifications", "Property tax rates only"], "answer": 1, "hint": "FEMA maps identify areas with varying levels of flood risk.", "explanation": "FEMA (Federal Emergency Management Agency) flood zone maps designate areas based on flood risk levels. Properties in high-risk zones (A and V zones) are required to carry flood insurance if they have a federally backed mortgage. Flood zone designations affect property values, insurance costs, construction requirements, and must be disclosed to buyers."}, {"id": 388, "category": "Fair Housing", "q": "An emotional support animal differs from a service animal in that:", "choices": ["They are the same thing", "An ESA provides emotional support but may not be trained for specific tasks; a service animal is trained for specific disability-related tasks", "ESAs are only for military veterans", "Service animals can only be dogs"], "answer": 1, "hint": "Different rules apply to each type of assistance animal.", "explanation": "Service animals (primarily dogs) are individually trained to perform specific tasks for people with disabilities and are covered by the ADA in public places. Emotional support animals (ESAs) provide comfort through companionship but may not be trained for specific tasks. For housing, both may be allowed as reasonable accommodations under the Fair Housing Act, but landlords may request documentation for ESAs."}, {"id": 389, "category": "Property Management", "q": "A graduated lease features:", "choices": ["Fixed rent for the entire term", "Rent that increases at predetermined intervals or based on a formula", "Decreasing rent over time", "Rent based on a percentage of sales"], "answer": 1, "hint": "Rent steps up over the lease term.", "explanation": "A graduated (step-up) lease includes scheduled rent increases at specified intervals. For example, rent might start at $2,000/month, increase to $2,200 after two years, and $2,400 after four years. This allows tenants to start with lower payments and gradually increase as their business grows or income rises. The increases are predetermined in the lease."}, {"id": 390, "category": "Escrow & Closing", "q": "A cloud on title is:", "choices": ["Clear and marketable title", "Any document, claim, or encumbrance that may impair or affect the owner's title", "A weather-related damage claim", "A title insurance policy"], "answer": 1, "hint": "Something casts doubt on the quality of the owner's title.", "explanation": "A cloud on title is any claim, lien, encumbrance, or defect that may affect or impair the owner's title to real property. Examples include: unresolved liens, recording errors, forged deeds, missing heirs, boundary disputes, and unreleased mortgages. Clouds must be resolved (cleared) before the property can be sold with clear and marketable title. A quiet title action may be needed."}, {"id": 391, "category": "California Specific", "q": "The Ellis Act in California allows:", "choices": ["Landlords to raise rents without limit", "Property owners to withdraw rental units from the market and exit the rental business", "Tenants to withhold rent", "Unlimited development rights"], "answer": 1, "hint": "This law protects landlords' right to go out of the rental business.", "explanation": "The Ellis Act (1985) preserves a property owner's right to exit the residential rental business by withdrawing units from the rental market, even in rent-controlled jurisdictions. Specific procedures must be followed, including 120-day notice to tenants (1 year for elderly/disabled), relocation payments, and restrictions on re-renting. Some cities impose additional requirements and longer waiting periods before re-renting."}, {"id": 392, "category": "Math & Calculations", "q": "A property depreciates at $5,000 per year for tax purposes. After 10 years, total depreciation is:", "choices": ["$5,000", "$50,000", "$500,000", "$15,000"], "answer": 1, "hint": "Simple multiplication: Annual depreciation × Number of years.", "explanation": "Total depreciation = $5,000/year × 10 years = $50,000. For tax purposes, residential rental property is depreciated over 27.5 years using straight-line depreciation. Commercial property is depreciated over 39 years. The annual depreciation deduction reduces taxable income. Upon sale, depreciation is 'recaptured' and taxed at up to 25%."}, {"id": 393, "category": "Math & Calculations", "q": "If the capitalization rate increases from 5% to 8% while NOI stays at $50,000, the property value:", "choices": ["Increases", "Decreases from $1,000,000 to $625,000", "Stays the same", "Cannot be determined"], "answer": 1, "hint": "Higher cap rate = higher risk = lower price.", "explanation": "At 5% cap rate: Value = $50,000 ÷ 0.05 = $1,000,000. At 8% cap rate: Value = $50,000 ÷ 0.08 = $625,000. The value decreased by $375,000. An increase in cap rate indicates higher perceived risk or required return, which lowers the price investors will pay. Cap rates and property values move inversely when NOI is constant."}, {"id": 394, "category": "Financing", "q": "Ginnie Mae differs from Fannie Mae in that Ginnie Mae:", "choices": ["Is a private corporation", "Is a government agency backed by the full faith and credit of the U.S. government", "Purchases conventional loans", "Sets interest rates for all lenders"], "answer": 1, "hint": "Ginnie Mae has the strongest government backing.", "explanation": "Ginnie Mae (GNMA) is a government-owned corporation within HUD that is backed by the full faith and credit of the U.S. government—making its guarantees the safest in the mortgage market. It only guarantees securities backed by government-insured/guaranteed loans (FHA, VA, USDA). Fannie Mae and Freddie Mac are government-sponsored enterprises (GSEs) that deal primarily with conventional loans."}, {"id": 395, "category": "Property Ownership", "q": "A cooperative (co-op) board can reject a prospective buyer based on:", "choices": ["Race or national origin", "Financial qualifications and other lawful criteria, but NOT protected classes", "The buyer's religion", "The buyer's family status"], "answer": 1, "hint": "Co-op boards have discretion but cannot discriminate.", "explanation": "Co-op boards have broad discretion in approving or rejecting prospective buyers, including evaluation of financial qualifications, interview performance, and other lawful criteria. However, they CANNOT reject buyers based on any protected class under fair housing laws (race, color, religion, national origin, sex, familial status, disability, or state-protected classes)."}, {"id": 396, "category": "Contracts", "q": "Accord and satisfaction differs from novation because:", "choices": ["They are identical concepts", "Accord and satisfaction modifies the performance while novation substitutes an entirely new party or contract", "Novation requires court approval", "Accord is only for lease agreements"], "answer": 1, "hint": "Novation replaces; accord and satisfaction modifies.", "explanation": "In an accord and satisfaction, the original parties agree to accept different performance than originally specified, and once the new performance is completed, the original obligation is discharged. In a novation, an entirely new party is substituted for an original party, or an entirely new contract replaces the original. Novation requires all parties' consent and completely extinguishes the original obligation."}, {"id": 397, "category": "Agency", "q": "The California DRE form RE 882 is the:", "choices": ["Listing agreement", "Agency Relationship Disclosure form", "Purchase agreement", "Transfer Disclosure Statement"], "answer": 1, "hint": "This form discloses the types of agency relationships in California.", "explanation": "The RE 882 is the Disclosure Regarding Real Estate Agency Relationships form required by California law. It explains the three types of agency relationships (seller's agent, buyer's agent, dual agent) and must be provided to prospective buyers and sellers as soon as practicable. It informs parties about what to expect from their agent."}, {"id": 398, "category": "Valuation", "q": "Site analysis in appraisal considers:", "choices": ["Only the building's condition", "The land's physical characteristics, utilities, accessibility, zoning, and highest and best use", "Only comparable sales", "Only the assessed value"], "answer": 1, "hint": "The site itself has specific characteristics that affect value.", "explanation": "Site analysis evaluates the land's characteristics including: size, shape, topography, soil conditions, drainage, available utilities, access/frontage, zoning, environmental conditions, views, and surrounding land uses. These factors affect the site's highest and best use and its contribution to overall property value. Site analysis is a crucial part of all three approaches to value."}, {"id": 399, "category": "Transfer of Property", "q": "An inter vivos transfer is a transfer of property:", "choices": ["At death through a will", "During the owner's lifetime", "By government seizure", "Through adverse possession"], "answer": 1, "hint": "Inter vivos means 'between the living.'", "explanation": "An inter vivos transfer is a property transfer that occurs during the owner's lifetime, as opposed to a testamentary transfer (through a will after death). Common inter vivos transfers include sales, gifts, and transfers to living trusts. The Latin term literally means 'between the living.' Most real estate transactions are inter vivos transfers."}, {"id": 400, "category": "Practice of Real Estate", "q": "In California, a real estate broker must keep trust fund records for:", "choices": ["1 year", "3 years from the date of the closing or from the date the trust fund is disbursed", "5 years", "10 years"], "answer": 1, "hint": "Proper record retention is a legal requirement.", "explanation": "California law requires brokers to maintain trust fund records for at least 3 years. These records include: a columnar trust fund record, a separate beneficiary record for each beneficiary, bank statements, deposit slips, and canceled checks. The DRE may audit these records at any time. Proper trust fund record-keeping is essential for compliance and client protection."}, {"id": 401, "category": "Land Use", "q": "An environmental impact statement (EIS) is required under:", "choices": ["CEQA (state law)", "NEPA (National Environmental Policy Act—federal law)", "The Clean Air Act", "The Fair Housing Act"], "answer": 1, "hint": "Federal projects require an EIS; state projects in California require an EIR.", "explanation": "An Environmental Impact Statement (EIS) is required under the National Environmental Policy Act (NEPA) for major federal actions that may significantly affect the environment. The California equivalent is the Environmental Impact Report (EIR) required under CEQA for state and local projects. Both analyze environmental impacts and propose mitigation measures."}, {"id": 402, "category": "Fair Housing", "q": "Under fair housing law, a landlord's refusal to rent to someone receiving Section 8 housing vouchers is:", "choices": ["Always legal under federal law", "Illegal in California, which prohibits source-of-income discrimination", "Required by law", "Only illegal for properties with more than 10 units"], "answer": 1, "hint": "California provides broader protections than federal law.", "explanation": "While federal law does not expressly prohibit source-of-income discrimination, California law (SB 329, the Housing Opportunities Act, effective 2020) prohibits landlords from refusing to rent to tenants solely because they use Section 8 vouchers or other housing subsidies. Landlords must evaluate these applicants using the same criteria as other applicants."}, {"id": 403, "category": "Property Management", "q": "A property manager typically owes a fiduciary duty to:", "choices": ["The tenants", "The property owner (principal)", "The local government", "The HOA board only"], "answer": 1, "hint": "The property manager is the owner's agent.", "explanation": "A property manager acts as an agent for the property owner and owes fiduciary duties to the owner, including loyalty, obedience, disclosure, accounting, confidentiality, and care. While the manager must deal honestly with tenants, their primary obligation is to the owner. The management agreement defines the scope of the manager's authority and responsibilities."}, {"id": 404, "category": "Escrow & Closing", "q": "In California, escrow typically lasts:", "choices": ["7 days", "30-60 days for a typical residential transaction", "6 months minimum", "1 year"], "answer": 1, "hint": "The standard escrow period varies but is typically about one to two months.", "explanation": "A typical residential escrow in California lasts 30-60 days, though this varies based on financing, contingencies, and negotiations. Cash transactions may close faster (2-3 weeks). Complex transactions or those requiring special approvals may take longer. The closing date is specified in the purchase agreement and can be extended by mutual consent."}, {"id": 405, "category": "California Specific", "q": "California's Homeowner Association (HOA) Davis-Stirling Act governs:", "choices": ["All rental properties", "Common interest developments including condominiums, planned developments, and stock cooperatives", "Only single-family homes", "Commercial properties only"], "answer": 1, "hint": "This comprehensive law regulates HOAs in California.", "explanation": "The Davis-Stirling Common Interest Development Act is California's comprehensive law governing homeowner associations (HOAs) for condominiums, planned unit developments, and stock cooperatives. It covers: governing documents (CC&Rs, bylaws), board elections, meetings, financial reporting, assessments, dispute resolution, maintenance obligations, and homeowner rights."}, {"id": 406, "category": "Math & Calculations", "q": "A property produces $3,000/month in rent. What is the value using a GRM of 180?", "choices": ["$540,000", "$360,000", "$450,000", "$600,000"], "answer": 0, "hint": "Value = Monthly Rent × GRM.", "explanation": "Value = Monthly Rent × GRM = $3,000 × 180 = $540,000. The GRM is a simple multiplier used to estimate property value based on rental income. While less precise than the income approach using cap rates, the GRM is useful for quick comparisons and initial estimates of residential and small commercial property values."}, {"id": 407, "category": "Math & Calculations", "q": "A seller pays $3,300 in county transfer taxes at $1.10 per $1,000. What was the sale price?", "choices": ["$3,000,000", "$330,000", "$300,000", "$3,300,000"], "answer": 0, "hint": "Sale Price = Tax Amount ÷ Rate per $1,000 × $1,000.", "explanation": "Sale Price = ($3,300 ÷ $1.10) × $1,000 = 3,000 × $1,000 = $3,000,000. Working backward from the transfer tax: divide the tax paid by the rate per thousand to get the number of thousands, then multiply by $1,000. This is a common exam question format."}, {"id": 408, "category": "Financing", "q": "A purchase money loan on an owner-occupied home in California is important because:", "choices": ["It has the lowest interest rate available", "The borrower is protected from deficiency judgments upon default", "It never requires a down payment", "It is guaranteed by the state"], "answer": 1, "hint": "California's anti-deficiency protection is significant for homeowners.", "explanation": "Under California Code of Civil Procedure Sections 580b and 580d, purchase money loans on owner-occupied residential property (1-4 units) are non-recourse. If the borrower defaults, the lender can only foreclose on the property—they cannot pursue the borrower personally for any deficiency. This protection also applies to seller carry-back loans and non-judicial foreclosure of any loan."}, {"id": 409, "category": "Property Ownership", "q": "A recorded easement affects:", "choices": ["Only the current owner", "All future owners because it runs with the land", "Only the owner who granted it", "Only tenants of the property"], "answer": 1, "hint": "Recorded easements bind future owners.", "explanation": "A recorded easement becomes part of the property's title and affects all future owners. Appurtenant easements run with the land automatically. Easements in gross may or may not be transferable depending on their nature. When purchasing property, buyers should carefully review the preliminary title report for any existing easements that may affect their use of the property."}, {"id": 410, "category": "Contracts", "q": "Breach of contract remedies include:", "choices": ["Only monetary damages", "Monetary damages, specific performance, rescission, and liquidated damages", "Only specific performance", "Only cancellation of the contract"], "answer": 1, "hint": "Multiple remedies may be available depending on the circumstances.", "explanation": "Available remedies for breach of contract include: (1) monetary damages (compensatory, consequential, nominal), (2) specific performance (court-ordered completion), (3) rescission (cancellation and return to pre-contract positions), (4) liquidated damages (pre-agreed amount), and (5) reformation (court modifies the contract to reflect the parties' true intent). The appropriate remedy depends on the circumstances."}, {"id": 411, "category": "Financing", "q": "A wraparound mortgage benefits the seller because:", "choices": ["They avoid paying capital gains tax", "They earn interest on the full wraparound amount while paying lower interest on the underlying loan", "They transfer liability for the first mortgage", "They receive the full sale price at closing"], "answer": 1, "hint": "The seller profits from the interest rate spread.", "explanation": "In a wraparound (AITD), the seller creates a new larger loan that 'wraps around' the existing first mortgage. The seller collects payments on the full wraparound balance at a higher rate while continuing to make payments on the underlying loan at a lower rate. The interest rate differential (spread) generates additional income for the seller."}, {"id": 412, "category": "Financing", "q": "A prepayment penalty is:", "choices": ["A bonus for paying off a loan early", "A fee charged by the lender if the borrower pays off the loan before the agreed term", "A late payment fee", "An origination charge"], "answer": 1, "hint": "Lenders lose expected interest income when loans are paid early.", "explanation": "A prepayment penalty is a fee the lender charges when the borrower pays off all or a portion of the loan before the scheduled payoff date. Lenders impose these to recoup some of the interest income they lose from early payoff. In California, prepayment penalties on residential loans are restricted—they generally cannot apply after 5 years and are limited in amount."}, {"id": 413, "category": "Financing", "q": "The Loan Estimate form must be provided to the borrower within:", "choices": ["24 hours of application", "3 business days of receiving a loan application", "7 days of application", "At closing only"], "answer": 1, "hint": "TRID requires timely disclosure of loan terms.", "explanation": "Under TRID, lenders must provide the Loan Estimate within 3 business days of receiving a complete loan application. This form discloses the estimated loan terms, projected payments, closing costs, and other important information. The borrower can use it to compare offers from different lenders. It replaced the old Good Faith Estimate (GFE)."}, {"id": 414, "category": "Financing", "q": "The Homeowner's Protection Act (HPA) requires:", "choices": ["All homeowners to carry flood insurance", "Automatic termination of PMI when the loan balance reaches 78% of the original value", "All loans to have fixed rates", "Lenders to provide free home warranties"], "answer": 1, "hint": "This federal law ensures PMI doesn't continue indefinitely.", "explanation": "The HPA (1998) requires automatic termination of PMI when the loan-to-original-value ratio reaches 78% through scheduled payments. Borrowers can request cancellation at 80% LTV. The act also requires lenders to disclose PMI cancellation rights at closing and annually. This protects borrowers from paying PMI longer than necessary."}, {"id": 415, "category": "Financing", "q": "A CalVet loan differs from a VA loan because:", "choices": ["CalVet has higher interest rates", "CalVet is a state program using a land contract, while VA is a federal loan guarantee", "CalVet is only for active duty", "CalVet requires a 20% down payment"], "answer": 1, "hint": "Two different veteran benefit programs—one state, one federal.", "explanation": "CalVet is a California state program where the state purchases the home and resells it to the veteran on an installment (land contract) basis. The state holds title until the loan is paid. VA loans are federally guaranteed loans where the veteran holds title immediately. CalVet typically offers very competitive rates and may not require a down payment."}, {"id": 416, "category": "Financing", "q": "An alienation clause is also known as a:", "choices": ["Acceleration clause", "Due-on-sale clause", "Subordination clause", "Escalation clause"], "answer": 1, "hint": "This clause prevents unauthorized assumption of the loan.", "explanation": "An alienation clause (due-on-sale clause) gives the lender the right to call the entire loan balance due when the property is sold or transferred without lender approval. This prevents unauthorized loan assumptions and ensures the lender can review new borrowers' creditworthiness. The Garn-St. Germain Act enforces these clauses for most loans."}, {"id": 417, "category": "Financing", "q": "Regulation Z applies to:", "choices": ["All loans regardless of purpose", "Consumer credit transactions, including most residential mortgage loans", "Only commercial loans", "Only government-backed loans"], "answer": 1, "hint": "This regulation implements the Truth in Lending Act for consumer credit.", "explanation": "Regulation Z implements the Truth in Lending Act (TILA) and applies to consumer credit transactions, including most residential mortgage loans. It requires disclosure of the APR, finance charges, and other loan terms. It does NOT apply to: business/commercial loans, loans to government entities, or loans over certain thresholds (except residential mortgages). The 3-day right of rescission applies to refinances."}, {"id": 418, "category": "Financing", "q": "A CalFHA program is designed to help:", "choices": ["International investors", "California first-time homebuyers and low-to-moderate income buyers with down payment assistance", "Commercial property buyers", "Luxury homebuyers only"], "answer": 1, "hint": "State programs make homeownership more accessible.", "explanation": "CalHFA (California Housing Finance Agency) offers various programs for first-time homebuyers and low-to-moderate income borrowers, including: first mortgage loans with competitive rates, MyHome Assistance Program (subordinate loan up to 3.5%), and the CalHFA Zero Interest Program (ZIP). Income limits and property requirements apply. Programs are available through approved lenders."}, {"id": 419, "category": "Property Ownership", "q": "Reliction is land gained by:", "choices": ["Water flooding an area", "The permanent receding of water, exposing dry land", "A government land grant", "Soil erosion"], "answer": 1, "hint": "The water permanently retreats, leaving new usable land.", "explanation": "Reliction (or dereliction) occurs when water permanently recedes, exposing land that was previously submerged. The newly exposed land belongs to the adjacent property owner. Unlike accretion (gradual soil deposit) and avulsion (sudden change), reliction specifically involves the retreat of water. The recession must be permanent—temporary seasonal changes don't qualify."}, {"id": 420, "category": "Property Ownership", "q": "A quitclaim deed is most commonly used for:", "choices": ["Standard home sales with financing", "Clearing clouds on title, transfers between spouses, or adding/removing names from title", "Government land grants", "Foreclosure sales"], "answer": 1, "hint": "The quitclaim deed's simplicity makes it ideal for certain situations.", "explanation": "Quitclaim deeds are commonly used for: removing clouds on title, transferring property between spouses (especially in divorce), adding or removing co-owners, transferring property to a living trust, and correcting errors on prior deeds. They're NOT typically used for standard sales because they provide no title warranties or protection for the buyer."}, {"id": 421, "category": "Property Ownership", "q": "The statute of limitations for adverse possession in California is:", "choices": ["3 years", "5 years", "10 years", "20 years"], "answer": 1, "hint": "California has a specific timeframe for adverse possession claims.", "explanation": "In California, the adverse possessor must satisfy all requirements for 5 continuous years: open and notorious possession, hostile (without permission), under claim of right or color of title, continuous and uninterrupted, AND payment of all property taxes during the 5-year period. The tax payment requirement makes California adverse possession claims more difficult than in some other states."}, {"id": 422, "category": "Property Ownership", "q": "Community property with right of survivorship in California:", "choices": ["Does not exist", "Combines community property rules with survivorship rights, avoiding probate on the first spouse's death", "Is the same as joint tenancy", "Requires a court order"], "answer": 1, "hint": "This ownership form offers advantages of both community property and joint tenancy.", "explanation": "Community property with right of survivorship (CPWRS) combines the tax advantages of community property (full stepped-up basis at first death) with the probate avoidance of joint tenancy (automatic transfer to surviving spouse). Created by California statute, it must be expressly stated in the deed. It offers the best of both ownership forms for married couples."}, {"id": 423, "category": "Property Ownership", "q": "An easement is terminated by all of the following EXCEPT:", "choices": ["Merger of the dominant and servient tenements", "Abandonment with intent to abandon", "The dominant tenant moving away temporarily", "Release by the dominant tenant"], "answer": 2, "hint": "Temporary absence does not terminate an easement.", "explanation": "Easements can be terminated by: merger (same person owns both properties), release (written agreement), abandonment (intent to abandon plus non-use), prescription (adverse use by the servient owner), expiration (if time-limited), condemnation, destruction of the servient property, or estoppel. Temporary non-use alone does NOT terminate an easement—there must be intent to abandon."}, {"id": 424, "category": "Property Ownership", "q": "A cloud on title can be removed by:", "choices": ["Ignoring it", "A quiet title action, quitclaim deed from the claimant, or other legal remedy", "Paying higher property taxes", "Selling the property"], "answer": 1, "hint": "Legal action may be needed to clear title defects.", "explanation": "Clouds on title can be removed through: quiet title action (lawsuit to establish ownership), quitclaim deed from the party causing the cloud, title insurance claim, release of lien, correction deed, or other legal remedies. A title search during escrow typically reveals clouds that must be cleared before closing."}, {"id": 425, "category": "Contracts", "q": "In California, the buyer's inspection contingency default period under the CAR RPA is:", "choices": ["7 days", "17 days", "21 days", "30 days"], "answer": 1, "hint": "The standard CAR form has specific default timeframes.", "explanation": "The California Association of Realtors (CAR) Residential Purchase Agreement provides a default 17-day investigation contingency period. During this time, the buyer can investigate all aspects of the property including physical inspections, title review, HOA documents, and other matters. The buyer can negotiate repairs, request credits, or cancel the contract based on findings."}, {"id": 426, "category": "Contracts", "q": "A contract of adhesion is:", "choices": ["A mutually negotiated agreement", "A take-it-or-leave-it contract drafted by one party with superior bargaining power", "A contract involving adhesive products", "A government-mandated contract"], "answer": 1, "hint": "One party dictates all terms with no room for negotiation.", "explanation": "A contract of adhesion is a standardized contract drafted by a party with superior bargaining power, offered on a take-it-or-leave-it basis. The weaker party has little or no ability to negotiate terms. Examples include insurance policies and some form contracts. Courts may refuse to enforce unconscionable provisions in adhesion contracts."}, {"id": 427, "category": "Contracts", "q": "Waiver in contract law occurs when:", "choices": ["A party files a lawsuit", "A party voluntarily gives up a known right under the contract", "The contract is voided by the court", "Both parties agree to extend the deadline"], "answer": 1, "hint": "A party chooses not to enforce a right they're entitled to.", "explanation": "A waiver is the voluntary relinquishment of a known right. In real estate, waiver can occur when a party fails to enforce a contract provision (e.g., a seller who allows the buyer to miss a deadline without objection may waive the right to enforce that deadline). Waivers can be express (written) or implied (by conduct)."}, {"id": 428, "category": "Contracts", "q": "The California Residential Purchase Agreement (CAR RPA) is:", "choices": ["A legally required form", "A standardized form widely used but not legally mandated; other forms can be used", "The only valid purchase agreement in California", "A government-issue
