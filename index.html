not more than once every 2 years."}, {"id": 211, "category": "Transfer of Property", "q": "A 1031 exchange (like-kind exchange) allows:", "choices": ["Any property owner to avoid all taxes", "An investor to defer capital gains taxes by exchanging investment property for like-kind property", "Homeowners to exchange their residence tax-free", "Tax-free conversion of commercial to residential property"], "answer": 1, "hint": "This powerful tax tool is available for investment and business properties.", "explanation": "A 1031 exchange (named after IRC Section 1031) allows investors to defer capital gains taxes by exchanging one investment or business property for another of 'like-kind.' The replacement property must be identified within 45 days and acquired within 180 days. Personal residences do NOT qualify. 'Like-kind' for real estate is broadly interpreted—any real property for any real property."}, {"id": 212, "category": "Transfer of Property", "q": "Proposition 19 in California allows:", "choices": ["Unlimited property tax increases", "Eligible homeowners (55+, disabled, disaster victims) to transfer their tax base to a replacement home anywhere in California", "Commercial properties to avoid reassessment", "Renters to claim property tax deductions"], "answer": 1, "hint": "This expanded the ability of certain homeowners to transfer their tax base.", "explanation": "Proposition 19 (effective April 2021) expanded the ability of homeowners age 55+, severely disabled, or disaster victims to transfer their Proposition 13 tax base to a replacement home anywhere in California (up to 3 times). It also limited the parent-child exclusion for inherited property to primary residences and family farms, requiring other inherited properties to be reassessed."}, {"id": 213, "category": "Agency", "q": "The duty of accounting requires an agent to:", "choices": ["Prepare the client's tax returns", "Account for all money and property received on behalf of the client", "Calculate the property's market value", "Balance the escrow account"], "answer": 1, "hint": "Every dollar belonging to the client must be tracked and reported.", "explanation": "The duty of accounting requires the agent to maintain accurate records of all money and property received or handled on behalf of the client. This includes earnest money deposits, rent collected, security deposits, and any other funds. The agent must be able to account for every dollar and provide a detailed accounting upon request."}, {"id": 214, "category": "Agency", "q": "An agent's duty of obedience means:", "choices": ["Blindly following all client instructions, even illegal ones", "Following the client's lawful instructions that fall within the scope of the agency", "Obeying the other party's demands", "Following DRE regulations only"], "answer": 1, "hint": "Obedience has limits—it doesn't extend to illegal or unethical requests.", "explanation": "The duty of obedience requires the agent to follow the client's lawful instructions within the scope of the agency agreement. However, an agent must NEVER follow instructions that are illegal (such as discriminatory practices), unethical, or outside the scope of their authority. If a client requests something illegal, the agent must refuse and explain why."}, {"id": 215, "category": "Practice of Real Estate", "q": "A broker price opinion (BPO) is:", "choices": ["A formal appraisal", "An estimate of property value prepared by a licensed real estate broker, often for lenders", "A government assessment", "A buyer's offer price"], "answer": 1, "hint": "Lenders sometimes use these as a less expensive alternative to a full appraisal.", "explanation": "A broker price opinion (BPO) is an estimate of property value prepared by a licensed real estate broker or agent, often at the request of a lender for short sales, foreclosures, or portfolio valuation. BPOs are less formal and less expensive than full appraisals. In California, BPOs cannot be used in lieu of appraisals for federally related transactions."}, {"id": 216, "category": "Practice of Real Estate", "q": "Under California law, a real estate licensee must disclose their license status:", "choices": ["Never—it's private information", "In all advertising and solicitation materials, and the first point of contact with consumers", "Only when asked by the client", "Only on the MLS listing"], "answer": 1, "hint": "Transparency about licensure is required in all professional communications.", "explanation": "California law requires real estate licensees to disclose their license status and employing broker in all advertising, solicitation, and first point of contact. Business cards, websites, email signatures, social media, signs, and marketing materials must include the licensee's name, license number (DRE #), and broker's identity."}, {"id": 217, "category": "Land Use", "q": "Eminent domain proceedings are also known as:", "choices": ["Adverse possession", "Condemnation proceedings", "Zoning hearings", "Variance applications"], "answer": 1, "hint": "The legal process by which the government takes private property.", "explanation": "Condemnation is the legal process through which the government exercises its power of eminent domain to acquire private property for public use. The government must demonstrate that the taking serves a public purpose and must pay just compensation (fair market value). Property owners can challenge the taking or the amount of compensation in court."}, {"id": 218, "category": "Land Use", "q": "Buffer zones in zoning are:", "choices": ["Areas between conflicting land uses that reduce negative impacts", "Zones where no building is allowed", "Military restricted areas", "Flood protection barriers"], "answer": 0, "hint": "These zones act as transitions between incompatible uses.", "explanation": "Buffer zones are areas designated between different land uses (e.g., between industrial and residential) to reduce the negative impact of one use on another. They may include parks, open space, landscaping, or transitional commercial uses. Buffer zones help protect residential areas from noise, traffic, pollution, and visual impacts of heavier uses."}, {"id": 219, "category": "Fair Housing", "q": "A complaint under the Federal Fair Housing Act must be filed within:", "choices": ["30 days", "6 months", "1 year of the alleged violation", "5 years"], "answer": 2, "hint": "There is a statutory time limit for filing fair housing complaints.", "explanation": "A complaint with HUD under the Federal Fair Housing Act must be filed within one year (365 days) of the last alleged discriminatory act. Alternatively, a private lawsuit may be filed in federal court within 2 years. State timelines may differ—California's FEHA has a 1-year statute of limitations for filing with the Department of Civil Rights."}, {"id": 220, "category": "Fair Housing", "q": "Senior housing (55+) is exempt from familial status protections if:", "choices": ["The owner simply prefers older tenants", "At least 80% of units have one resident 55+ and the community publishes policies demonstrating intent", "All residents are over 65", "The property has fewer than 10 units"], "answer": 1, "hint": "The Housing for Older Persons Act (HOPA) sets specific requirements.", "explanation": "Under HOPA, housing qualifies for the 55+ exemption from familial status protections if: (1) at least 80% of occupied units have at least one resident who is 55 or older, (2) the community publishes and follows policies demonstrating intent to be 55+ housing, and (3) complies with verification procedures. The 62+ exemption requires ALL residents to be 62+."}, {"id": 221, "category": "Financing", "q": "A conforming loan is one that:", "choices": ["Exceeds Fannie Mae/Freddie Mac limits", "Meets the guidelines and loan limits set by Fannie Mae/Freddie Mac", "Is only available through the FHA", "Has no down payment requirement"], "answer": 1, "hint": "These loans conform to GSE standards.", "explanation": "A conforming loan meets the underwriting guidelines and loan amount limits set by Fannie Mae and Freddie Mac. The conforming loan limit is adjusted annually ($766,550 in most areas for 2024, higher in high-cost areas like parts of California). Loans exceeding this limit are 'jumbo' or non-conforming loans and typically have higher interest rates."}, {"id": 222, "category": "Financing", "q": "A jumbo loan is:", "choices": ["A small personal loan", "A loan that exceeds conforming loan limits", "A government-insured loan", "A loan with a term over 30 years"], "answer": 1, "hint": "The loan amount exceeds what Fannie Mae and Freddie Mac will purchase.", "explanation": "A jumbo loan exceeds the conforming loan limits set by Fannie Mae and Freddie Mac. In high-cost areas of California (including Los Angeles County), the conforming limit is higher than the national baseline. Jumbo loans typically require higher credit scores, larger down payments, and come with higher interest rates due to increased lender risk."}, {"id": 223, "category": "Financing", "q": "Amortization is the process of:", "choices": ["Increasing the loan balance over time", "Paying off a loan through regular payments of principal and interest over its term", "Depreciating property for tax purposes", "Refinancing an existing loan"], "answer": 1, "hint": "Each payment chips away at both the interest owed and the loan balance.", "explanation": "Amortization is the gradual repayment of a loan through scheduled periodic payments that include both principal and interest. In early payments, most goes to interest; over time, more goes to principal. A fully amortized loan is completely paid off at the end of the term. An amortization schedule shows the breakdown of each payment."}, {"id": 224, "category": "Financing", "q": "The Community Reinvestment Act (CRA) requires:", "choices": ["All banks to offer free checking accounts", "Banks to meet the credit needs of all communities in their service areas, including low-income areas", "Banks to forgive outstanding debts", "All mortgages to have fixed interest rates"], "answer": 1, "hint": "This law was enacted to combat redlining and promote fair lending.", "explanation": "The CRA (1977) requires banks and thrifts to help meet the credit needs of all segments of their communities, including low- and moderate-income neighborhoods. Federal regulators evaluate institutions' CRA performance when considering applications for mergers, acquisitions, or new branches. The CRA was enacted largely to combat redlining."}, {"id": 225, "category": "Financing", "q": "Predatory lending includes practices such as:", "choices": ["Offering competitive interest rates", "Charging excessive fees, inflating appraisals, or steering borrowers into unfavorable loans they can't afford", "Requiring a 20% down payment", "Verifying the borrower's income"], "answer": 1, "hint": "These practices take advantage of vulnerable borrowers.", "explanation": "Predatory lending involves unfair, deceptive, or fraudulent practices during the loan origination process. Examples include: excessive fees and closing costs, balloon payments without disclosure, steering to higher-cost loans when the borrower qualifies for better terms, falsifying documents, and loan flipping (repeated unnecessary refinancing). These practices disproportionately affect vulnerable populations."}, {"id": 226, "category": "Property Ownership", "q": "Riparian rights in California are based on:", "choices": ["First use of the water", "Ownership of land bordering a watercourse", "Government permits only", "The depth of the water table"], "answer": 1, "hint": "Your land touches the water, so you have rights to use it reasonably.", "explanation": "Riparian rights in California are based on ownership of land that borders a natural watercourse (river, stream, creek). The riparian owner has the right to reasonable use of the water for beneficial purposes. In California, a hybrid system exists combining riparian rights with the prior appropriation doctrine. Water rights are considered real property rights."}, {"id": 227, "category": "Property Ownership", "q": "A fixture is determined by the:", "choices": ["Color of the item", "Method of attachment, adaptability, intent, agreement, and relationship of the parties", "Age of the item", "Cost of the item"], "answer": 1, "hint": "Several tests determine whether an item is a fixture or personal property.", "explanation": "Whether an item is a fixture (real property) or personal property is determined by: (1) Method of attachment—how permanently is it attached? (2) Adaptability—is it designed for the property? (3) Intent—did the person intend it to be permanent? (4) Agreement—what do the parties' contracts say? (5) Relationship—landlord/tenant vs. buyer/seller. Remember the mnemonic MARIA."}, {"id": 228, "category": "Property Ownership", "q": "Subsurface rights include:", "choices": ["Only the right to build above the land", "Rights to minerals, oil, gas, and water beneath the surface", "Only the right to farm the topsoil", "Air rights above the property"], "answer": 1, "hint": "What lies beneath the surface can be very valuable.", "explanation": "Subsurface (mineral) rights include the rights to extract and profit from minerals, oil, natural gas, and groundwater beneath the surface. These rights can be separated from surface rights and sold or leased independently. In California, mineral rights are significant—the owner of mineral rights may have the right to enter the surface for extraction."}, {"id": 229, "category": "Property Ownership", "q": "A deed of trust reconveyance is issued when:", "choices": ["The property is sold", "The loan secured by the deed of trust is fully paid off", "The borrower refinances", "The property is foreclosed"], "answer": 1, "hint": "This document clears the lien from the property's title.", "explanation": "When a deed of trust loan is fully paid, the beneficiary (lender) requests the trustee to issue a deed of reconveyance, which transfers legal title from the trustee back to the trustor (borrower) and removes the lien from the property's title. The reconveyance should be recorded to clear the public record. This is similar to a mortgage satisfaction."}, {"id": 230, "category": "Property Ownership", "q": "An encroachment is:", "choices": ["An easement granted by the owner", "A physical intrusion of a structure onto adjacent property or a public right-of-way", "A zoning violation", "A type of deed restriction"], "answer": 1, "hint": "Something from one property extends over the boundary line onto another.", "explanation": "An encroachment occurs when a structure, improvement, or part of a structure physically intrudes onto an adjacent property or public right-of-way. Examples include a fence, roof overhang, or driveway extending past the property line. Encroachments can be discovered through a survey or physical inspection and may need to be resolved before sale."}, {"id": 231, "category": "Contracts", "q": "The mailbox rule states that acceptance of an offer is effective when:", "choices": ["Received by the offeror", "Dispatched (sent) by the offeree, if authorized method of communication is used", "Read by the offeror", "Notarized by the offeree"], "answer": 1, "hint": "Acceptance takes effect at the moment it's sent, not when received.", "explanation": "The mailbox rule (or postal acceptance rule) states that acceptance of an offer is effective when dispatched (placed in the mail or sent) by the offeree, as long as it's sent by an authorized method. However, revocation of an offer is effective only when received by the offeree. Many real estate transactions now use electronic communications, which may modify this rule."}, {"id": 232, "category": "Contracts", "q": "A land contract (contract for deed) is:", "choices": ["A standard purchase agreement", "An installment sale where the seller retains legal title until the buyer completes all payments", "A lease with no option to buy", "A government land grant"], "answer": 1, "hint": "The buyer gets possession and equitable title but not legal title.", "explanation": "A land contract (contract for deed, installment land contract) is a form of seller financing where the buyer makes installment payments to the seller. The buyer gets possession and equitable title, but the seller retains legal title until the contract is fully paid. Upon completion, the seller delivers a deed. This carries risk for buyers who invest in property they don't yet own."}, {"id": 233, "category": "Contracts", "q": "Duress in contract law means:", "choices": ["A friendly negotiation", "Using force, threats, or coercion to compel someone to enter a contract", "Offering a discount on the purchase price", "Requiring a home inspection"], "answer": 1, "hint": "The victim's free will is overcome by threats or force.", "explanation": "Duress occurs when one party uses threats, force, or coercion to compel another party to enter a contract against their will. Contracts made under duress are voidable by the victim. Examples include threats of physical harm, blackmail, or threatening to withhold critical services. Economic duress may also apply when one party exploits another's financial desperation."}, {"id": 234, "category": "Contracts", "q": "A contract is void if:", "choices": ["One party changes their mind", "It has an illegal purpose or objective", "The price is above market value", "Both parties are over 65"], "answer": 1, "hint": "Some contracts are invalid from the very beginning.", "explanation": "A void contract has no legal effect from the beginning—it is as if the contract never existed. Contracts are void if they: involve an illegal purpose, are made by persons adjudicated as mentally incompetent, or lack essential elements. Unlike voidable contracts, void contracts cannot be ratified or enforced by either party."}, {"id": 235, "category": "Contracts", "q": "In California, the inspection contingency allows the buyer to:", "choices": ["Demand the seller make all repairs", "Investigate the property condition and negotiate or cancel based on findings", "Extend the closing date indefinitely", "Reduce the price by a fixed percentage"], "answer": 1, "hint": "The buyer has the right to investigate and respond to what they find.", "explanation": "The inspection contingency gives the buyer the right to investigate the property's condition (structural, mechanical, environmental, pest, etc.) within a specified period. Based on findings, the buyer can: accept the condition, negotiate repairs or credits with the seller, or cancel the contract. The standard period in California's RPA is 17 days."}, {"id": 236, "category": "Valuation", "q": "Market value is defined as:", "choices": ["The price a seller wants", "The most probable price a property would bring in a competitive and open market under fair sale conditions", "The tax assessed value", "The insurance replacement cost"], "answer": 1, "hint": "This definition assumes informed, unpressured parties and reasonable exposure time.", "explanation": "Market value is the most probable price a property would bring in a competitive, open market under conditions required for a fair sale: buyer and seller are typically motivated, both are well-informed, a reasonable exposure time is allowed, payment is in cash or equivalent, and the price is not affected by special financing or concessions."}, {"id": 237, "category": "Valuation", "q": "Reconciliation in an appraisal is:", "choices": ["Correcting errors in the appraisal report", "The process of analyzing and weighing the results from different approaches to arrive at a final value estimate", "Resolving disputes between buyer and seller", "Comparing the appraisal to the tax assessment"], "answer": 1, "hint": "The appraiser must determine which approach(es) are most reliable for the subject property.", "explanation": "Reconciliation is the final step in the appraisal process where the appraiser analyzes and weighs the value indications from the different approaches used (sales comparison, cost, and/or income). The appraiser considers which approach is most applicable, the quality of data, and the reliability of each indication to arrive at a single final value opinion. It is NOT a simple average."}, {"id": 238, "category": "Valuation", "q": "A property's assessed value in California is typically:", "choices": ["Equal to market value", "The purchase price adjusted by no more than 2% annually under Proposition 13", "Set by the real estate agent", "The insured value of improvements"], "answer": 1, "hint": "Proposition 13 limits how much assessed value can increase each year.", "explanation": "Under Proposition 13, a property's assessed value is initially set at the purchase price (or market value at time of new construction) and can increase by no more than 2% per year (factored as the California CPI or 2%, whichever is less). Upon a change of ownership, the property is reassessed to current market value. This creates significant differences between assessed and market values for long-held properties."}, {"id": 239, "category": "Valuation", "q": "The principle of anticipation states that:", "choices": ["Past events determine value", "Value is created by the expectation of future benefits", "All properties eventually lose value", "Supply always exceeds demand"], "answer": 1, "hint": "Buyers pay today for what they expect to receive tomorrow.", "explanation": "The principle of anticipation states that property value is based on the expectation (anticipation) of future benefits to be derived from ownership. Buyers pay current prices based on expected future income, appreciation, use, and enjoyment. This principle is especially important in the income approach, where value is based on the present worth of expected future income."}, {"id": 240, "category": "Valuation", "q": "An arm's length transaction is one in which:", "choices": ["The parties know each other personally", "The buyer and seller act independently, with no relationship or undue pressure", "One party has a significant advantage", "The property is sold at below market value"], "answer": 1, "hint": "Both parties are acting in their own self-interest without special relationships.", "explanation": "An arm's length transaction is one where the buyer and seller act independently, voluntarily, and in their own self-interest, with no relationship that would affect the price. Sales between family members, foreclosure sales, and distressed sales are generally NOT arm's length and may not reflect true market value. Comparable sales used in appraisals should be arm's length transactions."}, {"id": 241, "category": "Transfer of Property", "q": "A trustee's deed is used in:", "choices": ["A voluntary sale between buyer and seller", "A non-judicial foreclosure sale under a deed of trust", "A probate transfer", "A gift between family members"], "answer": 1, "hint": "This deed is issued when the trustee conducts a foreclosure sale.", "explanation": "A trustee's deed (trustee's deed upon sale) is issued by the trustee to the successful bidder at a non-judicial foreclosure sale under a deed of trust. It conveys whatever interest the trustor (borrower) had in the property. The deed is recorded and the new owner takes the property subject to certain senior liens but free of junior liens."}, {"id": 242, "category": "Transfer of Property", "q": "In California, a transfer disclosure statement is NOT required for:", "choices": ["A sale by a private owner", "Sales by court-appointed fiduciaries, transfers between co-owners, and foreclosure sales", "A sale with a real estate agent", "A sale of a condominium"], "answer": 1, "hint": "Certain types of transfers are exempt from TDS requirements.", "explanation": "The TDS is not required for: court-ordered sales (probate, bankruptcy, foreclosure), transfers by fiduciaries (trustees, executors), transfers between co-owners, transfers to or from a government entity, transfers by a relocation company, and first sales of subdivisions with a DRE public report. However, sellers in these categories should still disclose known defects."}, {"id": 243, "category": "Transfer of Property", "q": "A beneficiary statement in connection with a deed of trust discloses:", "choices": ["The property's market value", "The current loan balance, interest rate, and payment information", "The borrower's credit score", "The property's tax assessment"], "answer": 1, "hint": "This statement shows the current status of the loan.", "explanation": "A beneficiary statement is a document from the lender (beneficiary) disclosing the current unpaid balance, interest rate, monthly payment, and other loan terms for a property secured by a deed of trust. It is typically obtained during escrow to ensure accurate payoff or assumption amounts. In California, the lender must provide it within 21 days of a written request."}, {"id": 244, "category": "Transfer of Property", "q": "Proposition 58/193 (now modified by Prop 19) originally allowed:", "choices": ["Unlimited property transfers between anyone", "Parent-child and grandparent-grandchild transfers to avoid property tax reassessment", "All inherited properties to avoid reassessment", "Married couples to avoid all property taxes"], "answer": 1, "hint": "These propositions provided significant property tax benefits for family transfers.", "explanation": "Proposition 58 allowed parents and children to transfer a primary residence (of any value) and up to $1 million in other real property without reassessment. Prop 193 extended this to grandparent-grandchild transfers (if the parents were deceased). Prop 19 (2021) significantly limited this by requiring the child to use the property as their primary residence for the exclusion."}, {"id": 245, "category": "Transfer of Property", "q": "The Megan's Law database in California:", "choices": ["Lists all properties with building code violations", "Provides information about registered sex offenders by location", "Tracks property values by neighborhood", "Lists foreclosure properties"], "answer": 1, "hint": "California requires disclosure that this database exists.", "explanation": "California's Megan's Law requires sellers and agents to inform buyers about the existence of the Megan's Law database, which allows the public to look up information about registered sex offenders in their area. Agents are NOT required to check the database themselves—only to disclose its existence. The disclosure is included in the standard purchase agreement."}, {"id": 246, "category": "Agency", "q": "A buyer's agent owes a duty to:", "choices": ["The seller exclusively", "The buyer as their client, with honest dealing to the seller", "Neither party", "Only the listing broker"], "answer": 1, "hint": "The buyer's agent represents the buyer's interests.", "explanation": "A buyer's agent owes full fiduciary duties (COLDAC) to the buyer as their client. The agent must advocate for the buyer's interests, negotiate on their behalf, and protect their confidential information. However, the buyer's agent still owes a duty of honest and fair dealing to the seller and must not make misrepresentations about material facts."}, {"id": 247, "category": "Agency", "q": "Apparent authority in agency means:", "choices": ["Authority expressly written in a contract", "Authority that a third party reasonably believes the agent has based on the principal's actions or representations", "Authority implied by custom", "Authority granted by the court"], "answer": 1, "hint": "A third party's reasonable belief creates this type of authority.", "explanation": "Apparent authority (ostensible authority) exists when a principal's conduct leads a third party to reasonably believe the agent has authority to act, even if the agent actually doesn't. For example, if a seller introduces someone as 'my real estate agent,' third parties may reasonably rely on that representation, and the principal may be bound by the agent's actions."}, {"id": 248, "category": "Agency", "q": "A listing broker's commission is typically:", "choices": ["Set by state law at 6%", "Negotiable between the broker and the seller", "Determined by the MLS", "Fixed by the local real estate board"], "answer": 1, "hint": "Antitrust laws prohibit fixed commission rates.", "explanation": "Real estate commissions are ALWAYS negotiable between the broker and the client. There is no standard or mandated commission rate. Any agreement among brokers to set or maintain commission rates is a violation of federal antitrust laws (Sherman Act). The commission amount, structure, and terms should be clearly stated in the listing agreement."}, {"id": 249, "category": "Practice of Real Estate", "q": "Secret profit occurs when:", "choices": ["A broker earns a normal commission", "A broker or agent receives undisclosed compensation in a transaction", "A property appreciates in value", "An investor earns rental income"], "answer": 1, "hint": "All compensation must be fully disclosed.", "explanation": "Secret profit is any undisclosed financial benefit an agent receives from a transaction beyond their agreed commission. Examples include undisclosed referral fees, kickbacks from service providers, or buying the principal's property through a straw buyer at a lower price. Secret profits violate the agent's fiduciary duty of loyalty and can result in license revocation and liability for damages."}, {"id": 250, "category": "Practice of Real Estate", "q": "A blind ad in real estate advertising is:", "choices": ["An ad with a large eye-catching headline", "An advertisement that fails to identify the advertiser as a licensed real estate agent or broker", "An ad placed in a newspaper with no photos", "An ad visible only online"], "answer": 1, "hint": "Consumers should always know they're dealing with a licensed professional.", "explanation": "A blind ad is an advertisement for real estate services or a property listing that does not identify the advertiser as a licensed real estate agent or broker. Blind ads are prohibited in California. All real estate advertisements must include the broker's identity and DRE license number. This ensures consumers know they are dealing with a licensed professional."}, {"id": 251, "category": "Financing", "q": "A construction loan is also known as:", "choices": ["A permanent loan", "An interim or short-term loan", "A VA loan", "A conforming loan"], "answer": 1, "hint": "This loan covers the building phase before permanent financing.", "explanation": "A construction loan is an interim (short-term) loan that provides funds to build improvements on land. It is typically interest-only during construction, with funds disbursed in stages as work progresses. Upon completion, the construction loan is usually replaced by a permanent (take-out) loan. Construction loans carry higher interest rates due to increased risk."}, {"id": 252, "category": "Financing", "q": "A home equity line of credit (HELOC) is:", "choices": ["A fixed-rate second mortgage", "A revolving line of credit secured by the home's equity", "A government grant for home improvements", "A type of first mortgage"], "answer": 1, "hint": "Like a credit card secured by your house.", "explanation": "A HELOC is a revolving line of credit secured by the borrower's home equity. The borrower can draw funds as needed (up to the credit limit) during the draw period, typically 5-10 years. Interest rates are usually adjustable. After the draw period, the repayment period begins. HELOCs are popular for home improvements, debt consolidation, and major expenses."}, {"id": 253, "category": "Financing", "q": "The loan origination fee compensates the lender for:", "choices": ["Title insurance costs", "Processing and underwriting the loan application", "Property appraisal", "Home inspection"], "answer": 1, "hint": "This fee covers the lender's costs to create the loan.", "explanation": "The loan origination fee compensates the lender for the administrative costs of processing, underwriting, and funding the loan. It is typically expressed as a percentage of the loan amount (e.g., 0.5% to 1%). The origination fee is a closing cost paid by the borrower and must be disclosed in the Loan Estimate and Closing Disclosure."}, {"id": 254, "category": "Financing", "q": "Hypothecation means:", "choices": ["Taking title to a property", "Pledging property as security for a loan without giving up possession", "Paying off a loan early", "Refinancing an existing loan"], "answer": 1, "hint": "You borrow money using your property as collateral but continue living there.", "explanation": "Hypothecation is the process of pledging property as collateral (security) for a loan while retaining possession and use of the property. When a homeowner gets a mortgage, they hypothecate their home—the lender has a lien on it, but the owner continues to live in and use the property. If the borrower defaults, the lender can foreclose on the hypothecated property."}, {"id": 255, "category": "Financing", "q": "A short sale occurs when:", "choices": ["A property is sold within 30 days of listing", "A property is sold for less than the outstanding mortgage balance, with the lender's approval", "The seller accepts less than the listing price", "A property is sold at a foreclosure auction"], "answer": 1, "hint": "The sale proceeds fall 'short' of the loan balance.", "explanation": "A short sale occurs when a financially distressed homeowner sells the property for less than the outstanding mortgage balance, with the lender's approval. The lender agrees to accept less than what is owed and may forgive the remaining balance or pursue a deficiency judgment (subject to California's anti-deficiency protections). Short sales typically require proof of financial hardship."}, {"id": 256, "category": "Financing", "q": "A qualified mortgage (QM) under Dodd-Frank requires:", "choices": ["No income verification", "The lender to verify the borrower's ability to repay", "100% financing", "Interest-only payments"], "answer": 1, "hint": "Post-2008 reforms require lenders to ensure borrowers can actually afford their loans.", "explanation": "A Qualified Mortgage (QM) is a category of loans with certain stable features that help consumers avoid risky loans and ensure lenders verify the borrower's ability to repay. QM requirements include: full documentation of income and assets, DTI generally ≤43%, no negative amortization, no interest-only periods, and limited points and fees."}, {"id": 257, "category": "Financing", "q": "Mortgage fraud includes:", "choices": ["Accurately reporting income on a loan application", "Falsifying income, assets, or property value to obtain a loan", "Making extra principal payments", "Refinancing to a lower interest rate"], "answer": 1, "hint": "Any intentional misrepresentation in the mortgage process is fraud.", "explanation": "Mortgage fraud involves intentional misrepresentation to a lender during the mortgage process. Examples include: falsifying income or employment, inflating appraisals, concealing debts, identity theft, straw buyer schemes, and illegal property flipping. Mortgage fraud is a federal crime with penalties including up to 30 years imprisonment and $1 million in fines."}, {"id": 258, "category": "Financing", "q": "The annual percentage rate (APR) is typically higher than the note rate because:", "choices": ["It includes only the base interest", "It incorporates the interest rate plus other loan costs like origination fees, PMI, and closing costs", "It is calculated differently", "It includes property taxes"], "answer": 1, "hint": "The APR reflects the true total cost of borrowing, not just the interest.", "explanation": "The APR is higher than the note (stated) rate because it includes the interest rate plus certain other loan costs expressed as an annual percentage. These costs may include origination fees, discount points, mortgage insurance, and certain closing costs. The APR provides a standardized way to compare the total cost of loans from different lenders."}, {"id": 259, "category": "Financing", "q": "Ginnie Mae (GNMA) guarantees:", "choices": ["Conventional loans only", "Mortgage-backed securities composed of FHA, VA, and USDA loans", "Home equity lines of credit", "Commercial real estate loans"], "answer": 1, "hint": "Ginnie Mae is the only GSE backed by the full faith and credit of the U.S. government.", "explanation": "Ginnie Mae (Government National Mortgage Association) guarantees the timely payment of principal and interest on mortgage-backed securities composed of federally insured or guaranteed loans (FHA, VA, USDA). Unlike Fannie Mae and Freddie Mac, Ginnie Mae is backed by the full faith and credit of the U.S. government, making its securities essentially risk-free."}, {"id": 260, "category": "Financing", "q": "A bridge loan is used to:", "choices": ["Finance a bridge construction project", "Provide short-term financing between the sale of one property and purchase of another", "Finance property in a different state", "Consolidate multiple mortgages"], "answer": 1, "hint": "This loan 'bridges' the gap between two transactions.", "explanation": "A bridge loan (swing loan) provides short-term financing to bridge the gap between selling one property and purchasing another. It allows the buyer to make an offer on a new home before their current home sells. Bridge loans are typically short-term (6 months to 1 year), have higher interest rates, and are secured by the existing home."}, {"id": 261, "category": "Property Ownership", "q": "In a time-share ownership, the buyer typically receives:", "choices": ["Fee simple title to the entire resort", "A right to use a property for a specific period each year", "A permanent easement", "A life estate in the resort"], "answer": 1, "hint": "You own the right to use the property during your allocated time period.", "explanation": "Time-share ownership typically gives the buyer the right to use a resort property for a specific period each year (e.g., one week). Time-shares can be structured as deeded ownership (fee simple interest in a fraction of the unit) or as a right-to-use license (no ownership interest). California regulates time-share sales under the Vacation Ownership and Time-Share Act."}, {"id": 262, "category": "Property Ownership", "q": "A township in the government survey system contains:", "choices": ["6 sections", "36 sections", "640 sections", "1 section"], "answer": 1, "hint": "A township is a 6-mile by 6-mile square.", "explanation": "A township is a 6-mile by 6-mile square (36 square miles) divided into 36 sections, each one mile square (640 acres). Sections are numbered 1-36 in a serpentine pattern starting from the northeast corner. Section 16 was historically reserved for school purposes. This system is used for describing rural and undeveloped land."}, {"id": 263, "category": "Property Ownership", "q": "A partition action is:", "choices": ["A method of creating a subdivision", "A court proceeding to divide or sell co-owned property when co-owners disagree", "A type of zoning hearing", "A lease termination process"], "answer": 1, "hint": "When co-owners can't agree, the court may intervene to divide the property.", "explanation": "A partition action is a legal proceeding in which a court divides or orders the sale of co-owned property when the co-owners cannot agree on its use or disposition. Partition can be 'in kind' (physically dividing the property) or 'by sale' (selling the property and dividing proceeds). Any co-owner can bring a partition action regardless of ownership share."}, {"id": 264, "category": "Property Ownership", "q": "Avulsion differs from accretion in that avulsion is:", "choices": ["A gradual process", "A sudden and perceptible change in land boundaries caused by water", "A man-made change to the landscape", "A government-ordered boundary change"], "answer": 1, "hint": "Think sudden vs. gradual changes to land caused by water.", "explanation": "Avulsion is a sudden, perceptible change in land caused by the violent action of water, such as a flood or earthquake that shifts a river's course. Unlike accretion (gradual buildup), avulsion does not change property boundaries—the original boundary line remains where it was before the event. The affected landowner may claim the lost land."}, {"id": 265, "category": "Property Ownership", "q": "A deed of trust differs from a mortgage in that a deed of trust:", "choices": ["Involves only two parties", "Involves three parties and allows non-judicial foreclosure", "Provides more protection for the borrower", "Is not recorded"], "answer": 1, "hint": "The trustee is the third party that holds naked legal title.", "explanation": "A deed of trust involves three parties: trustor (borrower), trustee (neutral third party), and beneficiary (lender). The key advantage is that it allows non-judicial foreclosure (power of sale), which is faster and less expensive than the judicial foreclosure required under a mortgage. In California, the deed of trust is the predominant security instrument."}, {"id": 266, "category": "Contracts", "q": "A listing agreement in which the seller retains the right to sell the property themselves without paying a commission is an:", "choices": ["Exclusive right to sell listing", "Exclusive agency listing", "Open listing", "Net listing"], "answer": 1, "hint": "The broker has the exclusive agency but not the exclusive right to a commission in all cases.", "explanation": "An exclusive agency listing gives one broker the exclusive right to represent the seller, but the seller retains the right to find a buyer themselves and not pay a commission. If anyone OTHER than the seller procures the buyer, the listing broker earns the commission. This provides less protection to the broker than an exclusive right to sell listing."}, {"id": 267, "category": "Contracts", "q": "The doctrine of laches prevents a party from:", "choices": ["Filing a lawsuit too quickly", "Enforcing a right after an unreasonable delay that prejudices the other party", "Recording a deed", "Claiming adverse possession"], "answer": 1, "hint": "If you wait too long to enforce your rights, you may lose them.", "explanation": "The doctrine of laches bars a party from enforcing a right or claim after an unreasonable and unjustified delay that prejudices the opposing party. It is an equitable defense—even if the statute of limitations hasn't expired, a court may refuse to grant relief if the delay has been unreasonable and caused the other party harm or disadvantage."}, {"id": 268, "category": "Contracts", "q": "Mutual mistake in a contract:", "choices": ["Makes the contract enforceable", "May make the contract voidable because both parties were wrong about a material fact", "Has no effect on the contract", "Only the buyer can claim mutual mistake"], "answer": 1, "hint": "When both parties share a fundamental misunderstanding.", "explanation": "Mutual mistake occurs when both parties are mistaken about a material fact at the time of contracting. This may render the contract voidable because there was no true meeting of the minds. For example, if both buyer and seller believe a property has 2 acres but it actually has 1.5 acres, the contract may be voidable due to mutual mistake."}, {"id": 269, "category": "Contracts", "q": "An attorney-in-fact is:", "choices": ["A licensed attorney", "A person authorized to act on behalf of another through a power of attorney", "A real estate agent", "A judge who handles real estate cases"], "answer": 1, "hint": "This person doesn't have to be an attorney—anyone can be given this authority.", "explanation": "An attorney-in-fact is a person authorized to act on behalf of another (the principal) through a power of attorney document. The attorney-in-fact does NOT need to be a licensed attorney—any competent person can be designated. In real estate, a power of attorney may authorize someone to sign deeds, contracts, or other documents on the principal's behalf."}, {"id": 270, "category": "Contracts", "q": "A Real Estate Purchase Agreement in California becomes a binding contract when:", "choices": ["The buyer signs the offer", "The seller signs and communicates acceptance to the buyer", "The earnest money deposit is received", "Escrow is opened"], "answer": 1, "hint": "Both signature and communication of acceptance are required.", "explanation": "A binding contract is formed when the seller accepts the buyer's offer (signs without changes) AND communicates that acceptance to the buyer or buyer's agent. Mere signing without communication is not enough. Until acceptance is communicated, the seller can still revoke. Once communicated, the contract is binding on both parties."}, {"id": 271, "category": "Agency", "q": "The seller's agent must disclose to the buyer:", "choices": ["The lowest price the seller will accept", "All known material facts about the property's condition", "The seller's financial situation", "Other offers the seller has received"], "answer": 1, "hint": "Material property defects must be shared with all parties.", "explanation": "While the seller's agent owes fiduciary duties to the seller, they must disclose all known material facts about the property's physical condition to ALL parties, including the buyer. Material defects, environmental hazards, and structural issues must be disclosed. However, the agent must NOT disclose confidential client information like the seller's bottom line price."}, {"id": 272, "category": "Agency", "q": "California's visual inspection requirement requires agents to:", "choices": ["Hire a professional home inspector", "Conduct a reasonably competent and diligent visual inspection of accessible areas", "Inspect the roof and crawl space", "Provide a warranty on the property's condition"], "answer": 1, "hint": "Agents must personally look at the property—not just rely on the seller's disclosures.", "explanation": "California Civil Code Section 2079 requires both the listing agent and the selling (buyer's) agent to conduct a reasonably competent and diligent visual inspection of accessible areas of the property and disclose all material facts discovered. This is a visual inspection only—agents are not required to inspect areas that are not reasonably accessible or hire specialists."}, {"id": 273, "category": "Agency", "q": "A transaction broker (non-agent facilitator) provides:", "choices": ["Full fiduciary duties to both parties", "Limited services without fiduciary duties, facilitating the transaction between parties", "Representation only to the seller", "Legal advice to both parties"], "answer": 1, "hint": "This intermediary helps the transaction proceed without representing either side.", "explanation": "A transaction broker (also called a facilitator or intermediary) assists both parties in a real estate transaction without representing either one. They provide limited services (paperwork processing, scheduling) but do NOT owe fiduciary duties. While not widely used in California (where agents typically represent one party), it exists in some states as an alternative to dual agency."}, {"id": 274, "category": "Land Use", "q": "Asbestos in buildings is a concern because:", "choices": ["It causes structural damage", "Inhaling asbestos fibers can cause serious respiratory disease and cancer", "It reduces property values by exactly 50%", "It affects plumbing systems"], "answer": 1, "hint": "This building material poses health risks when disturbed.", "explanation": "Asbestos was commonly used in building materials (insulation, floor tiles, roof shingles, pipe wrapping) before its health risks were understood. When disturbed, asbestos releases tiny fibers that, when inhaled, can cause mesothelioma, lung cancer, and asbestosis. Sellers must disclose known asbestos. Removal or encapsulation by certified professionals may be required."}, {"id": 275, "category": "Land Use", "q": "Radon is:", "choices": ["A man-made chemical", "A naturally occurring radioactive gas that can accumulate in buildings and cause lung cancer", "A type of mold", "A pesticide residue"], "answer": 1, "hint": "This invisible, odorless gas seeps up from the ground.", "explanation": "Radon is a naturally occurring, colorless, odorless radioactive gas produced by the decay of uranium in soil and rock. It can seep into buildings through cracks in foundations and accumulate to dangerous levels. Radon is the second leading cause of lung cancer after smoking. Testing is inexpensive, and mitigation systems can reduce radon to safe levels."}, {"id": 276, "category": "Land Use", "q": "A Phase I Environmental Site Assessment (ESA) is:", "choices": ["Laboratory testing of soil and water samples", "A records review and site inspection to identify potential environmental contamination", "A government-mandated cleanup of contaminated land", "An air quality test"], "answer": 1, "hint": "This is the first step in environmental due diligence.", "explanation": "A Phase I ESA is a non-invasive assessment that includes a historical records review, regulatory database search, site reconnaissance, and interviews to identify recognized environmental conditions (RECs) that may indicate contamination. It does NOT include sampling or testing. If potential contamination is identified, a Phase II ESA (with sampling and testing) may be recommended."}, {"id": 277, "category": "Land Use", "q": "In California, the Alquist-Priolo Earthquake Fault Zoning Act requires:", "choices": ["All buildings to be earthquake-proof", "Disclosure of properties located within designated earthquake fault zones and prohibits most structures within those zones", "Annual earthquake insurance for all homeowners", "Seismic retrofitting of all buildings built before 1970"], "answer": 1, "hint": "California has specific regulations about building near known earthquake faults.", "explanation": "The Alquist-Priolo Act (1972) prohibits the construction of most structures for human occupancy on the surface trace of active faults. Properties within designated Earthquake Fault Zones must be disclosed to buyers. A geologic investigation may be required before development. This act is reflected in the Natural Hazard Disclosure Statement."}, {"id": 278, "category": "Land Use", "q": "An underground storage tank (UST) is a concern because:", "choices": ["It takes up space underground", "Leaking USTs can contaminate soil and groundwater with hazardous substances", "They are always illegal", "They reduce the property's square footage"], "answer": 1, "hint": "Old tanks can corrode and leak toxic substances into the environment.", "explanation": "Underground storage tanks (commonly used for fuel or chemicals) can corrode and leak, contaminating soil and groundwater. Federal and state regulations require registration, monitoring, and removal or upgrading of USTs. Property owners may be liable for cleanup costs, which can be substantial. UST status should be investigated during due diligence."}, {"id": 279, "category": "Property Management", "q": "A holdover tenant is one who:", "choices": ["Pays rent in advance", "Remains in possession after the lease has expired", "Has a month-to-month lease", "Subleases to another party"], "answer": 1, "hint": "The lease ended, but the tenant hasn't left.", "explanation": "A holdover tenant (tenant at sufferance) remains in possession of the property after the lease term has expired without the landlord's consent. The landlord can either evict the holdover tenant or accept rent and create a new periodic tenancy (typically month-to-month). A holdover tenant has no legal right to possession—their status is less than any other type of tenant."}, {"id": 280, "category": "Property Management", "q": "The California Residential Landlord-Tenant Act requires:", "choices": ["All rentals to be furnished", "That landlords maintain habitable conditions, return security deposits within 21 days, and follow specific eviction procedures", "Rent to be frozen at original levels", "All leases to be 1-year minimum"], "answer": 1, "hint": "California has comprehensive landlord-tenant regulations.", "explanation": "The California Residential Landlord and Tenant Act provides comprehensive regulations including: landlord's duty to maintain habitable conditions, security deposit limits and return requirements (21 days), specific notice requirements for rent increases and lease terminations, just cause eviction requirements (AB 1482), and tenant rights regarding repairs, privacy, and retaliation protection."}, {"id": 281, "category": "Fair Housing", "q": "The Civil Rights Act of 1866:", "choices": ["Only prohibits discrimination in employment", "Prohibits racial discrimination in ALL real estate transactions with NO exceptions", "Has been superseded by the Fair Housing Act", "Only applies to government-owned property"], "answer": 1, "hint": "This is the oldest and most absolute anti-discrimination law for real estate.", "explanation": "The Civil Rights Act of 1866 (based on the 13th Amendment) prohibits discrimination based on race in ALL property transactions. Unlike the Fair Housing Act, there are NO exemptions—no Mrs. Murphy exemption, no private club exemption. It was upheld by the Supreme Court in Jones v. Mayer (1968). It provides the strongest protection against racial discrimination."}, {"id": 282, "category": "Fair Housing", "q": "A reasonable modification under fair housing law is:", "choices": ["A change in rules or policies", "A physical change to the dwelling made by or for a disabled tenant", "A rent reduction", "A change in lease terms"], "answer": 1, "hint": "This involves actual physical changes to the structure, unlike a reasonable accommodation.", "explanation": "A reasonable modification is a structural change to the premises made by or for a person with a disability to afford full enjoyment. Examples include: installing grab bars, widening doorways, building a wheelchair ramp, or lowering countertops. In rental housing, the tenant typically pays for modifications and may be required to restore the premises upon departure."}, {"id": 283, "category": "Escrow & Closing", "q": "An escrow officer's duties include:", "choices": ["Negotiating the sale price", "Following the escrow instructions of both parties, handling funds, and ensuring conditions are met before closing", "Representing the buyer or seller", "Appraising the property"], "answer": 1, "hint": "The escrow officer is a neutral third party.", "explanation": "An escrow officer acts as a neutral third party who follows the written escrow instructions of both buyer and seller. Duties include: receiving and safeguarding funds, ordering title search, receiving and reviewing documents, prorating expenses, preparing closing statements, disbursing funds, and recording documents. The escrow officer does NOT represent either party or provide legal advice."}, {"id": 284, "category": "Escrow & Closing", "q": "In California, escrow is considered 'complete' when:", "choices": ["Both parties sign the purchase agreement", "All conditions in the escrow instructions have been met and all documents and funds are properly exchanged", "The buyer moves into the property", "The listing agent receives their commission"], "answer": 1, "hint": "Escrow closes when every condition has been satisfied.", "explanation": "Escrow is complete when all conditions specified in the escrow instructions have been fulfilled: all required documents are signed and delivered, all funds are deposited and properly disbursed, all contingencies are removed, all conditions (loan approval, clear title, inspections) are satisfied, and the deed is recorded. Only then does the escrow officer close escrow and disburse funds."}, {"id": 285, "category": "Practice of Real Estate", "q": "The Real Estate Recovery Fund in California:", "choices": ["Provides grants for first-time homebuyers", "Compensates members of the public who suffer financial loss due to a licensee's fraud or other specified violations", "Funds real estate education programs", "Insures all real estate transactions"], "answer": 1, "hint": "This fund exists to protect the public from licensee misconduct.", "explanation": "The California Real Estate Recovery Fund compensates members of the public who suffer actual financial loss due to a licensee's fraud, misrepresentation, deceit, or conversion of trust funds, when the licensee is unable to pay a court judgment. The maximum payment is $50,000 per transaction and $250,000 per licensee. If paid, the licensee's license is suspended until the fund is reimbursed."}, {"id": 286, "category": "Practice of Real Estate", "q": "A real estate licensee must report a criminal conviction to the DRE within:", "choices": ["30 days", "60 days", "90 days", "1 year"], "answer": 0, "hint": "The DRE requires prompt notification of criminal convictions.", "explanation": "California real estate licensees must report any criminal conviction (other than minor traffic violations) to the DRE within 30 days. Failure to report can result in additional disciplinary action. The DRE considers criminal convictions when evaluating a licensee's fitness and may take disciplinary action including suspension or revocation."}, {"id": 287, "category": "Math & Calculations", "q": "A property sells for $500,000 and the broker receives a 5% commission. The listing agent's share is 60% of the listing side (which is half the total commission). How much does the listing agent earn?", "choices": ["$7,500", "$15,000", "$12,500", "$25,000"], "answer": 0, "hint": "Calculate total commission, then the listing side, then the agent's share.", "explanation": "Total commission: $500,000 × 5% = $25,000. Listing side: $25,000 ÷ 2 = $12,500. Listing agent's share: $12,500 × 60% = $7,500. Commission splits vary by brokerage agreement—the broker retains the remainder ($5,000 in this case)."}, {"id": 288, "category": "Math & Calculations", "q": "If a property has an NOI of $60,000 and the investor wants a 6% return, what is the maximum purchase price?", "choices": ["$360,000", "$1,000,000", "$600,000", "$100,000"], "answer": 1, "hint": "Use the income capitalization formula: Value = NOI ÷ Cap Rate.", "explanation": "Value = NOI ÷ Cap Rate = $60,000 ÷ 0.06 = $1,000,000. The investor should pay no more than $1,000,000 to achieve a 6% return. A higher cap rate would result in a lower price (more risk = higher required return = lower price). A lower cap rate indicates lower risk and a higher price."}, {"id": 289, "category": "Math & Calculations", "q": "A property was purchased for $300,000 and sold for $375,000. What is the percentage of profit?", "choices": ["20%", "25%", "75%", "15%"], "answer": 1, "hint": "Percentage profit = (Profit ÷ Original Cost) × 100.", "explanation": "Profit = $375,000 - $300,000 = $75,000. Percentage profit = ($75,000 ÷ $300,000) × 100 = 25%. Always divide the profit by the ORIGINAL cost (not the sale price) to calculate percentage of profit. This is a common exam calculation."}, {"id": 290, "category": "Math & Calculations", "q": "If annual property taxes are $6,000 and the tax rate is 1%, what is the assessed value?", "choices": ["$60,000", "$600,000", "$6,000,000", "$360,000"], "answer": 1, "hint": "Assessed Value = Tax Amount ÷ Tax Rate.", "explanation": "Assessed Value = Tax Amount ÷ Tax Rate = $6,000 ÷ 0.01 = $600,000. In California, Proposition 13 limits the property tax rate to 1% of assessed value (plus voter-approved bonds and special assessments). This formula is frequently tested on the exam."}, {"id": 291, "category": "Math & Calculations", "q": "A property with a GRM of 150 and monthly rent of $2,000 has an estimated value of:", "choices": ["$300,000", "$150,000", "$200,000", "$400,000"], "answer": 0, "hint": "Value = Monthly Rent × GRM.", "explanation": "Value = Monthly Rent × GRM = $2,000 × 150 = $300,000. The Gross Rent Multiplier is a quick way to estimate residential property value. A higher GRM indicates a higher price relative to rent (potentially overvalued or in a desirable area). GRM does not account for operating expenses."}, {"id": 292, "category": "Math & Calculations", "q": "A lot is 100 feet wide and 150 feet deep. How many square feet is it?", "choices": ["10,000 sq ft", "15,000 sq ft", "25,000 sq ft", "250 sq ft"], "answer": 1, "hint": "Area of a rectangle = Width × Depth.", "explanation": "Area = Width × Depth = 100 ft × 150 ft = 15,000 square feet. To convert to acres: 15,000 ÷ 43,560 = approximately 0.344 acres. (One acre = 43,560 square feet.) Area calculations are fundamental to the exam—know how to calculate rectangles, triangles, and irregular shapes."}, {"id": 293, "category": "Math & Calculations", "q": "An acre contains:", "choices": ["5,280 square feet", "43,560 square feet", "640 square feet", "36,000 square feet"], "answer": 1, "hint": "This is one of the most important numbers to memorize for the exam.", "explanation": "One acre = 43,560 square feet. Other important measurements: one square mile = 640 acres (one section); a mile = 5,280 feet; a township = 36 square miles = 36 sections. These measurements are essential for calculating land areas, prorations, and legal descriptions on the exam."}, {"id": 294, "category": "Math & Calculations", "q": "A buyer obtains a loan for 80% of the $400,000 purchase price. How much is the loan?", "choices": ["$300,000", "$320,000", "$350,000", "$380,000"], "answer": 1, "hint": "Simply multiply the purchase price by the LTV percentage.", "explanation": "Loan amount = Purchase Price × LTV = $400,000 × 80% = $320,000. The buyer's down payment is the remaining 20% = $80,000. With an 80% LTV, the buyer avoids the need for private mortgage insurance (PMI) on a conventional loan."}, {"id": 295, "category": "Math & Calculations", "q": "The documentary transfer tax in the county is $1.10 per $1,000. If a property sells for $600,000, the tax is:", "choices": ["$660", "$600", "$1,100", "$6,600"], "answer": 0, "hint": "$1.10 per $1,000 of value transferred.", "explanation": "Documentary Transfer Tax = ($600,000 ÷ $1,000) × $1.10 = 600 × $1.10 = $660. Some California cities also impose an additional city transfer tax (e.g., Los Angeles charges $4.50 per $1,000, and a mansion tax of 4% or 5.5% for properties over $5M or $10M respectively). Always check for both county and city transfer taxes."}, {"id": 296, "category": "California Specific", "q": "The California Real Estate Commissioner is appointed by:", "choices": ["The state legislature", "The Governor", "The Department of Finance", "Popular election"], "answer": 1, "hint": "This is an appointed position in the executive branch.", "explanation": "The Real Estate Commissioner is appointed by the Governor of California. The Commissioner serves as the chief executive of the Department of Real Estate (DRE) and has the authority to adopt regulations, issue and revoke licenses, and enforce real estate law. The Commissioner must have been a real estate broker for at least 5 of the preceding 10 years."}, {"id": 297, "category": "California Specific", "q": "California's Statute of Frauds requires which of the following to be in writing?", "choices": ["All contracts", "Contracts for the sale of real property and leases exceeding one year", "Only leases under one year", "Only purchase agreements over $500,000"], "answer": 1, "hint": "Certain important contracts must be written to be enforceable.", "explanation": "California's Statute of Frauds requires the following to be in writing to be enforceable: contracts for the sale of real property, leases exceeding one year, listing agreements, agreements to pay commissions, and contracts that cannot be performed within one year. Oral real estate sale contracts are generally unenforceable."}, {"id": 298, "category": "California Specific", "q": "Under California's Holden Act, it is illegal to:", "choices": ["Charge interest on a mortgage", "Discriminate in lending based on protected characteristics or neighborhood location", "Require a down payment", "Charge an origination fee"], "answer": 1, "hint": "This California law targets discriminatory lending practices.", "explanation": "The Holden Act (California Housing Financial Discrimination Act of 1977) prohibits financial institutions from discriminating in real estate lending based on race, color, religion, sex, marital status, national origin, ancestry, or neighborhood characteristics (redlining). It is enforced by the California Department of Financial Protection and Innovation."}, {"id": 299, "category": "California Specific", "q": "SB 9 in California allows:", "choices": ["Unlimited commercial development in residential zones", "Lot splits and construction of up to 2 units per lot in single-family zones, subject to conditions", "Rent control in all cities", "Elimination of all zoning restrictions"], "answer": 1, "hint": "This 2022 law increased housing density options in single-family zones.", "explanation": "SB 9 (effective January 1, 2022) allows homeowners in single-family zones to split their lot in two and build up to 2 units on each lot (potentially up to 4 units total on the original lot). Conditions include: owner-occupancy for lot splits, minimum lot sizes, no demolition of rent-controlled housing, and the property cannot be in certain protected areas."}, {"id": 300, "category": "California Specific", "q": "Accessory Dwelling Units (ADUs) in California:", "choices": ["Are prohibited in all residential zones", "Are permitted by right on most residential lots under state law", "Require special zoning approval in all cases", "Can only be rented to family members"], "answer": 1, "hint": "California has aggressively promoted ADU construction to address the housing crisis.", "explanation": "California law (AB 68, AB 881, SB 13, and subsequent legislation) permits ADUs by right on most residential lots. Key provisions include: streamlined permitting, prohibition of owner-occupancy requirements for most ADUs, reduced setback requirements, and prohibition of local laws that unreasonably restrict ADU construction. ADUs are a key strategy to address California's housing shortage."}, {"id": 301, "category": "Financing", "q": "A take-out loan is:", "choices": ["A personal loan for moving expenses", "A long-term permanent loan that replaces a construction loan", "A loan for restaurant franchises", "A second mortgage"], "answer": 1, "hint": "This loan 'takes out' the short-term construction financing.", "explanation": "A take-out loan is the permanent, long-term mortgage that replaces a short-term construction loan once building is complete. Construction lenders often require a take-out commitment (promise of permanent financing) before approving the construction loan. This ensures the project will have long-term financing upon completion."}, {"id": 302, "category": "Financing", "q": "A blanket trust deed typically includes a:", "choices": ["Subordination clause", "Partial release clause", "Prepayment penalty", "Balloon payment"], "answer": 1, "hint": "This clause allows individual parcels to be released from the lien.", "explanation": "A blanket trust deed covers multiple properties under one loan and typically includes a partial release clause. This allows individual parcels to be released from the lien as payments are made or as lots are sold. This is essential for developers who need to sell individual lots from a subdivision while maintaining the overall loan."}, {"id": 303, "category": "Financing", "q": "PITI stands for:", "choices": ["Principal, Insurance, Taxes, Interest", "Principal, Interest, Taxes, Insurance", "Payment, Interest, Title, Insurance", "Property, Interest, Taxes, Improvements"], "answer": 1, "hint": "This acronym represents the components of a typical monthly housing payment.", "explanation": "PITI stands for Principal, Interest, Taxes, and Insurance—the four components of a typical monthly mortgage payment. Principal reduces the loan balance, interest is the cost of borrowing, taxes are property taxes collected through the impound account, and insurance includes homeowner's insurance and possibly PMI or MIP."}, {"id": 304, "category": "Financing", "q": "The Real Property Loan Law in California regulates:", "choices": ["All mortgage loans regardless of size", "Loans arranged by real estate brokers, particularly first trust deeds over $30,000 and second trust deeds over $20,000", "Only government-backed loans", "Only commercial loans"], "answer": 1, "hint": "This California law sets requirements for broker-arranged real estate loans.", "explanation": "The Real Property Loan Law (Article 7 of the Business and Professions Code) regulates loans negotiated by real estate brokers. It limits commission/fees, requires disclosure (Mortgage Loan Disclosure Statement), sets maximum loan terms, and establishes balloon payment disclosure requirements. Specific thresholds determine which regulations apply."}, {"id": 305, "category": "Financing", "q": "An interest-only loan requires the borrower to pay:", "choices": ["Both principal and interest monthly", "Only the interest during the interest-only period, with no principal reduction", "Only the principal with no interest", "A lump sum at closing"], "answer": 1, "hint": "No principal reduction occurs during this period.", "explanation": "During the interest-only period, the borrower pays only interest—no principal is repaid. The loan balance remains unchanged. After the interest-only period (typically 5-10 years), the loan converts to fully amortizing payments over the remaining term, resulting in significantly higher payments. Interest-only loans carry the risk of payment shock."}, {"id": 306, "category": "Math & Calculations", "q": "A property generates $8,000/month in gross rent. Annual operating expenses are $36,000. What is the NOI?", "choices": ["$60,000", "$96,000", "$36,000", "$132,000"], "answer": 0, "hint": "NOI = Gross Annual Income - Operating Expenses.", "explanation": "Annual gross rent = $8,000 × 12 = $96,000. NOI = $96,000 - $36,000 = $60,000. Remember: NOI does NOT deduct mortgage payments (debt service), income taxes, or depreciation. Only operating expenses (taxes, insurance, maintenance, management, utilities, reserves) are subtracted from effective gross income."}, {"id": 307, "category": "Math & Calculations", "q": "A seller nets $285,000 after paying a 5% commission. What was the sale price?", "choices": ["$300,000", "$285,000", "$299,250", "$350,000"], "answer": 0, "hint": "If the commission is 5%, the seller keeps 95% of the sale price.", "explanation": "If the seller nets 95% of the sale price (100% - 5% commission = 95%), then: Sale Price = Net ÷ 0.95 = $285,000 ÷ 0.95 = $300,000. Check: $300,000 × 5% = $15,000 commission. $300,000 - $15,000 = $285,000 net. This is a common exam calculation pattern."}, {"id": 308, "category": "Math & Calculations", "q": "How many acres are in a quarter section?", "choices": ["40 acres", "80 acres", "160 acres", "320 acres"], "answer": 2, "hint": "A section is 640 acres. Divide by 4.", "explanation": "A section = 640 acres. A quarter section (1/4 section) = 640 ÷ 4 = 160 acres. A quarter-quarter section = 40 acres. These measurements are essential for the government survey system. The Homestead Act of 1862 granted settlers 160 acres (a quarter section) of public land."}, {"id": 309, "category": "Math & Calculations", "q": "An investor buys a property for $250,000 and it appreciates 4% per year. What is the value after 1 year?", "choices": ["$260,000", "$254,000", "$262,500", "$250,400"], "answer": 0, "hint": "Multiply the purchase price by (1 + appreciation rate).", "explanation": "Value after 1 year = $250,000 × 1.04 = $260,000. For compound appreciation over multiple years, use: Value = Original × (1 + rate)^years. For example, after 2 years: $250,000 × 1.04² = $250,000 × 1.0816 = $270,400."}, {"id": 310, "category": "Math & Calculations", "q": "A property rents for $1,800/month and sold for $288,000. What is the GRM?", "choices": ["120", "160", "200", "288"], "answer": 1, "hint": "GRM = Sale Price ÷ Monthly Rent.", "explanation": "GRM = Sale Price ÷ Monthly Rent = $288,000 ÷ $1,800 = 160. To use the GRM to estimate value of a similar property: Value = Monthly Rent × GRM. If a similar property rents for $2,000/month: Value = $2,000 × 160 = $320,000."}, {"id": 311, "category": "Property Ownership", "q": "A remainder interest in a life estate belongs to:", "choices": ["The life tenant", "The person who receives the property after the life tenant dies", "The government", "The original grantor only"], "answer": 1, "hint": "This person inherits after the life estate ends.", "explanation": "A remainder interest is the future interest held by a third party (remainderman) who will receive ownership of the property upon the termination of the life estate (death of the life tenant). If no remainderman is named, the property reverts to the grantor through a reversion interest."}, {"id": 312, "category": "Property Ownership", "q": "The government's right to tax real property is based on:", "choices": ["The property owner's income", "The ad valorem (according to value) principle", "The number of rooms in the property", "The owner's citizenship status"], "answer": 1, "hint": "Property taxes are based on the value of the property.", "explanation": "Property taxes are assessed on an ad valorem basis—meaning according to the value of the property. In California, Proposition 13 limits the tax rate to 1% of assessed value (acquisition value with max 2% annual increases). Additional voter-approved bonds and special assessments may apply. Property taxes fund local government services."}, {"id": 313, "category": "Property Ownership", "q": "Police power, taxation, eminent domain, and escheat are remembered by the acronym:", "choices": ["COLD", "PETE", "DUST", "TTIP"], "answer": 1, "hint": "This acronym helps you remember the four government powers over private property.", "explanation": "PETE stands for Police power, Eminent domain, Taxation, and Escheat—the four government powers that limit private property ownership. These powers exist without the owner's consent and override private property rights. Police power (regulation), eminent domain (taking for public use), taxation (levying property taxes), and escheat (taking property of those who die without heirs)."}, {"id": 314, "category": "Property Ownership", "q": "Chattel real refers to:", "choices": ["Personal property associated with real estate, such as a lease", "Physical personal property like furniture", "Mineral rights", "Air rights"], "answer": 0, "hint": "This term bridges personal and real property concepts.", "explanation": "Chattel real refers to interests in real estate that are classified as personal property, primarily leasehold interests. A lease gives the tenant a right to use real property, but the lease itself is classified as personal property (chattel). Other examples include growing crops (emblements) and profits a prendre. This distinction matters for taxation, inheritance, and UCC purposes."}, {"id": 315, "category": "Property Ownership", "q": "A profit a prendre is:", "choices": ["A type of easement", "The right to take something from another's land (minerals, timber, crops)", "A deed restriction", "A type of lease"], "answer": 1, "hint": "This right allows removal of resources from someone else's property.", "explanation": "A profit a prendre (profit) is the right to enter another's land and remove part of the land itself or a product of it—such as minerals, timber, oil, fish, or crops. It differs from an easement (which only allows passage or use). A profit can be appurtenant (tied to a dominant parcel) or in gross (tied to a person or entity)."}, {"id": 316, "category": "Contracts", "q": "An option contract is:", "choices": ["A bilateral contract", "A unilateral contract where the optionor must sell if the optionee exercises the option", "An agreement to agree later", "A contract that automatically expires after 30 days"], "answer": 1, "hint": "Only the optionee has the right to act—the optionor is bound.", "explanation": "An option contract is unilateral—only one party (the optionor/seller) is bound to perform if the option is exercised. The optionee (buyer) has the right, but not the obligation, to purchase. The option must be supported by consideration. If exercised within the option period, the optionor must sell at the agreed price. If not exercised, the consideration is typically forfeited."}, {"id": 317, "category": "Contracts", "q": "A right of first refusal gives the holder:", "choices": ["The automatic right to purchase", "The right to match any third-party offer before the owner can sell to that party", "The right to lease the property", "First priority for a mortgage"], "answer": 1, "hint": "You get first dibs—but only when someone else makes an offer.", "explanation": "A right of first refusal gives the holder the right to match any bona fide third-party offer to purchase the property before the owner can accept that offer. Unlike an option (which sets a specific price), the right of first refusal is triggered by an actual offer and requires the holder to match those exact terms. If declined, the owner can sell to the third party."}, {"id": 318, "category": "Contracts", "q": "The CAR Residential Purchase Agreement requires the buyer to make an initial deposit within:", "choices": ["24 hours of acceptance", "3 business days of acceptance (or as specified in the agreement)", "1 week of acceptance", "At the time of making the offer"], "answer": 1, "hint": "The contract specifies when the deposit is due.", "explanation": "The standard CAR Residential Purchase Agreement requires the buyer to deliver the initial deposit within 3 business days of acceptance (or as otherwise specified). The deposit is typically held in escrow or the broker's trust account. Failure to deliver the deposit as agreed may be considered a breach of contract."}, {"id": 319, "category": "Contracts", "q": "Accord and satisfaction is:", "choices": ["An agreement to extend the contract deadline", "A resolution where the parties agree to accept different terms than originally contracted", "A type of inspection contingency", "A court order to perform"], "answer": 1, "hint": "The original obligation is replaced by a new agreement and performance.", "explanation": "Accord and satisfaction occurs when the parties to a contract agree to accept performance different from what was originally required (the accord), and that different performance is completed (the satisfaction). For example, a seller might agree to accept a lower price in exchange for a quicker closing, and once both parties perform under the new terms, the original obligation is discharged."}, {"id": 320, "category": "Contracts", "q": "A purchase agreement that has been fully signed but not yet closed is:", "choices": ["Executed", "Executory", "Void", "Expired"], "answer": 1, "hint": "Are all obligations completed, or are some still outstanding?", "explanation": "A fully signed purchase agreement that has not yet closed is executory—obligations remain to be performed (buyer must pay, seller must deliver deed, conditions must be met). It becomes executed when all terms are fulfilled at closing. Note: 'executed' has two meanings in real estate—signed/delivered (for deeds) and fully performed (for contracts)."}, {"id": 321, "category": "Agency", "q": "An agent's fiduciary duty of care requires:", "choices": ["Guaranteeing the best outcome", "Exercising the skill and care that a reasonably competent agent would use", "Performing all physical repairs", "Conducting a full appraisal"], "answer": 1, "hint": "The agent must be com
