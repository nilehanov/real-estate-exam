 "explanation": "Steering is the illegal practice of directing prospective buyers or renters toward or away from specific neighborhoods based on race, color, religion, national origin, sex, familial status, or disability. It limits housing choices and perpetuates segregation. Agents must show properties based on the client's criteria, not protected characteristics."}, {"id": 103, "category": "Fair Housing", "q": "Blockbusting (panic selling) is the illegal practice of:", "choices": ["Refusing to sell to minority buyers", "Inducing property owners to sell by suggesting that minorities are moving into the neighborhood", "Refusing to make loans in certain neighborhoods", "Charging higher prices to minority buyers"], "answer": 1, "hint": "This practice exploits racial fears to generate real estate commissions.", "explanation": "Blockbusting is the illegal practice of inducing homeowners to sell their properties by suggesting that members of a protected class are moving into the neighborhood, which will supposedly cause property values to decline. This exploits racial fears to generate sales commissions and is a violation of the Fair Housing Act."}, {"id": 104, "category": "Fair Housing", "q": "Redlining is:", "choices": ["Drawing property boundaries in red ink", "Refusing to make loans or provide insurance in certain neighborhoods based on racial composition", "Marking properties for demolition", "Highlighting the best investment neighborhoods"], "answer": 1, "hint": "This practice systematically denies financial services to certain areas.", "explanation": "Redlining is the illegal practice of refusing to make loans, provide insurance, or offer other financial services in certain geographic areas based on the racial or ethnic composition of the neighborhood. The Community Reinvestment Act (CRA) was enacted to combat redlining by requiring banks to serve all segments of their communities."}, {"id": 105, "category": "Fair Housing", "q": "Under the Fair Housing Act, a landlord must allow reasonable modifications for a disabled tenant if:", "choices": ["The landlord pays for all modifications", "The tenant pays for the modifications and agrees to restore the premises", "The modifications are purely cosmetic", "The building was built after 2000"], "answer": 1, "hint": "The tenant bears the cost but must be allowed to make necessary changes.", "explanation": "Under the Fair Housing Act, landlords must allow disabled tenants to make reasonable modifications to their dwelling at the tenant's expense. The landlord may require the tenant to restore the premises to the original condition upon move-out (where reasonable). For federally funded housing, the landlord may be required to pay for modifications."}, {"id": 106, "category": "Fair Housing", "q": "California's Unruh Civil Rights Act provides protection against discrimination in:", "choices": ["Employment only", "All business establishments in California", "Federal government operations", "Interstate commerce"], "answer": 1, "hint": "California provides broader anti-discrimination protection than federal law.", "explanation": "The Unruh Civil Rights Act prohibits discrimination by all business establishments in California, including real estate businesses. It protects against discrimination based on sex, race, color, religion, ancestry, national origin, disability, medical condition, genetic information, marital status, sexual orientation, citizenship, primary language, and immigration status."}, {"id": 107, "category": "Fair Housing", "q": "The penalty for a first violation of the Federal Fair Housing Act can include fines up to:", "choices": ["$10,000", "Up to $16,000 (adjusted for inflation)", "$50,000", "$100,000"], "answer": 1, "hint": "The maximum fine amount increases for subsequent violations.", "explanation": "For a first violation of the Fair Housing Act, civil penalties can reach approximately $16,000 (adjusted periodically for inflation). For a second violation within 5 years, penalties increase to approximately $37,500. For subsequent violations, penalties can reach approximately $65,000. Additionally, actual damages and attorney's fees may be awarded."}, {"id": 108, "category": "Fair Housing", "q": "An exemption from the Fair Housing Act applies to:", "choices": ["All single-family homes", "Owner-occupied buildings with 4 or fewer units, if no broker is used and no discriminatory advertising is employed", "Any property listed without a broker", "Commercial properties"], "answer": 1, "hint": "The 'Mrs. Murphy exemption' applies in very limited circumstances.", "explanation": "The 'Mrs. Murphy exemption' allows owner-occupied buildings with 4 or fewer units to discriminate in tenant selection (except on the basis of race—which is NEVER exempt). The exemption requires: no real estate agent involvement, no discriminatory advertising, and the owner must occupy one of the units. The exemption is narrow and does not apply to race."}, {"id": 109, "category": "Property Management", "q": "In California, the maximum security deposit for an unfurnished residential rental is:", "choices": ["One month's rent", "Two months' rent", "Three months' rent", "No limit"], "answer": 1, "hint": "California limits security deposits for residential rentals.", "explanation": "California Civil Code Section 1950.5 limits security deposits to two months' rent for unfurnished residential units and three months' rent for furnished units. The security deposit must be returned within 21 days after the tenant vacates, with an itemized statement of any deductions. Starting July 1, 2024, the limit was reduced to one month's rent for most landlords."}, {"id": 110, "category": "Property Management", "q": "A tenancy at will can be terminated by:", "choices": ["Only the landlord", "Only the tenant", "Either party with proper notice", "Only by court order"], "answer": 2, "hint": "This is an indefinite tenancy with no fixed end date.", "explanation": "A tenancy at will has no fixed term and exists at the will of both parties. Either the landlord or tenant can terminate it with proper notice. In California, a 30-day notice is typically required for month-to-month tenancies (or 60-day notice if the tenant has occupied for over one year). A tenancy at will provides minimal security for both parties."}, {"id": 111, "category": "Property Management", "q": "Under California's rent control laws (AB 1482, the Tenant Protection Act), annual rent increases are capped at:", "choices": ["3% per year", "5% plus local inflation (CPI), with a maximum of 10%", "10% per year flat", "No cap exists in California"], "answer": 1, "hint": "California enacted statewide rent control in 2019.", "explanation": "AB 1482 (the Tenant Protection Act of 2019) caps annual rent increases at 5% plus the local Consumer Price Index (CPI), or 10%, whichever is LOWER. It also requires just cause for eviction after a tenant has occupied for 12 months. Exemptions include: housing built within the last 15 years, single-family homes (with conditions), and certain owner-occupied duplexes."}, {"id": 112, "category": "Property Management", "q": "An estate for years is a lease that:", "choices": ["Must be for exactly one year", "Has a definite start and end date", "Automatically renews each year", "Has no fixed termination date"], "answer": 1, "hint": "Despite the name, it doesn't have to be measured in years.", "explanation": "An estate for years (estate for a fixed term) is a lease with a definite beginning and ending date. Despite its name, it can be for any period—days, weeks, months, or years. It terminates automatically at the end date without notice. If the tenant holds over, it may convert to a periodic tenancy."}, {"id": 113, "category": "Property Management", "q": "Constructive eviction occurs when:", "choices": ["A landlord files for formal eviction through the courts", "The landlord's actions or failure to act makes the property uninhabitable", "A tenant breaks the lease and moves out", "The lease term expires"], "answer": 1, "hint": "The tenant is effectively forced out without formal eviction proceedings.", "explanation": "Constructive eviction occurs when the landlord's actions (or failure to act) substantially interfere with the tenant's use and enjoyment of the property, effectively forcing the tenant out. Examples include failure to make essential repairs, cutting off utilities, or allowing hazardous conditions. The tenant must actually vacate to claim constructive eviction."}, {"id": 114, "category": "Property Management", "q": "California's implied warranty of habitability requires landlords to maintain:", "choices": ["Luxury amenities", "Basic living conditions including working plumbing, heating, and weatherproofing", "Swimming pools and gyms", "New appliances every 5 years"], "answer": 1, "hint": "Landlords must maintain minimum health and safety standards.", "explanation": "California's implied warranty of habitability (Civil Code Section 1941) requires landlords to maintain rental property in a condition fit for human habitation, including: adequate weatherproofing, plumbing, heating, electrical, sanitation, working doors/windows, clean common areas, and freedom from pests. Tenants cannot waive this right."}, {"id": 115, "category": "Property Management", "q": "A triple net lease (NNN) requires the tenant to pay:", "choices": ["Only base rent", "Base rent plus property taxes, insurance, and maintenance", "Base rent plus utilities only", "Only a percentage of sales"], "answer": 1, "hint": "The three 'nets' are three categories of expenses beyond rent.", "explanation": "In a triple net lease (NNN), the tenant pays base rent PLUS property taxes, property insurance, and maintenance/repairs (the three 'nets'). This shifts most operating costs to the tenant. Triple net leases are common in commercial real estate, particularly for freestanding retail and single-tenant properties."}, {"id": 116, "category": "Escrow & Closing", "q": "In California, escrow is typically handled by:", "choices": ["The buyer's attorney", "An independent escrow company or title company", "The seller's real estate agent", "The county recorder"], "answer": 1, "hint": "California uses a neutral third party to handle the closing process.", "explanation": "In California, escrow is typically handled by an independent escrow company, a title company, or an attorney acting as escrow holder. The escrow holder is a neutral third party who follows the escrow instructions of both buyer and seller, handles the exchange of funds and documents, and ensures all conditions are met before closing."}, {"id": 117, "category": "Escrow & Closing", "q": "Proration in escrow refers to:", "choices": ["Splitting the agent's commission", "Dividing expenses proportionally between buyer and seller based on the closing date", "Calculating the loan amount", "Estimating the property's future value"], "answer": 1, "hint": "Shared expenses are divided based on who owned the property during what period.", "explanation": "Proration is the division of ongoing expenses (property taxes, HOA dues, insurance, rent) between buyer and seller based on the closing date. Each party pays their proportional share. For example, if closing is mid-month, the seller pays property taxes through the closing date, and the buyer pays from closing date forward."}, {"id": 118, "category": "Escrow & Closing", "q": "FIRPTA (Foreign Investment in Real Property Tax Act) requires:", "choices": ["Foreign buyers to pay double transfer taxes", "Withholding of a portion of the sale price when a foreign person sells U.S. real property", "Foreign nationals to use a specific type of deed", "All buyers to verify their citizenship"], "answer": 1, "hint": "This federal law ensures foreign sellers pay U.S. income taxes on real estate gains.", "explanation": "FIRPTA requires the buyer (or escrow) to withhold 15% of the gross sale price when purchasing U.S. real property from a foreign seller and remit it to the IRS. California has a similar state withholding requirement (3.33%). This ensures foreign sellers pay U.S. income taxes on their real estate gains. Exemptions exist for certain transactions."}, {"id": 119, "category": "Escrow & Closing", "q": "In California, real property is officially transferred when:", "choices": ["The purchase agreement is signed", "Escrow closes and the deed is recorded", "The buyer moves into the property", "The seller receives payment"], "answer": 1, "hint": "Recording the deed creates the public record of ownership transfer.", "explanation": "In California, title to real property is officially transferred when the grant deed is recorded at the county recorder's office. Recording provides constructive notice to the world of the new ownership. Escrow ensures that the deed, funds, and all conditions are properly exchanged simultaneously upon closing."}, {"id": 120, "category": "Escrow & Closing", "q": "The California Transfer Disclosure Statement (TDS) must be provided by:", "choices": ["The buyer", "The seller of residential property (1-4 units)", "The lender", "The escrow company"], "answer": 1, "hint": "This is one of the most important disclosure forms in California real estate.", "explanation": "The Transfer Disclosure Statement (TDS) must be provided by the seller of residential property with 1-4 units. It requires the seller to disclose all known material facts and defects affecting the property's value or desirability. Both the listing agent and selling agent must also conduct visual inspections and provide their findings on the TDS."}, {"id": 121, "category": "Property Ownership", "q": "Water rights that go with property bordering a river are called:", "choices": ["Littoral rights", "Riparian rights", "Percolating rights", "Appropriative rights"], "answer": 1, "hint": "Think about the type of water body—flowing or stationary.", "explanation": "Riparian rights belong to owners of property that borders flowing water (rivers, streams, creeks). The owner has reasonable use of the water. Littoral rights apply to stationary water (lakes, oceans). Appropriative rights involve diverting water from its natural course under a government permit system."}, {"id": 122, "category": "Property Ownership", "q": "Accretion is the gradual addition of land by:", "choices": ["A court decree", "Natural deposit of soil by water", "A government survey", "Construction of improvements"], "answer": 1, "hint": "Nature slowly builds up land along a waterway.", "explanation": "Accretion is the gradual and imperceptible addition of land through the natural deposit of soil (alluvium) by water action. The newly deposited land belongs to the property owner. Avulsion is the sudden loss or addition of land due to water (e.g., a flood), and reliction is land exposed by the permanent receding of water."}, {"id": 123, "category": "Property Ownership", "q": "Emblements are:", "choices": ["Permanent fixtures attached to land", "Annual crops planted by a tenant", "Mineral rights below the surface", "Trees growing naturally on the land"], "answer": 1, "hint": "A farmer who planted crops has a right to harvest them.", "explanation": "Emblements are annual crops that are planted and cultivated by a tenant (like wheat, corn, or vegetables). They are considered personal property of the tenant, who has the right to harvest them even if the lease ends before harvest. This protects the tenant's investment in cultivation. Perennial plants and natural growth are real property."}, {"id": 124, "category": "Property Ownership", "q": "A fee simple defeasible estate may be terminated if:", "choices": ["The owner fails to pay property taxes", "A specified condition is violated", "The owner dies without a will", "The property is rezoned"], "answer": 1, "hint": "This estate has a condition attached—'so long as' or 'on the condition that.'", "explanation": "A fee simple defeasible (also called a qualified fee or conditional fee) is ownership that can be terminated if a specified condition occurs or is violated. For example, 'to John so long as the property is used for educational purposes.' If the condition is violated, ownership reverts to the grantor or their heirs."}, {"id": 125, "category": "Property Ownership", "q": "The doctrine of prior appropriation applies to:", "choices": ["Air rights", "Water rights in states where first use has priority", "Mineral rights", "Solar energy access"], "answer": 1, "hint": "First in time, first in right—common in western states.", "explanation": "The doctrine of prior appropriation (used in many western states) grants water rights based on who first diverted and used the water, regardless of property location. 'First in time, first in right.' Users must obtain a permit and put the water to beneficial use. This differs from riparian rights, which are based on property location adjacent to water."}, {"id": 126, "category": "Contracts", "q": "A contract entered into by a minor is generally:", "choices": ["Void", "Voidable by the minor", "Enforceable against the minor", "Automatically ratified at age 18"], "answer": 1, "hint": "Minors have special protections in contract law.", "explanation": "A contract entered into by a minor (under 18) is generally voidable at the minor's option. The minor can choose to disaffirm (void) the contract or ratify it upon reaching the age of majority (18). The other party cannot void the contract—only the minor has this right. This protects minors from being taken advantage of."}, {"id": 127, "category": "Contracts", "q": "Consideration in a real estate contract is:", "choices": ["Always money", "Anything of value exchanged between the parties", "Required to be at least $1,000", "The same as the purchase price"], "answer": 1, "hint": "Consideration doesn't have to be monetary.", "explanation": "Consideration is anything of value given in exchange for a promise. It can be money, a promise to perform, property, services, or even a promise to refrain from doing something (forbearance). Love and affection can be consideration for a gift deed. The adequacy of consideration is generally not questioned by courts."}, {"id": 128, "category": "Contracts", "q": "An executory contract is one in which:", "choices": ["All terms have been fully performed", "One or more terms remain to be performed", "The contract has been terminated", "The contract is void"], "answer": 1, "hint": "Think about whether all obligations have been completed.", "explanation": "An executory contract is one where one or more obligations remain to be performed by either party. A real estate purchase agreement is executory from signing until closing. Once all terms are fulfilled (at closing), it becomes an executed contract. Don't confuse 'executed' (fully performed) with 'executed' (signed)."}, {"id": 129, "category": "Contracts", "q": "Rescission of a contract:", "choices": ["Enforces the contract through court action", "Returns both parties to their original positions before the contract", "Assigns the contract to a third party", "Modifies the contract terms"], "answer": 1, "hint": "This remedy undoes the contract as if it never existed.", "explanation": "Rescission cancels the contract and returns both parties to their pre-contract positions (status quo ante). All consideration is returned, and obligations are terminated. Rescission may result from mutual agreement, fraud, misrepresentation, mistake, or exercise of a contractual right (like a contingency)."}, {"id": 130, "category": "Contracts", "q": "An 'as-is' clause in a purchase agreement means:", "choices": ["The seller has no disclosure obligations", "The buyer accepts the property in its current condition, but the seller must still disclose known defects", "The property has no defects", "No inspections are allowed"], "answer": 1, "hint": "Even 'as-is' doesn't eliminate the duty to disclose.", "explanation": "An 'as-is' clause means the buyer accepts the property in its present condition and the seller will not make repairs. However, it does NOT relieve the seller of the obligation to disclose known material defects. In California, sellers must still provide the Transfer Disclosure Statement and other required disclosures regardless of an 'as-is' clause."}, {"id": 131, "category": "Financing", "q": "A balloon payment is:", "choices": ["Equal monthly payments over the life of the loan", "A large final payment that pays off the remaining loan balance", "An extra payment made toward principal", "An initial large down payment"], "answer": 1, "hint": "This payment is significantly larger than the regular periodic payments.", "explanation": "A balloon payment is a large lump-sum payment due at the end of the loan term that pays off the remaining balance. The loan may have been partially amortized or interest-only, leaving a substantial balance at maturity. Balloon loans carry refinancing risk—the borrower must pay off or refinance the balloon at maturity."}, {"id": 132, "category": "Financing", "q": "Negative amortization occurs when:", "choices": ["Extra payments are made toward principal", "Monthly payments don't cover the interest, causing the loan balance to increase", "The interest rate decreases over time", "The loan is paid off early"], "answer": 1, "hint": "The borrower ends up owing more than the original loan amount.", "explanation": "Negative amortization occurs when the periodic payment is less than the interest due, causing the unpaid interest to be added to the principal balance. The loan balance grows instead of shrinking. This can happen with certain adjustable-rate mortgages (ARMs) that allow minimum payments below the interest amount."}, {"id": 133, "category": "Financing", "q": "The discount rate is the interest rate charged by:", "choices": ["Commercial banks to their best customers", "The Federal Reserve to member banks", "The FHA on insured loans", "Credit unions to their members"], "answer": 1, "hint": "This is a tool of monetary policy set by the central bank.", "explanation": "The discount rate is the interest rate the Federal Reserve charges member banks for short-term borrowing. It influences other interest rates in the economy. When the Fed raises the discount rate, borrowing costs increase, tending to slow the economy and reduce inflation. The prime rate is what banks charge their best commercial customers."}, {"id": 134, "category": "Financing", "q": "A loan assumption means:", "choices": ["The buyer gets a new loan with different terms", "The buyer takes over the seller's existing loan", "The seller pays off the loan before closing", "The loan is converted from fixed to adjustable rate"], "answer": 1, "hint": "The existing loan continues with a new borrower.", "explanation": "A loan assumption allows the buyer to take over the seller's existing mortgage, keeping the same terms (interest rate, remaining balance, payment schedule). FHA and VA loans may be assumable with lender approval. Conventional loans with due-on-sale clauses are generally NOT assumable. Assumptions can benefit buyers when the existing rate is lower than current rates."}, {"id": 135, "category": "Financing", "q": "Points on a mortgage loan are:", "choices": ["Penalty fees for late payments", "Prepaid interest, with each point equal to 1% of the loan amount", "The borrower's credit score factors", "Insurance premiums"], "answer": 1, "hint": "Paying points upfront reduces the interest rate over the life of the loan.", "explanation": "Discount points are prepaid interest, with each point equal to 1% of the loan amount. For example, 2 points on a $400,000 loan = $8,000. Paying points 'buys down' the interest rate, resulting in lower monthly payments. Points are generally tax-deductible for the buyer's primary residence. Origination fees (also in points) cover the lender's costs."}, {"id": 136, "category": "Valuation", "q": "Functional obsolescence is a loss in value caused by:", "choices": ["Physical deterioration of the building", "Factors external to the property", "Outdated design or layout within the property", "Natural disasters"], "answer": 2, "hint": "The property's design no longer meets current standards or market expectations.", "explanation": "Functional obsolescence is a loss in value due to features within the property that are outdated, poorly designed, or no longer desirable. Examples include: outdated kitchens/bathrooms, insufficient electrical service, poor floor plans, low ceilings, and single-car garages in areas where two-car is standard. It can be curable or incurable."}, {"id": 137, "category": "Valuation", "q": "The principle of contribution states that:", "choices": ["All improvements add equal value", "An improvement's value is based on what it adds to the property's total value, not its cost", "Land always contributes 25% of total value", "Remodeling always pays for itself"], "answer": 1, "hint": "Not every dollar spent on improvements returns a dollar in value.", "explanation": "The principle of contribution holds that an improvement's value is measured by how much it adds to the property's total value, not by how much it costs. A $50,000 kitchen remodel might add only $35,000 in value (or might add $60,000). The contribution depends on the market, neighborhood, and buyer expectations."}, {"id": 138, "category": "Valuation", "q": "Regression in real estate valuation means:", "choices": ["Property values are increasing rapidly", "A higher-value property is negatively affected by surrounding lower-value properties", "The property is reverting to a prior use", "Values are declining due to economic recession"], "answer": 1, "hint": "A mansion in a neighborhood of modest homes may not reach its full value.", "explanation": "The principle of regression states that a higher-value property will be pulled down in value by surrounding lower-value properties. For example, the most expensive home in a modest neighborhood may not achieve its full potential value. The opposite principle—progression—states that lower-value properties benefit from surrounding higher-value properties."}, {"id": 139, "category": "Valuation", "q": "The cost approach to value is most appropriate for:", "choices": ["Residential income properties", "Vacant land", "Special-purpose properties like churches or schools", "Properties with extensive comparable sales data"], "answer": 2, "hint": "This approach works best when there are few comparable sales.", "explanation": "The cost approach is most appropriate for special-purpose properties (churches, schools, government buildings, hospitals) that rarely sell and generate no typical income stream. The formula is: Land Value + Replacement/Reproduction Cost of Improvements - Depreciation = Property Value. It's also useful for new construction and insurance purposes."}, {"id": 140, "category": "Valuation", "q": "A Comparative Market Analysis (CMA) differs from a formal appraisal in that a CMA:", "choices": ["Is more accurate than an appraisal", "Is performed by a licensed agent to help set listing prices, not by a licensed appraiser", "Is required by all lenders", "Uses the income approach exclusively"], "answer": 1, "hint": "Real estate agents prepare CMAs; appraisers prepare appraisals.", "explanation": "A CMA is an informal estimate of market value prepared by a real estate agent to help sellers set listing prices or help buyers determine offer prices. It uses comparable sales data but is NOT a formal appraisal. Only licensed/certified appraisers can perform appraisals. CMAs are not used for lending purposes."}, {"id": 141, "category": "Transfer of Property", "q": "A warranty deed provides:", "choices": ["No warranties whatsoever", "The greatest protection for the grantee", "Only the warranty that the grantor currently owns the property", "Protection only against future claims"], "answer": 1, "hint": "This deed offers the most comprehensive title guarantees.", "explanation": "A warranty deed (general warranty deed) provides the greatest protection to the grantee. It includes covenants of: seisin (grantor owns the property), right to convey, against encumbrances (no undisclosed liens), quiet enjoyment, warranty (grantor will defend title), and further assurances. While common in other states, California primarily uses grant deeds."}, {"id": 142, "category": "Transfer of Property", "q": "In California, a transfer of property between spouses in a divorce is:", "choices": ["Subject to documentary transfer tax", "Exempt from reassessment under Proposition 13", "Required to go through probate", "Taxable as capital gains"], "answer": 1, "hint": "Certain transfers between spouses receive special tax treatment.", "explanation": "Transfers of property between spouses (or registered domestic partners) in California—including transfers incident to divorce—are generally exempt from Proposition 13 reassessment, documentary transfer tax, and capital gains tax (per IRC Section 1041). A spousal exclusion claim must be filed with the county assessor to avoid reassessment."}, {"id": 143, "category": "Transfer of Property", "q": "A deed delivered into escrow is considered:", "choices": ["Immediately effective", "Conditionally delivered until all escrow conditions are met", "Void until the buyer makes the first mortgage payment", "Invalid because it wasn't delivered directly to the grantee"], "answer": 1, "hint": "Escrow holds documents until all conditions are satisfied.", "explanation": "A deed delivered to escrow is conditionally delivered—it becomes effective only when all escrow conditions are met. Until then, neither party can unilaterally retrieve the deed. Once conditions are satisfied, the escrow holder releases the deed for recording, completing the transfer. This protects both buyer and seller."}, {"id": 144, "category": "Transfer of Property", "q": "The Natural Hazard Disclosure Statement in California must be provided for properties located in:", "choices": ["Any area of the state", "Designated natural hazard zones (flood, fire, earthquake fault, seismic hazard, wildfire)", "Only coastal areas", "Only properties over 50 years old"], "answer": 1, "hint": "California requires specific disclosures about natural hazard risks.", "explanation": "California law requires a Natural Hazard Disclosure Statement (NHD) for residential sales (1-4 units). It discloses whether the property is located in designated hazard zones including: special flood hazard areas, dam inundation zones, very high fire severity zones, earthquake fault zones, seismic hazard zones, and state fire responsibility areas."}, {"id": 145, "category": "Transfer of Property", "q": "Recording a deed in California provides:", "choices": ["Actual notice to all potential buyers", "Constructive notice to the world", "Guarantees of clear title", "Tax benefits to the grantee"], "answer": 1, "hint": "Recording creates a public record that everyone is presumed to know about.", "explanation": "Recording a deed at the county recorder's office provides constructive notice to the world—everyone is legally presumed to know of the recorded document. This protects the grantee against subsequent claims by later purchasers or creditors. While recording is not required for a valid transfer between parties, it is essential for protection against third parties."}, {"id": 146, "category": "Agency", "q": "An agent's duty of disclosure requires revealing:", "choices": ["Only information the client asks about", "All material facts that could affect the client's decision", "The other party's negotiating strategy", "Only positive information about the property"], "answer": 1, "hint": "Full disclosure is at the heart of the fiduciary relationship.", "explanation": "The duty of disclosure requires an agent to reveal all material facts that could affect the client's decision-making, including property defects, neighborhood issues, and any information that might influence the transaction. Agents cannot withhold negative information. This duty exists toward the client AND other parties (regarding material property conditions)."}, {"id": 147, "category": "Agency", "q": "A broker's open listing means:", "choices": ["The property is listed on the MLS", "Multiple brokers may try to sell the property, and only the one who procures a buyer earns a commission", "The property is open to the public for viewing", "The broker has exclusive rights to sell"], "answer": 1, "hint": "This is a non-exclusive listing arrangement.", "explanation": "An open listing is a non-exclusive arrangement where the seller can list with multiple brokers. Only the broker who actually procures (finds) the buyer earns the commission. The seller can also sell the property themselves without paying any commission. Open listings are the least favorable for brokers because there's no guaranteed commission."}, {"id": 148, "category": "Agency", "q": "An exclusive right to sell listing guarantees the broker a commission if:", "choices": ["Only if the broker finds the buyer", "The property sells during the listing period, regardless of who finds the buyer", "The property is relisted with another broker", "The property sells within one year after the listing expires"], "answer": 1, "hint": "This is the most protective listing type for the broker.", "explanation": "An exclusive right to sell listing guarantees the listing broker a commission if the property sells during the listing period, regardless of who finds the buyer—even if the seller finds the buyer themselves. This is the most commonly used listing agreement and the most favorable for brokers. It incentivizes maximum marketing effort."}, {"id": 149, "category": "Agency", "q": "In California, agency can be terminated by all of the following EXCEPT:", "choices": ["Mutual agreement of the parties", "Expiration of the listing agreement", "Completion of the purpose of the agency", "The agent listing the property on MLS"], "answer": 3, "hint": "Think about what actually ends the agency relationship.", "explanation": "Agency can be terminated by: mutual agreement, expiration of the term, completion of purpose (sale closes), death or incapacity of either party, destruction of the property, revocation by the principal, or renunciation by the agent. Listing the property on MLS is part of the agent's marketing duties and does not terminate the agency—it fulfills it."}, {"id": 150, "category": "Agency", "q": "A procuring cause is the agent who:", "choices": ["Listed the property first", "Initiated an unbroken chain of events leading to the sale", "Showed the property the most times", "Negotiated the lowest price"], "answer": 1, "hint": "This determines which agent earns the commission in a dispute.", "explanation": "Procuring cause is the agent whose efforts initiated an unbroken chain of events that resulted in the sale. It is the standard used to determine which agent earns the commission, particularly in open listing situations or when the buyer contacted multiple agents. Factors include who first introduced the buyer, maintained contact, and facilitated the sale."}, {"id": 151, "category": "Financing", "q": "Usury laws regulate:", "choices": ["Property tax rates", "The maximum interest rate that can be charged on certain loans", "The minimum down payment required", "The maximum loan term"], "answer": 1, "hint": "These laws protect borrowers from excessive interest charges.", "explanation": "Usury laws set maximum interest rates that can be charged on certain loans. In California, the usury rate is 10% per year for non-exempt loans. However, most institutional lenders (banks, credit unions, S&Ls) and many real estate loans are exempt from usury laws. Licensed real estate brokers arranging loans on real property are also exempt."}, {"id": 152, "category": "Financing", "q": "An impound (escrow) account is used to:", "choices": ["Hold earnest money deposits", "Collect and pay recurring expenses like property taxes and insurance", "Store the deed until closing", "Hold the seller's proceeds"], "answer": 1, "hint": "Lenders use these accounts to ensure important bills get paid.", "explanation": "An impound (escrow) account is maintained by the lender to collect monthly portions of property taxes and insurance from the borrower and pay these expenses when due. This protects the lender's security interest by ensuring taxes and insurance stay current. RESPA limits how much the lender can require in the impound account."}, {"id": 153, "category": "Financing", "q": "A wraparound mortgage:", "choices": ["Replaces the existing mortgage entirely", "Is a new mortgage that includes the existing mortgage balance plus additional funds", "Is a government-insured loan", "Requires the first mortgage to be paid off"], "answer": 1, "hint": "The new loan 'wraps around' the existing one.", "explanation": "A wraparound mortgage (all-inclusive trust deed or AITD in California) is a second mortgage that includes the balance of the existing first mortgage plus additional financing. The wraparound lender collects payments on the total amount and continues making payments on the underlying first mortgage. This can be a form of seller financing."}, {"id": 154, "category": "Financing", "q": "The Equal Credit Opportunity Act (ECOA) prohibits discrimination in lending based on:", "choices": ["Credit score only", "Race, color, religion, national origin, sex, marital status, age, and receipt of public assistance", "Loan amount", "Property location only"], "answer": 1, "hint": "This law ensures equal access to credit for all qualified applicants.", "explanation": "ECOA prohibits lenders from discriminating based on: race, color, religion, national origin, sex, marital status, age (provided the applicant is of legal age), receipt of public assistance, or exercise of Consumer Credit Protection Act rights. Lenders must evaluate applications based on creditworthiness, not protected characteristics."}, {"id": 155, "category": "Financing", "q": "A deficiency judgment is:", "choices": ["A judgment for unpaid property taxes", "A court order requiring the borrower to pay the difference between the foreclosure sale price and the loan balance", "A penalty for late mortgage payments", "A judgment for building code violations"], "answer": 1, "hint": "When the foreclosure sale doesn't cover the full loan amount.", "explanation": "A deficiency judgment allows the lender to pursue the borrower personally for the difference between the foreclosure sale price and the outstanding loan balance. In California, deficiency judgments are NOT available for: purchase money loans on owner-occupied 1-4 units, loans after non-judicial foreclosure, or seller-financed purchase money loans."}, {"id": 156, "category": "Practice of Real Estate", "q": "California requires real estate licensees to complete how many hours of continuing education for renewal?", "choices": ["15 hours", "30 hours", "45 hours", "60 hours"], "answer": 2, "hint": "Both salespersons and brokers must complete CE for each 4-year renewal.", "explanation": "California real estate licensees must complete 45 hours of approved continuing education every 4-year renewal cycle. This includes mandatory courses on ethics, agency, fair housing, trust fund handling, risk management, and management/supervision (for brokers). The first renewal also has specific required courses."}, {"id": 157, "category": "Practice of Real Estate", "q": "A pocket listing is a property that:", "choices": ["Is listed on the MLS and widely marketed", "Is marketed privately without being placed on the MLS", "Has a listing price under $100,000", "Is listed by an out-of-state broker"], "answer": 1, "hint": "These listings are not publicly visible to most agents and buyers.", "explanation": "A pocket listing is a property listing that is not placed on the MLS and is marketed privately, often only to the agent's personal network. While legal, pocket listings can limit exposure and potentially result in a lower sale price. NAR's Clear Cooperation Policy requires MLS listing within one business day of public marketing for its members."}, {"id": 158, "category": "Practice of Real Estate", "q": "The Real Estate Commissioner in California has the power to:", "choices": ["Set interest rates on mortgage loans", "Suspend or revoke real estate licenses", "Approve all real estate transactions", "Set commission rates for agents"], "answer": 1, "hint": "The Commissioner enforces real estate law and regulations.", "explanation": "The Real Estate Commissioner can issue, suspend, or revoke real estate licenses; issue regulations; investigate complaints; and take disciplinary action against licensees who violate real estate law. The Commissioner cannot set commission rates (which are negotiable), approve transactions, or set interest rates."}, {"id": 159, "category": "Practice of Real Estate", "q": "A broker's license is required to perform which of the following activities?", "choices": ["Selling your own home", "Negotiating the sale of someone else's property for compensation", "Renting your own apartment to a tenant", "Performing a home inspection"], "answer": 1, "hint": "The key words are 'for compensation' and 'someone else's property.'", "explanation": "A real estate license is required to negotiate, sell, buy, lease, or exchange someone else's real property for compensation. Selling or renting your own property does not require a license. Home inspections require a separate certification. The license requirement applies when acting on behalf of another for compensation."}, {"id": 160, "category": "Practice of Real Estate", "q": "Puffing in real estate is:", "choices": ["An illegal form of fraud", "Exaggerated opinions or statements not meant as factual representations", "A type of blockbusting", "A method of appraising property"], "answer": 1, "hint": "This is subjective opinion, not a statement of fact.", "explanation": "Puffing is the use of exaggerated or superlative opinions that are not meant as factual representations (e.g., 'This is the best neighborhood in town!'). While puffing is generally legal, it becomes fraud or misrepresentation if the statement is presented as fact. The line between puffing and misrepresentation can be thin—agents should be careful."}, {"id": 161, "category": "Land Use", "q": "A building setback is:", "choices": ["The required distance between a structure and the property line", "The angle of the roof", "The depth of the foundation", "The height of the building"], "answer": 0, "hint": "Zoning regulations often specify minimum distances from property lines.", "explanation": "A setback is the required minimum distance between a building or structure and the property line (front, side, or rear). Setback requirements are established by zoning ordinances and building codes. They ensure adequate light, air, fire safety, and aesthetic standards. Variances may be granted for special hardship situations."}, {"id": 162, "category": "Land Use", "q": "Spot zoning is:", "choices": ["Normal zoning that applies uniformly", "Rezoning a small parcel inconsistently with surrounding zoning, often for one owner's benefit", "Zoning that designates parking spots", "Temporary zoning for construction"], "answer": 1, "hint": "This type of zoning is often challenged as arbitrary or discriminatory.", "explanation": "Spot zoning occurs when a small parcel is rezoned to a use that is incompatible with surrounding properties, often for the benefit of a single owner. It may be challenged as arbitrary, unreasonable, or discriminatory. Courts evaluate whether the rezoning serves a legitimate public purpose or merely benefits a private interest."}, {"id": 163, "category": "Land Use", "q": "An Environmental Impact Report (EIR) under CEQA is required when:", "choices": ["Any new home is built", "A project may have significant environmental effects", "Property is sold", "A commercial lease is signed"], "answer": 1, "hint": "CEQA focuses on projects with potentially significant environmental impacts.", "explanation": "Under the California Environmental Quality Act (CEQA), an EIR is required when a proposed project may have significant environmental effects. The EIR analyzes potential impacts, alternatives, and mitigation measures. Not all projects require an EIR—some qualify for a Negative Declaration (finding no significant impact) or are categorically exempt."}, {"id": 164, "category": "Land Use", "q": "A planned unit development (PUD) typically features:", "choices": ["Only single-family homes on standard lots", "Mixed housing types with shared common areas and flexible zoning", "Only commercial properties", "Government-owned housing"], "answer": 1, "hint": "PUDs combine different property types with community amenities.", "explanation": "A planned unit development (PUD) is a project or subdivision that includes mixed housing types (single-family, townhomes, condos), common areas, and community amenities. PUDs have flexible zoning that allows varied lot sizes and building types. Homeowners typically own their lot in fee simple and share ownership of common areas through an HOA."}, {"id": 165, "category": "Land Use", "q": "The Subdivided Lands Law in California requires:", "choices": ["Environmental testing of all new subdivisions", "A public report from the DRE before lots in a new subdivision can be sold", "All subdivisions to have at least 100 lots", "Federal approval for any subdivision"], "answer": 1, "hint": "The DRE issues a public report to protect buyers of new subdivision lots.", "explanation": "California's Subdivided Lands Law requires developers to obtain a public report from the DRE before selling or leasing lots in a subdivision of 5 or more parcels. The public report discloses important information about the subdivision to protect buyers, including encumbrances, easements, improvements, HOA details, and special taxes."}, {"id": 166, "category": "Fair Housing", "q": "Familial status as a protected class under the Fair Housing Act protects:", "choices": ["Only married couples", "Families with children under 18, pregnant women, and those securing custody of a minor", "Only single parents", "Only families with more than three children"], "answer": 1, "hint": "This protection addresses discrimination against families with children.", "explanation": "Familial status protects families with children under 18, pregnant women, and anyone in the process of securing legal custody of a minor. Landlords cannot refuse to rent to families with children, charge higher rents or deposits, or restrict children to certain areas. Exceptions exist for qualifying senior housing (55+ or 62+)."}, {"id": 167, "category": "Fair Housing", "q": "A reasonable accommodation under fair housing law is:", "choices": ["A physical modification to a property", "A change in rules, policies, or services to allow a disabled person equal use of housing", "A rent reduction for low-income tenants", "A requirement to provide free parking"], "answer": 1, "hint": "This involves changing rules or practices, not physical structures.", "explanation": "A reasonable accommodation is a change in rules, policies, practices, or services that is necessary to afford a disabled person equal opportunity to use and enjoy housing. Examples: allowing a service animal despite a no-pets policy, providing a reserved parking space near the entrance, or allowing early lease termination for medical reasons. No cost to the landlord is typically required."}, {"id": 168, "category": "Fair Housing", "q": "Under California's Fair Employment and Housing Act (FEHA), in addition to federal protections, discrimination is also prohibited based on:", "choices": ["Only age and marital status", "Sexual orientation, gender identity, genetic information, source of income, and more", "Height and weight only", "Political affiliation only"], "answer": 1, "hint": "California provides broader protections than federal law.", "explanation": "California's FEHA extends fair housing protections beyond federal law to include: sexual orientation, gender identity/expression, marital status, genetic information, source of income (including Section 8 vouchers), ancestry, immigration status, primary language, and military/veteran status. California is one of the most protective states for fair housing."}, {"id": 169, "category": "Property Management", "q": "A month-to-month tenancy in California requires how much notice to terminate by the landlord (tenant has lived there more than a year)?", "choices": ["30 days", "60 days", "90 days", "No notice required"], "answer": 1, "hint": "The required notice period increases with length of tenancy.", "explanation": "In California, if a tenant has occupied for MORE than one year, the landlord must provide 60 days' written notice to terminate a month-to-month tenancy. If the tenant has occupied for one year or less, only 30 days' notice is required. With AB 1482, many landlords also need just cause to terminate. Tenants need only give 30 days' notice regardless."}, {"id": 170, "category": "Property Management", "q": "A percentage lease is commonly used for:", "choices": ["Residential apartments", "Retail commercial properties", "Industrial warehouses", "Agricultural land"], "answer": 1, "hint": "The rent is tied to the tenant's business performance.", "explanation": "A percentage lease is used primarily for retail commercial properties. The tenant pays a base rent plus a percentage of gross sales above a specified breakpoint. This aligns the landlord's income with the tenant's success. The breakpoint is the sales level above which the percentage rent kicks in. This is common in shopping malls and retail centers."}, {"id": 171, "category": "Property Management", "q": "A gross lease requires the tenant to pay:", "choices": ["A fixed rent with the landlord paying all operating expenses", "Rent plus all operating expenses", "Only a percentage of gross sales", "No rent—only a share of profits"], "answer": 0, "hint": "The tenant's obligation is simple—just the rent.", "explanation": "In a gross (full-service) lease, the tenant pays a fixed rent amount, and the landlord pays all operating expenses (taxes, insurance, maintenance, utilities). This is common in residential leases and some office leases. The landlord builds anticipated expenses into the rent amount. A modified gross lease may pass through some expenses."}, {"id": 172, "category": "Property Management", "q": "A sublease allows the original tenant to:", "choices": ["Terminate the lease entirely", "Transfer their lease interest to a third party while remaining liable under the original lease", "Force the landlord to accept a new tenant", "Reduce their rent payment"], "answer": 1, "hint": "The original tenant stays on the hook but lets someone else use the space.", "explanation": "In a sublease, the original tenant (sublessor) transfers part of their remaining lease interest to a third party (sublessee). The original tenant remains liable to the landlord under the primary lease. If the sublessee fails to pay, the original tenant is still responsible. Many leases require landlord approval for subleasing."}, {"id": 173, "category": "Escrow & Closing", "q": "In California, who typically pays for the owner's title insurance policy?", "choices": ["Always the buyer", "Varies by county custom—often the seller in Southern California", "Always the seller", "The escrow company"], "answer": 1, "hint": "Title insurance payment customs vary geographically within California.", "explanation": "In California, the payment of owner's title insurance varies by local custom. In Southern California (including Torrance and the South Bay), the seller traditionally pays for the owner's title insurance policy. In Northern California, the buyer often pays. The buyer typically pays for the lender's title insurance policy. These customs are negotiable."}, {"id": 174, "category": "Escrow & Closing", "q": "A preliminary title report reveals:", "choices": ["The property's market value", "The condition of title, including liens, encumbrances, and easements", "The property's zoning classification", "The buyer's credit score"], "answer": 1, "hint": "This report shows what affects the title before closing.", "explanation": "A preliminary title report (prelim) shows the current condition of title to the property, including the vesting (ownership), liens, encumbrances, easements, CC&Rs, and any other matters of record that would be excluded from or excepted in a title insurance policy. Buyers should carefully review the prelim during the escrow period."}, {"id": 175, "category": "Escrow & Closing", "q": "The IRS requires a 1099-S form to be filed when:", "choices": ["Any real property is rented", "Real property is sold and the proceeds exceed certain thresholds", "A mortgage is refinanced", "Property taxes are paid"], "answer": 1, "hint": "This form reports real estate sale proceeds to the IRS.", "explanation": "The IRS requires a 1099-S (Proceeds from Real Estate Transactions) to be filed for most real estate sales. The closing agent (typically escrow) reports the gross proceeds to the IRS. Certain transactions are exempt, including sales of a principal residence where the gain is excluded under Section 121 ($250,000 single / $500,000 married)."}, {"id": 176, "category": "Financing", "q": "The federal government entity that purchases loans in the secondary mortgage market and issues mortgage-backed securities is:", "choices": ["FHA", "Fannie Mae (FNMA)", "The Federal Reserve", "The IRS"], "answer": 1, "hint": "This is one of the GSEs (government-sponsored enterprises) for housing.", "explanation": "Fannie Mae (Federal National Mortgage Association / FNMA) purchases conventional and FHA/VA loans from primary lenders in the secondary market, packages them into mortgage-backed securities, and sells them to investors. This provides liquidity to the mortgage market, allowing lenders to make more loans. Freddie Mac (FHLMC) performs a similar function."}, {"id": 177, "category": "Financing", "q": "The secondary mortgage market:", "choices": ["Makes loans directly to borrowers", "Buys and sells existing mortgage loans, providing liquidity to primary lenders", "Sets interest rates for all lenders", "Insures mortgage loans"], "answer": 1, "hint": "This market doesn't originate loans—it trades them.", "explanation": "The secondary mortgage market is where existing mortgage loans are bought and sold between lenders and investors. It provides liquidity to primary lenders (who originate loans) by allowing them to sell loans and free up capital for new lending. Major secondary market entities include Fannie Mae, Freddie Mac, and Ginnie Mae."}, {"id": 178, "category": "Valuation", "q": "Reproduction cost is the cost to:", "choices": ["Build a similar structure using modern materials and methods", "Build an exact replica using the same materials and construction methods", "Purchase a comparable existing property", "Repair and restore an existing structure"], "answer": 1, "hint": "An exact replica vs. a functional equivalent—there's a difference.", "explanation": "Reproduction cost is the cost to build an exact replica of the subject structure using the same materials, design, and construction methods. Replacement cost is the cost to build a structure of similar utility using modern materials and current standards. Replacement cost is more commonly used because it excludes curable functional obsolescence."}, {"id": 179, "category": "Property Ownership", "q": "A life tenant has the duty to:", "choices": ["Make permanent improvements to the property", "Maintain the property and not commit waste", "Pay off any existing mortgages", "Insure the property for the remainderman"], "answer": 1, "hint": "The life tenant must preserve the property's value for the next owner.", "explanation": "A life tenant must maintain the property and avoid committing waste (actions that permanently damage the property or diminish its value). The life tenant must pay property taxes and mortgage interest (but not principal), keep the property insured, and make ordinary repairs. The life tenant cannot make changes that would harm the remainderman's interest."}, {"id": 180, "category": "Contracts", "q": "Undue influence in contract law occurs when:", "choices": ["One party uses their position of trust to take advantage of another party", "Both parties negotiate at arm's length", "An attorney reviews the contract", "The purchase price is above market value"], "answer": 0, "hint": "A person in a position of trust exploits that relationship.", "explanation": "Undue influence occurs when one party uses a position of trust, confidence, or authority to take advantage of another, overcoming the other person's free will. Examples include: a caregiver pressuring an elderly person to sell their home, or a financial advisor using their position to benefit personally. Contracts made under undue influence are voidable."}, {"id": 181, "category": "Financing", "q": "A Cal-Vet loan is:", "choices": ["A loan guaranteed by the federal VA", "A California state program that purchases homes and sells them to veterans on installment", "A grant for California veterans", "A loan only for active-duty military in California"], "answer": 1, "hint": "This is a California-specific veteran benefit program, separate from federal VA loans.", "explanation": "The Cal-Vet (California Veterans Farm and Home Purchase Program) is a California state program where the state purchases a home and resells it to the veteran through a land contract (installment sale). The veteran does not hold title until the contract is fully paid. This differs from federal VA loans where the veteran holds title immediately."}, {"id": 182, "category": "Financing", "q": "The Federal Reserve influences interest rates primarily through:", "choices": ["Directly setting mortgage rates", "Open market operations, the federal funds rate, and the discount rate", "Issuing VA loans", "Setting property tax rates"], "answer": 1, "hint": "The Fed uses monetary policy tools to influence the cost of borrowing.", "explanation": "The Federal Reserve influences interest rates through: open market operations (buying/selling government securities), setting the federal funds rate (the rate banks charge each other for overnight loans), and the discount rate (rate charged to member banks). These tools affect the money supply, which in turn influences all interest rates."}, {"id": 183, "category": "Financing", "q": "An acceleration clause in a mortgage allows the lender to:", "choices": ["Increase the interest rate", "Demand full payment of the remaining balance upon default", "Require additional collateral", "Extend the loan term"], "answer": 1, "hint": "The lender can 'accelerate' the full amount due.", "explanation": "An acceleration clause gives the lender the right to declare the entire unpaid loan balance immediately due and payable upon the borrower's default (missed payments, failure to maintain insurance, etc.). Without this clause, the lender could only sue for past-due payments. It is a standard provision in virtually all mortgages and deeds of trust."}, {"id": 184, "category": "Financing", "q": "Equity in real property is:", "choices": ["The total value of the property", "The difference between market value and outstanding mortgage debt", "The original purchase price", "The assessed value for tax purposes"], "answer": 1, "hint": "This is your ownership stake—what you'd keep after paying off all debts.", "explanation": "Equity is the difference between a property's current market value and the total outstanding liens (mortgages, loans). For example, if a property is worth $600,000 and the mortgage balance is $400,000, the equity is $200,000. Equity increases through appreciation, loan paydown, and improvements; it decreases through depreciation and additional borrowing."}, {"id": 185, "category": "Financing", "q": "A reverse mortgage allows homeowners to:", "choices": ["Pay off their mortgage faster", "Borrow against home equity with no monthly payments required, repaid when they move or die", "Reverse the interest rate to a lower rate", "Transfer their mortgage to another property"], "answer": 1, "hint": "This product is designed for older homeowners who want to tap their equity.", "explanation": "A reverse mortgage (Home Equity Conversion Mortgage / HECM) allows homeowners age 62+ to borrow against their home equity. No monthly payments are required—the loan is repaid when the borrower sells, moves, or passes away. The loan balance grows over time. The homeowner retains title and must maintain taxes, insurance, and the property."}, {"id": 186, "category": "Property Ownership", "q": "Air rights are:", "choices": ["The right to control air quality", "The right to use the space above a parcel of land", "Government-owned rights to airspace", "Rights related to HVAC systems"], "answer": 1, "hint": "Think about what's above your property, not just on the ground.", "explanation": "Air rights are the rights to use and develop the space above a parcel of land. They can be separated from the surface rights and sold or leased independently. Air rights are commonly used in urban areas for building bridges, elevated highways, or constructing buildings over existing structures. They are subject to governmental regulations (FAA, zoning height limits)."}, {"id": 187, "category": "Property Ownership", "q": "Tenancy in common is the default form of co-ownership in California when:", "choices": ["The deed specifies joint tenancy", "The co-owners are married", "No specific form of co-ownership is stated in the deed", "The property is commercial"], "answer": 2, "hint": "When the deed doesn't specify, the law presumes this type of ownership.", "explanation": "In California, when two or more non-married persons acquire property and the deed does not specify the form of co-ownership, the law presumes tenancy in common. Joint tenancy must be expressly stated in the deed with specific language. Community property is presumed for married couples acquiring property during marriage."}, {"id": 188, "category": "Contracts", "q": "A contingency in a purchase agreement is:", "choices": ["An unconditional promise", "A condition that must be met for the contract to be binding", "A penalty clause", "A deadline for closing"], "answer": 1, "hint": "If this condition isn't satisfied, the buyer can usually cancel the contract.", "explanation": "A contingency is a condition in a purchase agreement that must be satisfied for the contract to proceed. Common contingencies include: loan approval, satisfactory inspection, appraisal meeting the purchase price, review of disclosures, and sale of the buyer's existing home. If a contingency is not met, the buyer typically can cancel and receive their deposit back."}, {"id": 189, "category": "Contracts", "q": "Earnest money deposit serves as:", "choices": ["The full purchase price", "Good faith evidence that the buyer is serious about the purchase", "A non-refundable fee to the listing agent", "The broker's commission"], "answer": 1, "hint": "This deposit shows the seller that the buyer is committed.", "explanation": "Earnest money (also called a good faith deposit) demonstrates the buyer's serious intent to purchase the property. It is deposited into escrow or the broker's trust account and applied toward the purchase price at closing. If the buyer defaults, the deposit may be forfeited as liquidated damages (if the clause is initialed). If contingencies aren't met, the deposit is typically returned."}, {"id": 190, "category": "Contracts", "q": "A counter offer in California is typically made using:", "choices": ["A verbal communication only", "The CAR Seller Multiple Counter Offer form or Buyer Counter Offer form", "A new purchase agreement", "A letter from the seller's attorney"], "answer": 1, "hint": "The California Association of Realtors provides standardized forms.", "explanation": "In California real estate, counter offers are typically made using standardized California Association of Realtors (CAR) forms, such as the Seller Counter Offer (SCO) or Buyer Counter Offer (BCO). These forms reference the original offer and specify only the changed terms. Using standardized forms helps ensure clarity and reduces disputes."}, {"id": 191, "category": "Valuation", "q": "The income approach to value is most appropriate for:", "choices": ["Owner-occupied single-family homes", "Income-producing investment properties", "Vacant land with no improvements", "Special-purpose properties like churches"], "answer": 1, "hint": "This approach values a property based on the income it generates.", "explanation": "The income approach is most appropriate for income-producing properties such as apartment buildings, office buildings, retail centers, and other investment properties. It values property based on its ability to generate income. The two main methods are direct capitalization (using cap rate) and discounted cash flow analysis. It is less applicable to owner-occupied homes."}, {"id": 192, "category": "Valuation", "q": "An appraisal is:", "choices": ["The assessed value set by the county assessor", "An estimate of market value as of a specific date", "The listing price set by the real estate agent", "The insured value of the property"], "answer": 1, "hint": "An appraiser provides a professional opinion of value at a point in time.", "explanation": "An appraisal is a licensed or certified appraiser's professional opinion of a property's market value as of a specific date. It is based on analysis using one or more of the three approaches to value. Lenders require appraisals to ensure the property provides adequate collateral for the loan. An appraisal is not the same as assessed value, insured value, or listing price."}, {"id": 193, "category": "Transfer of Property", "q": "A sheriff's deed is issued after:", "choices": ["A voluntary sale by the owner", "A court-ordered foreclosure sale or execution sale", "A probate proceeding", "A tax lien sale"], "answer": 1, "hint": "This deed results from a forced sale by court order.", "explanation": "A sheriff's deed (or referee's deed) is issued to the purchaser at a judicial foreclosure sale or execution sale (sale to satisfy a court judgment). It conveys only the interest that the debtor had at the time the lien attached. Unlike a grant deed, a sheriff's deed provides no warranties of title—the buyer purchases 'as-is.'"}, {"id": 194, "category": "Transfer of Property", "q": "The Homeowner's Bill of Rights in California provides:", "choices": ["Free legal representation for homeowners", "Protections for homeowners facing foreclosure, including single point of contact and dual tracking prohibition", "Automatic loan forgiveness", "Property tax exemptions for first-time buyers"], "answer": 1, "hint": "California enacted these protections after the 2008 housing crisis.", "explanation": "California's Homeowner Bill of Rights (effective 2013, updated 2018) provides protections for homeowners facing foreclosure, including: prohibition of dual tracking (pursuing foreclosure while evaluating a loan modification), requirement for a single point of contact at the servicer, prohibition of robo-signing, and the right to sue for material violations."}, {"id": 195, "category": "Agency", "q": "A designated agent (in the context of dual agency) is:", "choices": ["An agent designated by the court", "A specific agent within a brokerage who represents one side while another agent in the same brokerage represents the other", "An agent who works for the government", "An unlicensed assistant who handles paperwork"], "answer": 1, "hint": "This allows agents within the same brokerage to represent different parties.", "explanation": "When dual agency arises within a brokerage (one agent represents the buyer and another represents the seller in the same firm), designated agency allows each agent to fully represent their respective client's interests. The broker must consent and proper disclosures are required. This provides better representation than a single dual agent."}, {"id": 196, "category": "Practice of Real Estate", "q": "The Sherman Antitrust Act prohibits real estate brokers from:", "choices": ["Competing for listings", "Fixing commission rates or dividing markets among themselves", "Advertising their services", "Offering discounted commissions"], "answer": 1, "hint": "Price-fixing and market allocation are federal antitrust violations.", "explanation": "The Sherman Antitrust Act prohibits price-fixing (agreeing on commission rates), market allocation (dividing territories), group boycotts, and tie-in arrangements among brokers. Commission rates must be individually negotiable between broker and client. Any agreement among competitors to set rates or restrict competition is illegal and can result in criminal penalties."}, {"id": 197, "category": "Practice of Real Estate", "q": "A material fact that must be disclosed includes:", "choices": ["The seller's reason for selling", "Known defects that could affect the property's value or desirability", "The seller's original purchase price", "The identity of the buyer's lender"], "answer": 1, "hint": "Material facts are those that would influence a reasonable person's decision.", "explanation": "Material facts are those that would influence a reasonable person's decision to buy or not buy the property. Examples include: structural defects, water damage, pest infestations, environmental hazards, neighborhood nuisances, and death on the property within 3 years. The seller's motivation or original purchase price are generally not required disclosures."}, {"id": 198, "category": "Land Use", "q": "Inverse condemnation is when:", "choices": ["The government formally acquires property", "A property owner sues the government because government action has effectively 'taken' their property value", "The government reverses a zoning decision", "A property is condemned as unsafe for habitation"], "answer": 1, "hint": "The property owner initiates the action, not the government.", "explanation": "Inverse condemnation occurs when a property owner sues the government, claiming that government action (such as a regulation, infrastructure project, or environmental restriction) has effectively taken their property value without formal condemnation proceedings and just compensation. The property owner seeks compensation under the Fifth Amendment's Takings Clause."}, {"id": 199, "category": "Land Use", "q": "A general plan (comprehensive plan) in California is:", "choices": ["Optional for cities and counties", "A required long-range planning document that guides land use decisions", "A federal requirement for all states", "A short-term construction plan"], "answer": 1, "hint": "California law requires every city and county to adopt one.", "explanation": "California Government Code requires every city and county to adopt a general plan—a comprehensive, long-range plan for future development. It must include seven mandatory elements: land use, circulation, housing, conservation, open space, noise, and safety. All zoning and development decisions must be consistent with the general plan."}, {"id": 200, "category": "Fair Housing", "q": "Testing (checking) in fair housing enforcement is:", "choices": ["Inspecting properties for building code violations", "Sending matched pairs of people to detect discriminatory treatment by real estate professionals", "Testing soil for contamination", "Evaluating property values through appraisal"], "answer": 1, "hint": "This is an investigative technique used to uncover housing discrimination.", "explanation": "Fair housing testing involves sending matched pairs of individuals (testers) who differ only in a protected characteristic (e.g., race) to inquire about housing. Differences in treatment are documented as evidence of discrimination. Testing is a key enforcement tool used by HUD, the Department of Justice, and private fair housing organizations. It is legal and widely accepted."}, {"id": 201, "category": "Financing", "q": "A purchase money deed of trust in California is significant because:", "choices": ["It always has the lowest interest rate", "The borrower is protected from deficiency judgments on owner-occupied 1-4 unit properties", "It requires no down payment", "It is guaranteed by the FHA"], "answer": 1, "hint": "California anti-deficiency protection applies to certain purchase money loans.", "explanation": "In California, a purchase money deed of trust used to buy owner-occupied residential property (1-4 units) is protected by anti-deficiency legislation. If the borrower defaults, the lender can only foreclose on the property and cannot pursue the borrower's other assets for any deficiency. This applies to both seller financing and institutional purchase money loans."}, {"id": 202, "category": "Financing", "q": "TRID (TILA-RESPA Integrated Disclosure) requires the Closing Disclosure to be provided to the borrower at least:", "choices": ["1 business day before closing", "3 business days before closing", "7 business days before closing", "At the closing table"], "answer": 1, "hint": "The borrower needs time to review the final costs before signing.", "explanation": "Under TRID (effective October 2015), the Closing Disclosure must be provided to the borrower at least 3 business days before the closing date. This replaced the old HUD-1 Settlement Statement and final TIL. If there are significant changes to the Closing Disclosure, a new 3-day waiting period may be required."}, {"id": 203, "category": "Financing", "q": "A second mortgage (junior lien) is:", "choices": ["Always illegal in California", "A loan secured by property that already has a first mortgage, with lower priority", "A loan from a second bank", "A mortgage taken out by the seller"], "answer": 1, "hint": "This loan is subordinate (junior) to the first mortgage.", "explanation": "A second mortgage is a loan secured by property that already has an existing first mortgage. The second mortgage is junior (subordinate) in priority. In foreclosure, the first mortgage is paid first; the second mortgage is paid only from remaining proceeds. Second mortgages typically have higher interest rates due to increased risk. Home equity loans and HELOCs are common second mortgages."}, {"id": 204, "category": "Financing", "q": "The debt-to-income ratio (DTI) measures:", "choices": ["The property's LTV", "The borrower's monthly debt payments as a percentage of gross monthly income", "The lender's profit margin", "The property's cap rate"], "answer": 1, "hint": "Lenders use this to determine if the borrower can afford the loan.", "explanation": "DTI compares the borrower's total monthly debt obligations (housing costs plus other debts) to their gross monthly income. Conventional loans typically require a DTI below 43-45%. FHA may allow up to 50% with compensating factors. Front-end ratio considers housing costs only; back-end ratio includes all debts. Lower DTI = less risk for the lender."}, {"id": 205, "category": "Financing", "q": "Regulation Z (Truth in Lending) gives the borrower a right of rescission for:", "choices": ["All purchase money mortgages", "Refinance transactions on the borrower's primary residence", "Commercial loans", "Loans on investment properties"], "answer": 1, "hint": "This right doesn't apply to purchase transactions.", "explanation": "Regulation Z provides a 3-day right of rescission (cancellation) for refinance transactions and home equity loans secured by the borrower's primary residence. It does NOT apply to purchase money mortgages. The rescission period runs until midnight of the 3rd business day after loan consummation or delivery of required disclosures, whichever is later."}, {"id": 206, "category": "Valuation", "q": "A property's effective age may differ from its actual age because:", "choices": ["The assessor made an error", "Renovations or poor maintenance can make a property younger or older functionally", "All buildings age at the same rate", "Effective age is always exactly half the actual age"], "answer": 1, "hint": "Well-maintained or renovated properties may function as if they're newer.", "explanation": "Effective age is the apparent age of a property based on its condition and utility, which may differ from its actual (chronological) age. A well-maintained and updated 50-year-old home might have an effective age of 20 years, while a poorly maintained 20-year-old home might have an effective age of 40 years. Effective age is used in the cost approach."}, {"id": 207, "category": "Valuation", "q": "The principle of supply and demand in real estate states that:", "choices": ["Supply always exceeds demand", "When supply increases relative to demand, prices tend to decrease; when demand exceeds supply, prices tend to increase", "Government controls all pricing", "Supply and demand do not affect real estate"], "answer": 1, "hint": "Basic economics applies to real estate markets.", "explanation": "The principle of supply and demand is fundamental to real estate pricing. When supply of available properties exceeds demand from buyers, prices tend to decrease (buyer's market). When demand exceeds supply, prices tend to increase (seller's market). Factors affecting supply include construction, demolition, and conversions; factors affecting demand include population, employment, income, and interest rates."}, {"id": 208, "category": "Valuation", "q": "Plottage is the:", "choices": ["Reduction in value when large parcels are split", "Increase in value when two or more adjacent parcels are combined into one larger parcel", "Process of dividing land into lots", "Measurement of a parcel's perimeter"], "answer": 1, "hint": "Combining parcels can create more value than the sum of the parts.", "explanation": "Plottage (assemblage) is the increase in value that results from combining two or more adjacent parcels into one larger parcel. The combined parcel is often worth more than the sum of the individual parcels because of increased utility and development potential. For example, two narrow lots combined may allow development that neither lot could support alone."}, {"id": 209, "category": "Transfer of Property", "q": "A gift deed transfers property:", "choices": ["Only upon the grantor's death", "During the grantor's lifetime with love and affection as consideration", "Only through probate", "Only to government entities"], "answer": 1, "hint": "Property can be given as a gift during the owner's lifetime.", "explanation": "A gift deed transfers property from the grantor to the grantee during the grantor's lifetime, with love and affection serving as consideration. The deed must be voluntarily delivered and accepted. Gift transfers may have gift tax implications if the value exceeds the annual exclusion ($18,000 per recipient in 2024). The grantee takes the grantor's tax basis (carryover basis)."}, {"id": 210, "category": "Transfer of Property", "q": "The capital gains exclusion under IRC Section 121 allows:", "choices": ["$100,000 exclusion for all sellers", "Up to $250,000 ($500,000 for married filing jointly) exclusion on gain from selling a primary residence", "$1,000,000 exclusion for properties held over 10 years", "No exclusion—all gains are taxable"], "answer": 1, "hint": "This significant tax benefit applies to the sale of your primary home.", "explanation": "IRC Section 121 allows homeowners to exclude up to $250,000 of capital gain ($500,000 for married couples filing jointly) from the sale of a primary residence if they have owned and used the home as their principal residence for at least 2 of the 5 years preceding the sale. This exclusion can be used repeatedly, but generally
